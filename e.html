<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Your Estimate — Hello, Virtually</title>
<meta name="theme-color" content="#173D35">
<style>
  body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;
    background:#F7F5F0;color:#173D35;font-family:Georgia,'Times New Roman',serif;text-align:center;padding:20px;}
  .box{max-width:360px;}
  .dot{width:34px;height:34px;border-radius:50%;border:3px solid #B9A7FF;border-top-color:#173D35;
    margin:0 auto 18px;animation:sp 0.8s linear infinite;}
  @keyframes sp{to{transform:rotate(360deg);}}
  p{font-family:Arial,Helvetica,sans-serif;font-size:.92rem;color:rgba(23,61,53,.7);margin:0 0 14px;}
  a{display:inline-block;font-family:Arial,Helvetica,sans-serif;font-weight:700;color:#fff;
    background:#F45145;padding:11px 20px;border-radius:9px;text-decoration:none;font-size:.9rem;}
</style>
</head>
<body>
  <div class="box">
    <div class="dot" id="spin"></div>
    <p id="msg">Opening your estimate&hellip;</p>
    <a id="manualLink" href="#" style="display:none" target="_blank" rel="noopener">Open estimate</a>
  </div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const sb = supabase.createClient(
    "https://yjrotvqtprlkzbxgyhtk.supabase.co",
    "sb_publishable_PbrUG6KkvkCJsZ7uES5uFw_DdeEa0eD"
  );
  const id = new URLSearchParams(window.location.search).get("id");

  async function go(){
    if (!id) { fail(); return; }
    const { data, error } = await sb.rpc("get_estimate_url", { p_id: id });
    if (error || !data) { fail(); return; }
    document.getElementById("manualLink").href = data;
    window.location.replace(data);
    setTimeout(() => { document.getElementById("manualLink").style.display = "inline-block"; }, 1500);
  }
  function fail(){
    document.getElementById("spin").style.display = "none";
    document.getElementById("msg").textContent = "We couldn't find this estimate. Please contact us for a new link.";
  }
  go();
</script>
</body>
</html>
