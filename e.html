<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Your Estimate — Hello, Virtually</title>
<meta name="theme-color" content="#173D35">
<style>
  body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;
    background:#F7F5F0;color:#173D35;font-family:Georgia,'Times New Roman',serif;text-align:center;padding:20px;}
  .box{max-width:360px;}
  .dot{width:34px;height:34px;border-radius:50%;border:3px solid #B9A7FF;border-top-color:#173D35;
    margin:0 auto 18px;animation:sp 0.8s linear infinite;}
  @keyframes sp{to{transform:rotate(360deg);}}
  p{font-family:Arial,Helvetica,sans-serif;font-size:.92rem;color:rgba(23,61,53,.7);margin:0 0 14px;}
  a{display:inline-block;font-family:Arial,Helvetica,sans-serif;font-weight:700;color:#fff;
    background:#F45145;padding:11px 20px;border-radius:9px;text-decoration:none;font-size:.9rem;}
</style>
</head>
<body>
  <div class="box">
    <div class="dot"></div>
    <p>Opening your estimate&hellip;</p>
    <a id="manualLink" href="#" style="display:none">Open estimate</a>
  </div>
<script>
  const params = new URLSearchParams(window.location.search);
  const u = params.get("u");
  if (u) {
    let target = "";
    try { target = decodeURIComponent(u); } catch(e) { target = u; }
    document.getElementById("manualLink").href = target;
    window.location.replace(target);
    setTimeout(() => { document.getElementById("manualLink").style.display = "inline-block"; }, 1500);
  } else {
    document.querySelector("p").textContent = "This link is missing its document.";
  }
</script>
</body>
</html>
