<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard — Hello, virtually!</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%23F0EEE9'/%3E%3Ctext x='50' y='68' font-family='Georgia,serif' font-size='52' font-style='italic' font-weight='700' fill='%231F3D3A' text-anchor='middle'%3Eh%3C/text%3E%3Ccircle cx='72' cy='30' r='9' fill='%23CE3375'/%3E%3C/svg%3E">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,300;1,9..144,400;1,9..144,500&family=Nunito:ital,wght@0,400;0,500;0,600;0,700;0,800;1,500&family=Shadows+Into+Light&display=swap" rel="stylesheet">
<style>
:root{
  --cloud:#F0EEE9; --cloud-2:#F8F6F2;
  --lagoon:#4D9E9A; --lagoon-d:#347D79;
  --yarrow:#CE3375; --yarrow-dd:#A82A61;
  --coral:#FF6F61; --ink:#1F3D3A; --ink-2:#37544F;
  --soft:#DCEBE8; --blush:#FBE4DE; --line:rgba(31,61,58,.12);
  --shadow:0 10px 34px rgba(31,61,58,.08);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Nunito',sans-serif;background:linear-gradient(180deg,#F4F1EC,#EFece6);color:var(--ink);line-height:1.55;-webkit-font-smoothing:antialiased;min-height:100vh;}
h1,h2,h3{font-family:'Fraunces',serif;font-weight:600;line-height:1.05;letter-spacing:-.5px;}
a{color:var(--yarrow);text-decoration:none;}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;font-family:'Nunito',sans-serif;font-weight:700;font-size:.76rem;letter-spacing:.4px;padding:11px 22px;border-radius:50px;cursor:pointer;border:none;transition:transform .18s,box-shadow .25s,background .2s,color .2s,border-color .2s;}
.btn-primary{background:var(--yarrow);color:#fff;}
.btn-primary:hover{background:var(--yarrow-dd);transform:translateY(-1px);}
.btn-ghost{background:transparent;border:1.5px solid var(--line);color:var(--ink);}
.btn-ghost:hover{border-color:var(--ink);}
.btn-sm{padding:8px 15px;font-size:.7rem;}
.btn-block{width:100%;}

/* pipeline */
.pipe{display:flex;gap:6px;margin:13px 0 4px;flex-wrap:wrap;}
.pstep{flex:1;min-width:72px;font-size:.66rem;font-weight:800;letter-spacing:.4px;text-transform:uppercase;padding:8px 6px;border-radius:50px;border:1.5px solid var(--line);background:#fff;color:var(--ink-2);cursor:pointer;transition:all .18s;}
.pstep.past{background:var(--soft);border-color:var(--soft);color:var(--lagoon-d);}
.pstep.on{background:var(--ink);border-color:var(--ink);color:#fff;}
.pstep:hover{border-color:var(--lagoon);}
.next-action{display:inline-flex;align-items:center;gap:7px;background:var(--blush);color:var(--yarrow-dd);font-size:.78rem;font-weight:700;padding:7px 14px;border-radius:50px;margin:10px 0 2px;}
.next-action .na-ic{font-size:.8rem;}
/* collapsible notes */
.notes-sec{margin-top:14px;border-top:1px dashed var(--line);padding-top:11px;}
.notes-toggle{display:flex;align-items:center;gap:8px;width:100%;background:none;border:none;cursor:pointer;font-family:'Nunito';font-size:.66rem;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:var(--ink-2);padding:0;}
.nt-caret{transition:transform .2s;}
.notes-sec.open .nt-caret{transform:rotate(180deg);}
.nt-unread{width:7px;height:7px;border-radius:50%;background:var(--coral);}
.notes-body{display:none;margin-top:10px;}
.notes-sec.open .notes-body{display:block;}

/* ===== calendar ===== */
.calendar-wrap{background:#fff;border:1px solid var(--line);border-radius:22px;padding:18px;box-shadow:var(--shadow);}
.cal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.cal-head h3{font-size:1.25rem;font-weight:500;}
.cal-nav{display:flex;gap:8px;}
.cal-nav button{width:34px;height:34px;border-radius:50px;border:1.5px solid var(--line);background:#fff;cursor:pointer;font-size:1rem;color:var(--ink);}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;}
.cal-dow{font-size:.6rem;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:var(--ink-2);text-align:center;padding:6px 0;}
.cal-cell{min-height:74px;border:1px solid var(--line);border-radius:12px;padding:6px;background:var(--cloud-2);display:flex;flex-direction:column;gap:3px;cursor:pointer;transition:border-color .2s;}
.cal-cell:hover{border-color:var(--lagoon);}
.cal-cell.empty{background:transparent;border:none;cursor:default;}
.cal-cell.today{border-color:var(--yarrow);background:#fff;}
.cal-date{font-size:.74rem;font-weight:800;color:var(--ink-2);}
.cal-cell.today .cal-date{color:var(--yarrow-dd);}
.cal-ev{font-size:.6rem;font-weight:700;padding:2px 6px;border-radius:6px;background:var(--blush);color:var(--yarrow-dd);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.cal-ev.rem{background:var(--soft);color:var(--lagoon-d);}
.cal-more{font-size:.58rem;color:var(--ink-2);}
.cal-day-detail{margin-top:14px;border-top:1px dashed var(--line);padding-top:12px;}
.cal-day-detail h4{font-family:'Fraunces',serif;font-weight:600;font-size:.95rem;margin-bottom:8px;}
.cal-di{display:flex;align-items:center;gap:9px;padding:8px 0;border-bottom:1px solid var(--line);font-size:.86rem;}
.cal-di .dot{width:8px;height:8px;border-radius:50%;background:var(--yarrow);flex-shrink:0;}
.cal-di .dot.rem{background:var(--lagoon);}

/* ===== clients (admin) ===== */
.clients-wrap{display:flex;flex-direction:column;gap:13px;}
.cl-summary{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:6px;}
.cl-stat{background:var(--ink);color:#fff;border-radius:18px;padding:16px 18px;}
.cl-stat .n{font-family:'Fraunces',serif;font-size:1.7rem;font-weight:400;}
.cl-stat .l{font-size:.6rem;font-weight:800;letter-spacing:1px;text-transform:uppercase;opacity:.8;margin-top:4px;}
.client-card{background:#fff;border:1px solid var(--line);border-radius:20px;padding:18px 20px;}
.client-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-wrap:wrap;}
.client-name{font-family:'Fraunces',serif;font-size:1.15rem;font-weight:500;}
.client-email{font-size:.82rem;color:var(--ink-2);}
.cl-status{font-size:.58rem;font-weight:800;letter-spacing:.8px;text-transform:uppercase;padding:4px 11px;border-radius:50px;}
.cl-status.active{background:var(--soft);color:var(--lagoon-d);}
.cl-status.trialing{background:var(--blush);color:var(--yarrow-dd);}
.cl-status.past_due,.cl-status.unpaid{background:#FFE3DE;color:#C2410C;}
.cl-status.canceled{background:#eee;color:var(--ink-2);}
.cl-items{display:flex;flex-wrap:wrap;gap:6px;margin:11px 0;}
.cl-item{font-size:.66rem;font-weight:700;background:var(--cloud-2);border:1px solid var(--line);border-radius:50px;padding:5px 12px;color:var(--ink);}
.cl-mrr{font-family:'Fraunces',serif;font-size:1.3rem;font-weight:400;color:var(--yarrow-dd);}
.cl-mrr small{font-size:.7rem;color:var(--ink-2);font-family:'Nunito';}
.cl-notes{margin-top:12px;border-top:1px dashed var(--line);padding-top:11px;}
.cl-notes .nh{font-size:.6rem;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:var(--ink-2);margin-bottom:8px;}
.cl-note{background:var(--cloud-2);border-radius:10px;padding:8px 12px;margin-bottom:7px;font-size:.85rem;display:flex;justify-content:space-between;gap:10px;align-items:flex-start;}
.cl-note-time{font-size:.6rem;color:var(--ink-2);opacity:.7;margin-top:3px;}
.cl-note-ctrls{display:flex;gap:9px;flex-shrink:0;}
.cl-note .x{color:var(--lagoon-d);cursor:pointer;font-weight:800;font-size:.8rem;}
.cl-note .x.del{color:var(--coral);}
.cl-note-add{display:flex;gap:8px;margin-top:7px;}
.cl-note-add input{flex:1;font-family:'Nunito';font-size:.85rem;padding:9px 13px;border-radius:11px;border:1px solid var(--line);background:#fff;outline:none;}
.cl-loading{text-align:center;padding:50px;color:var(--ink-2);}

/* ===== top bar ===== */
.topbar{position:sticky;top:0;z-index:60;background:rgba(248,246,242,.9);backdrop-filter:blur(12px);border-bottom:1px solid var(--line);}
.topbar-in{max-width:1120px;margin:0 auto;padding:14px 22px;display:flex;align-items:center;justify-content:space-between;gap:12px;}
.logo{font-family:'Fraunces',serif;font-weight:600;font-size:1.25rem;color:var(--ink);display:flex;align-items:center;gap:2px;white-space:nowrap;}
.logo .dot{width:7px;height:7px;border-radius:50%;background:var(--yarrow);display:inline-block;margin-left:3px;margin-bottom:11px;}
.top-actions{display:flex;align-items:center;gap:9px;}
.who{font-size:.7rem;font-weight:700;color:var(--ink-2);opacity:.8;max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.role-pill{font-size:.56rem;font-weight:800;letter-spacing:1px;text-transform:uppercase;padding:3px 9px;border-radius:50px;background:var(--ink);color:#fff;}
.role-pill.client{background:var(--lagoon);}
.lang-toggle{background:transparent;border:1.5px solid rgba(31,61,58,.25);color:var(--ink);width:38px;height:32px;border-radius:50px;font-size:.64rem;font-weight:800;letter-spacing:1px;cursor:pointer;}
.icon-btn{background:transparent;border:1.5px solid var(--line);color:var(--ink);width:36px;height:34px;border-radius:50px;cursor:pointer;font-size:1rem;display:inline-flex;align-items:center;justify-content:center;position:relative;}
.bell-badge{position:absolute;top:-5px;right:-5px;min-width:18px;height:18px;padding:0 5px;border-radius:50px;background:var(--coral);color:#fff;font-size:.6rem;font-weight:800;display:flex;align-items:center;justify-content:center;border:2px solid var(--cloud-2);}

/* ===== layout ===== */
.wrap{max-width:1120px;margin:0 auto;padding:28px 22px 90px;}
.page-head{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:22px;}
.page-head h1{font-size:clamp(1.7rem,3.6vw,2.4rem);font-weight:400;}
.page-head h1 em{font-style:italic;color:var(--yarrow);}
.page-head .greet{color:var(--ink-2);font-size:.9rem;margin-top:4px;}

/* summary panel */
.panel{display:grid;grid-template-columns:repeat(4,1fr);gap:13px;margin-bottom:14px;}
.tile{background:#fff;border:1px solid var(--line);border-radius:20px;padding:17px 18px;cursor:pointer;transition:transform .18s,border-color .2s,box-shadow .25s;text-align:left;position:relative;overflow:hidden;}
.tile:hover{transform:translateY(-2px);box-shadow:var(--shadow);}
.tile.active{border-color:var(--yarrow);}
.tile .n{font-family:'Fraunces',serif;font-size:1.95rem;font-weight:400;line-height:1;}
.tile .l{font-size:.62rem;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:var(--ink-2);margin-top:7px;}
.tile.t-new .n{color:var(--coral);}
.tile.t-appt .n{color:var(--yarrow);}
.tile.t-today .n{color:var(--lagoon-d);}
.tile.t-all .n{color:var(--ink);}

/* tabs */
.tabs{display:flex;gap:7px;margin:24px 0 16px;flex-wrap:wrap;}
.tab{font-size:.72rem;font-weight:800;letter-spacing:.5px;text-transform:uppercase;padding:9px 18px;border-radius:50px;border:1.5px solid var(--line);background:#fff;color:var(--ink-2);cursor:pointer;transition:all .2s;}
.tab.active{background:var(--ink);color:#fff;border-color:var(--ink);}

/* toolbar */
.toolbar{display:flex;gap:10px;align-items:center;margin-bottom:18px;flex-wrap:wrap;}
.search{flex:1;min-width:180px;display:flex;align-items:center;gap:8px;background:#fff;border:1px solid var(--line);border-radius:50px;padding:10px 18px;}
.search input{border:none;outline:none;background:transparent;font-family:'Nunito',sans-serif;font-size:.9rem;color:var(--ink);width:100%;}

/* add bar */
.addbar{display:flex;gap:9px;flex-wrap:wrap;margin-bottom:20px;}

/* cards */
.cards{display:flex;flex-direction:column;gap:14px;}
.card{background:#fff;border:1px solid var(--line);border-radius:20px;padding:18px 20px;transition:box-shadow .25s;position:relative;}
.card:hover{box-shadow:var(--shadow);}
.card.is-booking{border-left:4px solid var(--yarrow);}
.card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-wrap:wrap;}
.card-name{font-family:'Fraunces',serif;font-size:1.18rem;font-weight:500;display:flex;align-items:center;gap:9px;flex-wrap:wrap;}
.kind-tag{font-size:.56rem;font-weight:800;letter-spacing:1px;text-transform:uppercase;padding:3px 9px;border-radius:50px;background:var(--blush);color:var(--yarrow-dd);}
.kind-tag.inq{background:var(--soft);color:var(--lagoon-d);}
.card-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-top:4px;}
.badge{font-size:.58rem;font-weight:800;letter-spacing:.7px;text-transform:uppercase;padding:4px 10px;border-radius:50px;background:var(--soft);color:var(--lagoon-d);}
.time{font-size:.7rem;color:var(--ink-2);opacity:.7;}
.appt-when{font-size:.74rem;font-weight:800;color:var(--yarrow-dd);background:var(--blush);padding:4px 11px;border-radius:50px;}
.contact{font-size:.84rem;color:var(--ink-2);margin-top:3px;}
.msg{background:var(--cloud-2);border-radius:13px;padding:12px 15px;margin:13px 0;font-size:.9rem;border-left:3px solid var(--soft);white-space:pre-wrap;}
.card-actions{display:flex;align-items:center;gap:9px;flex-wrap:wrap;}
.status-sel{font-family:'Nunito',sans-serif;font-size:.72rem;font-weight:800;letter-spacing:.5px;text-transform:uppercase;padding:8px 15px;border-radius:50px;border:1.5px solid var(--line);background:#fff;cursor:pointer;color:var(--ink);}
.st-new{border-color:var(--coral);color:var(--coral);}
.st-contacted{border-color:var(--lagoon);color:var(--lagoon-d);}
.st-booked{border-color:var(--yarrow);color:var(--yarrow);}
.st-closed{border-color:var(--line);color:var(--ink-2);}
.mini-btn{display:inline-flex;align-items:center;gap:6px;font-size:.72rem;font-weight:800;letter-spacing:.4px;padding:8px 15px;border-radius:50px;border:1.5px solid var(--lagoon);background:#fff;color:var(--lagoon-d);cursor:pointer;}
.mini-btn.done{background:var(--lagoon);color:#fff;}
.mini-btn.alt{border-color:var(--yarrow);color:var(--yarrow);}
.del-btn{background:transparent;border:none;color:var(--coral);font-size:.7rem;font-weight:800;cursor:pointer;letter-spacing:.4px;margin-left:auto;}

/* notes thread */
.notes-sec{margin-top:15px;border-top:1px dashed var(--line);padding-top:13px;}
.notes-sec .nh{font-size:.6rem;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:var(--ink-2);margin-bottom:9px;}
.note{display:flex;flex-direction:column;gap:2px;background:var(--cloud-2);border-radius:12px;padding:9px 13px;margin-bottom:8px;}
.note .nmeta{display:flex;align-items:center;gap:7px;font-size:.62rem;color:var(--ink-2);}
.note .ntime{opacity:.75;}
.note-ctrls{margin-left:auto;display:flex;gap:9px;}
.note-edit,.note-del{cursor:pointer;font-weight:800;font-size:.8rem;line-height:1;}
.note-edit{color:var(--lagoon-d);}
.note-del{color:var(--coral);}
.note .who-tag{font-weight:800;letter-spacing:.5px;text-transform:uppercase;padding:2px 7px;border-radius:50px;font-size:.55rem;}
.who-tag.admin{background:var(--ink);color:#fff;}
.who-tag.client{background:var(--lagoon);color:#fff;}
.note .nbody{font-size:.88rem;color:var(--ink);}
.note-add{display:flex;gap:8px;margin-top:8px;}
.note-add input{flex:1;font-family:'Nunito',sans-serif;font-size:.86rem;padding:9px 13px;border-radius:11px;border:1px solid var(--line);background:#fff;color:var(--ink);outline:none;}

/* empty */
.empty{text-align:center;padding:64px 20px;color:var(--ink-2);}
.empty .big{font-family:'Fraunces',serif;font-style:italic;font-size:1.45rem;color:var(--lagoon-d);margin-bottom:6px;}
.empty .hand{font-family:'Shadows Into Light',cursive;font-size:1.25rem;color:var(--yarrow);margin-top:8px;}

/* ===== drawers / modals ===== */
.overlay{position:fixed;inset:0;background:rgba(31,61,58,.4);backdrop-filter:blur(3px);z-index:80;display:none;align-items:flex-start;justify-content:center;padding:5vh 16px;overflow-y:auto;}
.overlay.open{display:flex;}
.sheet{background:#fff;border-radius:24px;width:100%;max-width:480px;padding:26px;box-shadow:0 30px 80px rgba(31,61,58,.25);}
.sheet h3{font-size:1.4rem;font-weight:500;margin-bottom:3px;}
.sheet .sub{font-size:.84rem;color:var(--ink-2);margin-bottom:18px;}
.sheet-close{float:right;background:none;border:none;font-size:1.5rem;color:var(--ink-2);cursor:pointer;line-height:1;}
.fld{display:flex;flex-direction:column;gap:5px;margin-bottom:13px;}
.fld label{font-size:.62rem;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:var(--ink-2);}
.fld input,.fld select,.fld textarea{font-family:'Nunito',sans-serif;font-size:.92rem;padding:11px 14px;border-radius:12px;border:1px solid var(--line);background:var(--cloud-2);color:var(--ink);outline:none;}
.fld textarea{resize:vertical;min-height:70px;}
.fld-row{display:grid;grid-template-columns:1fr 1fr;gap:11px;}
.form-msg{font-size:.8rem;min-height:18px;margin-top:4px;}
.seg{display:flex;gap:7px;margin-bottom:14px;}
.seg button{flex:1;font-size:.72rem;font-weight:800;letter-spacing:.5px;text-transform:uppercase;padding:10px;border-radius:12px;border:1.5px solid var(--line);background:#fff;color:var(--ink-2);cursor:pointer;}
.seg button.on{background:var(--ink);color:#fff;border-color:var(--ink);}

/* notifications drawer */
.notif-panel{position:fixed;top:64px;right:14px;width:320px;max-width:calc(100vw - 28px);background:#fff;border:1px solid var(--line);border-radius:20px;box-shadow:0 24px 64px rgba(31,61,58,.22);z-index:70;display:none;overflow:hidden;}
.notif-panel.open{display:block;}
.notif-head{padding:15px 18px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;}
.notif-head h4{font-family:'Fraunces',serif;font-weight:600;font-size:1rem;}
.notif-list{max-height:54vh;overflow-y:auto;}
.notif-tabs{display:flex;gap:5px;padding:10px 14px 4px;flex-wrap:wrap;border-bottom:1px solid var(--line);}
.ntab{font-size:.6rem;font-weight:800;letter-spacing:.4px;text-transform:uppercase;padding:6px 10px;border-radius:50px;border:1.5px solid var(--line);background:#fff;color:var(--ink-2);cursor:pointer;}
.ntab.active{background:var(--ink);color:#fff;border-color:var(--ink);}
.notif-filter{display:flex;gap:6px;padding:9px 14px;}
.nfilt{font-size:.62rem;font-weight:800;letter-spacing:.4px;padding:5px 13px;border-radius:50px;border:1.5px solid var(--line);background:#fff;color:var(--ink-2);cursor:pointer;}
.nfilt.active{background:var(--lagoon);color:#fff;border-color:var(--lagoon);}
.notif .nx{margin-left:auto;color:var(--coral);font-weight:800;cursor:pointer;font-size:.85rem;flex-shrink:0;padding-left:6px;}
.notif{padding:13px 18px;border-bottom:1px solid var(--line);display:flex;gap:11px;align-items:flex-start;}
.notif:last-child{border-bottom:none;}
.notif .ndot{width:8px;height:8px;border-radius:50%;background:var(--coral);margin-top:6px;flex-shrink:0;}
.notif.read .ndot{background:var(--line);}
.notif .nt{font-size:.86rem;font-weight:700;}
.notif .ns{font-size:.74rem;color:var(--ink-2);}
.notif-empty{padding:30px 18px;text-align:center;color:var(--ink-2);font-size:.85rem;}

/* auth gate */
.gate{max-width:420px;margin:7vh auto;background:#fff;border:1px solid var(--line);border-radius:24px;padding:34px 30px;text-align:center;box-shadow:var(--shadow);}
.gate h2{font-size:1.7rem;font-weight:400;}
.gate h2 em{font-style:italic;color:var(--yarrow);}
.gate p{color:var(--ink-2);font-size:.9rem;margin:10px 0 22px;}
.gate .fld{text-align:left;}
.gate .err{color:var(--coral);font-size:.82rem;min-height:18px;margin-bottom:6px;}
.gate .alt{margin-top:16px;font-size:.82rem;color:var(--ink-2);}

@media(max-width:760px){
  .panel{grid-template-columns:repeat(2,1fr);}
  .fld-row{grid-template-columns:1fr;}
  .wrap{padding:22px 15px 80px;}
  .topbar-in{padding:13px 15px;}
  .who{display:none;}
}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-in">
    <a href="index.html" class="logo">hello, virtually<span class="dot"></span></a>
    <div class="top-actions" id="topActions" style="display:none">
      <span class="role-pill" id="rolePill">CLIENT</span>

  function fmtExact(d){ try{ const dt=new Date(d); return dt.toLocaleDateString(lang==="es"?"es-PR":"en-US",{year:"numeric",month:"short",day:"numeric"})+" \u00b7 "+dt.toLocaleTimeString(lang==="es"?"es-PR":"en-US",{hour:"numeric",minute:"2-digit"}); }catch(e){ return ""; } }
  function fmtWhen(d){
    try{
      const dt=new Date(d), now=new Date();
      const sameDay = dt.toDateString()===now.toDateString();
      const tmr=new Date(now); tmr.setDate(now.getDate()+1);
      const isTmr = dt.toDateString()===tmr.toDateString();
      const tm = dt.toLocaleTimeString(lang==="es"?"es-PR":"en-US",{hour:"numeric",minute:"2-digit"});
      if(sameDay) return T("today")+" "+tm;
      if(isTmr) return T("tomorrow")+" "+tm;
      return dt.toLocaleDateString(lang==="es"?"es-PR":"en-US",{month:"short",day:"numeric"})+" \u00b7 "+tm;
    }catch(e){ return ""; }
  }

  // ===== boot =====

  function showGate(){ $("gateWrap").style.display=""; $("app").style.display="none"; $("topActions").style.display="none"; }

  async function loadAll(){
    if(!sb||!user) return;
    const [iq, rm, nt] = await Promise.all([
      sb.from("inquiries").select("*").order("created_at",{ascending:false}),
      sb.from("reminders").select("*").order("due_at",{ascending:true}),
      sb.from("notes").select("*").order("created_at",{ascending:true})
    ]);
    inquiries = (iq && iq.data) || [];
    reminders = (rm && rm.data) || [];
    notesByInq = {};
    ((nt && nt.data)||[]).forEach(n=>{ (notesByInq[n.inquiry_id]=notesByInq[n.inquiry_id]||[]).push(n); });
    buildNotifs();
    render(); renderNotifs();
  }

  // ===== notifications (in-app) =====
  function buildNotifs(){
    notifs=[];
    const now=Date.now();
    inquiries.forEach(r=>{
      const created=new Date(r.created_at).getTime();
      if(r.kind!=="booking" && r.status==="new"){
        notifs.push({id:"inq-"+r.id, type:"new", t:T("notifNew"), s:(r.customer_name||"")+" \u00b7 "+(r.channel||""), at:created});
      }
      if(r.kind==="booking" && r.booking_at){
        const b=new Date(r.booking_at).getTime();
        if(b>now && b-now < 1000*60*60*48){ notifs.push({id:"appt-"+r.id, type:"appt", t:T("notifAppt"), s:(r.customer_name||"")+" \u00b7 "+fmtWhen(r.booking_at), at:created}); }
      }
    });
    reminders.forEach(r=>{
      if(r.done) return;
      const due=new Date(r.due_at).getTime();
      if(due - now < 1000*60*60*24){ notifs.push({id:"rem-"+r.id, type:"rem", t:T("notifRem"), s:r.title+" \u00b7 "+fmtWhen(r.due_at), at:new Date(r.created_at).getTime()}); }
    });
    const myRole = isAdmin ? "admin" : "client";
    Object.keys(notesByInq).forEach(iid=>{
      const inq = inquiries.find(x=>x.id===iid);
      (notesByInq[iid]||[]).forEach(n=>{
        if(n.author_role && n.author_role!==myRole){
          const who = inq ? (inq.customer_name||inq.client_email||"") : "";
          notifs.push({id:"note-"+n.id, type:"note", t:T("notifNote"), s:who+" \u00b7 "+(n.body||"").slice(0,40), at:new Date(n.created_at).getTime()});
        }
      });
    });
    // drop deleted
    notifs = notifs.filter(n=>!notifDeleted[n.id]);
    notifs.sort((a,b)=>b.at-a.at);
    updateBadge();
  }
  function isUnread(n){ return !notifRead[n.id]; }

    const unread = notifs.filter(isUnread).length;
    const badge=$("bellBadge");

    else badge.style.display="none";

  function saveNotifState(){ try{ localStorage.setItem("hv_nread_"+user.id, JSON.stringify(notifRead)); localStorage.setItem("hv_ndel_"+user.id, JSON.stringify(notifDeleted)); }catch(e){} }
  function renderNotifs(){
    const list=$("notifList");
    document.querySelectorAll("#notifTabs .ntab").forEach(t=>t.classList.toggle("active",t.getAttribute("data-ntab")===notifTab));
    document.querySelectorAll("#notifFilter .nfilt").forEach(t=>t.classList.toggle("active",t.getAttribute("data-nfilt")===notifFilt));
    let list2=notifs.slice();
    if(notifTab!=="all") list2=list2.filter(n=>n.type===notifTab);
    if(notifFilt==="unread") list2=list2.filter(isUnread);
    if(!list2.length){ list.innerHTML='<div class="notif-empty">'+esc(T("noNotif"))+'</div>'; return; }
    list.innerHTML = list2.map(n=>'<div class="notif'+(isUnread(n)?'':' read')+'" data-nid="'+esc(n.id)+'"><span class="ndot"></span><div><div class="nt">'+esc(n.t)+'</div><div class="ns">'+esc(n.s)+'</div></div><span class="nx" data-nact="del">\u00d7</span></div>').join("");
  }

  // ===== counts + render =====
  function counts(){
    const c={all:inquiries.length,new:0,appt:0,reminders:0};
    inquiries.forEach(r=>{ if(r.status==="new") c.new++; if(r.kind==="booking") c.appt++; });
    const now=Date.now();
    reminders.forEach(r=>{ if(!r.done && new Date(r.due_at).getTime()-now < 1000*60*60*24) c.reminders++; });
    return c;
  }

  function render(){
    if($("app").style.display==="none") return;
    const c=counts();
    $("cAll").textContent=c.all; $("cNew").textContent=c.new; $("cAppt").textContent=c.appt; $("cToday").textContent=c.reminders;
    document.querySelectorAll(".tile").forEach(t=>t.classList.toggle("active", t.getAttribute("data-f")===(tab==="reminders"?"reminders":filter)));
    document.querySelectorAll(".tab").forEach(t=>t.classList.toggle("active", t.getAttribute("data-tab")===tab));
    $("toolbar").style.display = tab==="inquiries"?"flex":"none";
    $("calendarWrap").style.display = tab==="calendar"?"":"none";
    $("clientsWrap").style.display = tab==="clients"?"":"none";
    $("cards").style.display = (tab==="calendar"||tab==="clients")?"none":"flex";
    if(tab==="calendar"){ renderCalendar(); return; }
    if(tab==="clients"){ renderClients(); return; }
    if(tab==="reminders"){ renderReminders(); return; }

    let list=inquiries.slice();
    if(filter==="new") list=list.filter(r=>r.status==="new");
    else if(filter==="appt") list=list.filter(r=>r.kind==="booking");
    if(search){ const s=search.toLowerCase(); list=list.filter(r=>((r.customer_name||"")+" "+(r.message||"")+" "+(r.channel||"")+" "+(r.customer_contact||"")).toLowerCase().includes(s)); }
    const wrap=$("cards");
    if(!list.length){ wrap.innerHTML=emptyHTML("emptyInqBig","emptyInqSub"); return; }
    wrap.innerHTML=list.map(cardHTML).join("");
  }

  function emptyHTML(big,sub){ return '<div class="empty"><div class="big">'+esc(T(big))+'</div><div>'+esc(T(sub))+'</div><div class="hand">'+esc(T("hand"))+'</div></div>'; }

  function cardHTML(r){
    const isBooking = r.kind==="booking";
    const calledLabel = r.called ? (esc(T("called"))+(r.called_at?' \u00b7 '+fmtDate(r.called_at):'')) : esc(T("markCalled"));
    const notes=(notesByInq[r.id]||[]);
    const myRoleNote = isAdmin?"admin":"client";
    // unread notes from the other party (drives auto-open)
    const hasUnread = notes.some(n=>n.author_role && n.author_role!==myRoleNote && !notifRead["note-"+n.id]);
    const notesHTML = notes.map(n=>{
      const mine = (n.author_role===myRoleNote);
      const ctrls = mine ? '<span class="note-ctrls"><span class="note-edit" data-act="noteEdit" data-nid="'+n.id+'">\u270e</span><span class="note-del" data-act="noteDel" data-nid="'+n.id+'">\u00d7</span></span>' : '';
      return '<div class="note" data-noteid="'+n.id+'"><div class="nmeta"><span class="who-tag '+(n.author_role==="admin"?"admin":"client")+'">'+esc(n.author_role==="admin"?T("admin"):T("client"))+'</span><span class="ntime" title="'+esc(fmtExact(n.created_at))+'">'+fmtExact(n.created_at)+'</span>'+ctrls+'</div><div class="nbody">'+esc(n.body)+'</div></div>';
    }).join("");
    // next scheduled action linked to this inquiry
    const acts=reminders.filter(x=>x.inquiry_id===r.id && !x.done).sort((a,b)=>new Date(a.due_at)-new Date(b.due_at));
    const next=acts[0];
    const nextHTML = next ? '<div class="next-action"><span class="na-ic">\u23F0</span>'+esc(actionLabel(next.kind))+' \u00b7 '+esc(fmtWhen(next.due_at))+'</div>' : '';
    // pipeline
    const steps=[["new",T("statusNew")],["contacted",T("statusContacted")],["booked",T("statusBooked")],["closed",T("statusClosed")]];
    const curIdx=steps.findIndex(s=>s[0]===r.status);
    const pipeline='<div class="pipe">'+steps.map((s,i)=>'<button class="pstep'+(i===curIdx?' on':'')+(i<curIdx?' past':'')+'" data-act="pstep" data-st="'+s[0]+'">'+esc(s[1])+'</button>').join("")+'</div>';
    return ''+
    '<div class="card'+(isBooking?' is-booking':'')+'" data-id="'+r.id+'">'+
      '<div class="card-top"><div>'+
        '<div class="card-name">'+esc(r.customer_name||"\u2014")+'<span class="kind-tag '+(isBooking?'':'inq')+'">'+esc(isBooking?T("booking"):T("inquiry"))+'</span></div>'+
        '<div class="card-meta">'+
          (r.channel?'<span class="badge">'+esc(r.channel)+'</span>':'')+
          (isBooking&&r.booking_at?'<span class="appt-when">'+fmtWhen(r.booking_at)+'</span>':'')+
          '<span class="time">'+fmtDate(r.created_at)+'</span>'+
        '</div>'+
        (r.customer_contact?'<div class="contact">'+esc(r.customer_contact)+'</div>':'')+
      '</div></div>'+
      (r.message?'<div class="msg">'+esc(r.message)+'</div>':'')+
      pipeline+
      nextHTML+
      '<div class="card-actions">'+
        '<button class="mini-btn'+(r.called?' done':'')+'" data-act="call">&#9742; '+calledLabel+'</button>'+
        '<button class="mini-btn alt" data-act="schedule">+ '+esc(T("schedule"))+'</button>'+
        ((isAdmin||r.created_by==="client")?'<button class="del-btn" data-act="del">'+esc(T("del"))+'</button>':'')+
      '</div>'+
      '<div class="notes-sec'+(hasUnread?' open':'')+'" data-noteswrap>'+
        '<button class="notes-toggle" data-act="notesToggle"><span>'+esc(T("notesHead"))+' ('+notes.length+')</span><span class="nt-caret">\u25BE</span>'+(hasUnread?'<span class="nt-unread"></span>':'')+'</button>'+
        '<div class="notes-body">'+notesHTML+
          '<div class="note-add"><input type="text" data-act="noteInput" placeholder="'+esc(T("notePlace"))+'"><button class="btn btn-ghost btn-sm" data-act="noteSend">'+esc(T("send"))+'</button></div>'+
        '</div>'+
      '</div>'+
    '</div>';
  }
  function actionLabel(k){ return {call:T("actCall"),followup:T("actFollow"),appointment:T("actAppt"),email:T("actEmail"),other:T("actOther")}[k]||T("actOther"); }

  // ===== clients (admin, live from Stripe) =====
  let clientsData=null, clientsLoading=false, clientNotes={};
  async function loadClients(force){
    if(!isAdmin) return;
    if(clientsData && !force) return;
    if(clientsLoading) return;
    clientsLoading=true; renderClients();
    try{
      const r=await fetch(CFG.clientsFn,{method:"POST",headers:{"Content-Type":"application/json","Authorization":"Bearer "+CFG.key,"apikey":CFG.key},body:JSON.stringify({requester:user.email})});
      const d=await r.json();
      clientsData = (d && d.clients) ? d.clients : [];
      if(d && d.error) clientsData={__error:d.error};
    }catch(e){ clientsData={__error:String(e)}; }
    // internal notes
    try{ const {data}=await sb.from("client_notes").select("*").order("created_at",{ascending:true}); clientNotes={}; (data||[]).forEach(n=>{ (clientNotes[(n.client_email||"").toLowerCase()]=clientNotes[(n.client_email||"").toLowerCase()]||[]).push(n); }); }catch(e){}
    clientsLoading=false; renderClients();
  }
  function renderClients(){
    const wrap=$("clientsWrap");
    if(clientsLoading || clientsData===null){ wrap.innerHTML='<div class="cl-loading">'+esc(T("loading"))+'</div>'; return; }
    if(clientsData && clientsData.__error){ wrap.innerHTML='<div class="cl-loading">'+esc(T("clientsErr"))+'<br><small style="opacity:.6">'+esc(clientsData.__error)+'</small></div>'; return; }
    const list = Array.isArray(clientsData)?clientsData:[];
    // merge duplicates by email (a client may have >1 sub line); here each sub is a row already
    const totalMRR = list.reduce((a,c)=>a+(c.mrr||0),0);
    const active = list.filter(c=>c.status==="active"||c.status==="trialing").length;
    const summary='<div class="cl-summary">'+
      '<div class="cl-stat"><div class="n">'+list.length+'</div><div class="l">'+esc(T("clClients"))+'</div></div>'+
      '<div class="cl-stat"><div class="n">'+active+'</div><div class="l">'+esc(T("clActive"))+'</div></div>'+
      '<div class="cl-stat"><div class="n">$'+totalMRR.toLocaleString("en-US",{maximumFractionDigits:0})+'</div><div class="l">'+esc(T("clMRR"))+'</div></div></div>';
    if(!list.length){ wrap.innerHTML=summary+'<div class="cl-loading">'+esc(T("clNone"))+'</div>'; return; }
    wrap.innerHTML = summary + list.map(c=>{
      const em=(c.email||"").toLowerCase();
      const notes=(clientNotes[em]||[]);
      const notesHTML=notes.map(n=>'<div class="cl-note" data-cnid="'+n.id+'"><div><div>'+esc(n.body)+'</div><div class="cl-note-time">'+fmtExact(n.created_at)+'</div></div><span class="cl-note-ctrls"><span class="x" data-cnact="edit">\u270e</span><span class="x del" data-cnact="del">\u00d7</span></span></div>').join("");
      const st=(c.status||"").replace(/[^a-z_]/g,"");
      return '<div class="client-card" data-cemail="'+esc(em)+'">'+
        '<div class="client-top"><div>'+
          '<div class="client-name">'+esc(c.name||c.email||"\u2014")+'</div>'+
          (c.email?'<div class="client-email">'+esc(c.email)+'</div>':'')+
        '</div><span class="cl-status '+st+'">'+esc(c.status||"")+'</span></div>'+
        '<div class="cl-items">'+(c.items||[]).map(i=>'<span class="cl-item">'+esc(i)+'</span>').join("")+'</div>'+
        '<div class="cl-mrr">$'+(c.mrr||0).toLocaleString("en-US",{maximumFractionDigits:0})+' <small>'+esc(T("perMonth"))+'</small></div>'+
        '<div class="cl-notes"><div class="nh">'+esc(T("internalNotes"))+'</div>'+notesHTML+
          '<div class="cl-note-add"><input type="text" data-cnact="input" placeholder="'+esc(T("addInternal"))+'"><button class="btn btn-ghost btn-sm" data-cnact="add">'+esc(T("send"))+'</button></div>'+
        '</div></div>';
    }).join("");
  }
  // client notes events
  $("clientsWrap").addEventListener("click", async e=>{
    const card=e.target.closest(".client-card"); if(!card) return;
    const email=card.getAttribute("data-cemail");
    if(e.target.closest('[data-cnact="add"]')){
      const input=card.querySelector('[data-cnact="input"]'); const body=(input.value||"").trim(); if(!body) return;
      const {data,error}=await sb.from("client_notes").insert({client_email:email,body:body}).select();
      if(!error){ (clientNotes[email]=clientNotes[email]||[]).push((data&&data[0])||{id:Math.random(),body:body}); input.value=""; renderClients(); }
      return;
    }
    const del=e.target.closest('[data-cnact="del"]');
    if(del){ const id=del.closest("[data-cnid]").getAttribute("data-cnid"); if(confirm(lang==="es"?"\u00bfBorrar esta nota?":"Delete this note?")){ await sb.from("client_notes").delete().eq("id",id); clientNotes[email]=(clientNotes[email]||[]).filter(n=>String(n.id)!==String(id)); renderClients(); } return; }
    const edit=e.target.closest('[data-cnact="edit"]');
    if(edit){ const id=edit.closest("[data-cnid]").getAttribute("data-cnid"); const note=(clientNotes[email]||[]).find(n=>String(n.id)===String(id)); if(!note) return; const nv=prompt(lang==="es"?"Editar nota:":"Edit note:", note.body); if(nv!=null && nv.trim()){ const {error}=await sb.from("client_notes").update({body:nv.trim()}).eq("id",id); if(!error){ note.body=nv.trim(); renderClients(); } } return; }
  });
  $("clientsWrap").addEventListener("keydown", e=>{ if(e.key==="Enter" && e.target.matches('[data-cnact="input"]')){ e.target.closest(".client-card").querySelector('[data-cnact="add"]').click(); } });

  // ===== calendar =====
  let calRef = new Date(); calRef.setDate(1);
  let calSelDay = null;
  function calEvents(){
    // returns map 'YYYY-M-D' -> [{type,title,time,id}]
    const map={};
    const add=(d,ev)=>{ if(!d) return; const k=d.getFullYear()+"-"+d.getMonth()+"-"+d.getDate(); (map[k]=map[k]||[]).push(ev); };
    inquiries.forEach(r=>{ if(r.kind==="booking" && r.booking_at){ add(new Date(r.booking_at),{type:"booking",title:r.customer_name||T("booking"),time:r.booking_at,id:r.id}); } });
    reminders.forEach(r=>{ add(new Date(r.due_at),{type:"rem",title:r.title,time:r.due_at,id:r.id,done:r.done}); });
    return map;
  }
  function renderCalendar(){
    const wrap=$("calendarWrap");
    const evs=calEvents();
    const y=calRef.getFullYear(), m=calRef.getMonth();
    const monthName = calRef.toLocaleDateString(lang==="es"?"es-PR":"en-US",{month:"long",year:"numeric"});
    const firstDow = new Date(y,m,1).getDay();
    const daysIn = new Date(y,m+1,0).getDate();
    const dows = lang==="es"?["D","L","M","M","J","V","S"]:["S","M","T","W","T","F","S"];
    const today=new Date();
    let cells="";
    for(let i=0;i<firstDow;i++) cells+='<div class="cal-cell empty"></div>';
    for(let d=1; d<=daysIn; d++){
      const k=y+"-"+m+"-"+d;
      const isToday = today.getFullYear()===y && today.getMonth()===m && today.getDate()===d;
      const list=(evs[k]||[]);
      let evHTML=list.slice(0,2).map(e=>'<div class="cal-ev'+(e.type==="rem"?" rem":"")+'">'+esc(e.title)+'</div>').join("");
      if(list.length>2) evHTML+='<div class="cal-more">+'+(list.length-2)+'</div>';
      cells+='<div class="cal-cell'+(isToday?" today":"")+'" data-day="'+d+'"><span class="cal-date">'+d+'</span>'+evHTML+'</div>';
    }
    let detail="";
    if(calSelDay){
      const k=y+"-"+m+"-"+calSelDay; const list=(evs[k]||[]);
      detail='<div class="cal-day-detail"><h4>'+calSelDay+" "+calRef.toLocaleDateString(lang==="es"?"es-PR":"en-US",{month:"long"})+'</h4>'+
        (list.length?list.map(e=>'<div class="cal-di"><span class="dot'+(e.type==="rem"?" rem":"")+'"></span><span>'+fmtWhen(e.time)+'</span><span>'+esc(e.title)+'</span></div>').join(""):'<div class="cal-di">'+esc(T("emptyRemSub"))+'</div>')+'</div>';
    }
    wrap.innerHTML =
      '<div class="cal-head"><h3>'+esc(monthName)+'</h3><div class="cal-nav"><button data-cal="prev">&#8249;</button><button data-cal="today">&#8226;</button><button data-cal="next">&#8250;</button></div></div>'+
      '<div class="cal-grid">'+dows.map(d=>'<div class="cal-dow">'+d+'</div>').join("")+cells+'</div>'+detail;
  }
  // calendar interactions
  document.addEventListener("click", e=>{
    const nav=e.target.closest("[data-cal]"); if(nav){ const a=nav.getAttribute("data-cal"); if(a==="prev")calRef.setMonth(calRef.getMonth()-1); else if(a==="next")calRef.setMonth(calRef.getMonth()+1); else {calRef=new Date();calRef.setDate(1);} calSelDay=null; renderCalendar(); return; }
    const cell=e.target.closest(".cal-cell[data-day]"); if(cell && $("calendarWrap").contains(cell)){ calSelDay=parseInt(cell.getAttribute("data-day"),10); renderCalendar(); }
  });

  function renderReminders(){
    let list=reminders.slice();
    const wrap=$("cards");
    if(!list.length){ wrap.innerHTML=emptyHTML("emptyRemBig","emptyRemSub"); return; }
    const now=Date.now();
    wrap.innerHTML=list.map(r=>{
      const overdue = !r.done && new Date(r.due_at).getTime()<now;
      const kindLabel = r.kind==="appointment"?T("appointment"):T("followup");
      return '<div class="card" data-rid="'+r.id+'">'+
        '<div class="card-top"><div>'+
          '<div class="card-name">'+esc(r.title)+'<span class="kind-tag '+(r.kind==="appointment"?'':'inq')+'">'+esc(kindLabel)+'</span></div>'+
          '<div class="card-meta"><span class="appt-when"'+(overdue?' style="background:#FBE4DE;color:#A82A61"':'')+'>'+(overdue?esc(T("overdue"))+' \u00b7 ':'')+fmtWhen(r.due_at)+'</span></div>'+
        '</div></div>'+
        '<div class="card-actions">'+
          '<button class="mini-btn'+(r.done?' done':'')+'" data-ract="done">&#10003; '+(r.done?esc(T("called")):esc(T("statusBooked")))+'</button>'+
          '<button class="del-btn" data-ract="del">'+esc(T("del"))+'</button>'+
        '</div></div>';
    }).join("");
  }

  // ===== mutations =====
  async function patchInq(id,f){ f.updated_at=new Date().toISOString(); const {error}=await sb.from("inquiries").update(f).eq("id",id); if(error){console.warn(error);return false;} const row=inquiries.find(r=>r.id===id); if(row)Object.assign(row,f); return true; }

  // card events
  $("cards").addEventListener("change", async e=>{
    const card=e.target.closest(".card"); if(!card) return;
    if(e.target.matches('[data-act="status"]')){ await patchInq(card.getAttribute("data-id"),{status:e.target.value}); render(); }
  });
  $("cards").addEventListener("click", async e=>{
    const card=e.target.closest(".card"); if(!card) return;
    // inquiry actions
    if(card.hasAttribute("data-id")){
      const id=card.getAttribute("data-id");
      if(e.target.closest('[data-act="pstep"]')){ const st=e.target.closest('[data-act="pstep"]').getAttribute("data-st"); await patchInq(id,{status:st}); render(); return; }
      if(e.target.closest('[data-act="notesToggle"]')){ const sec=card.querySelector('[data-noteswrap]'); sec.classList.toggle("open"); if(sec.classList.contains("open")){ (notesByInq[id]||[]).forEach(n=>{ notifRead["note-"+n.id]=1; }); saveNotifState(); updateBadge(); } return; }
      if(e.target.closest('[data-act="schedule"]')){ openSchedule(id); return; }
      if(e.target.closest('[data-act="call"]')){ const row=inquiries.find(r=>r.id===id); const now=!row.called; await patchInq(id,{called:now,called_at:now?new Date().toISOString():null}); render(); return; }
      if(e.target.closest('[data-act="del"]')){ if(confirm(lang==="es"?"\u00bfEliminar?":"Delete?")){ await sb.from("inquiries").delete().eq("id",id); inquiries=inquiries.filter(r=>r.id!==id); render(); } return; }
      if(e.target.closest('[data-act="noteSend"]')){
        const input=card.querySelector('[data-act="noteInput"]'); const body=(input.value||"").trim(); if(!body) return;
        const row=inquiries.find(r=>r.id===id);
        const note={inquiry_id:id, client_email:row.client_email, body:body, author_role:isAdmin?"admin":"client", author_email:user.email};
        const {data,error}=await sb.from("notes").insert(note).select();
        if(!error){ (notesByInq[id]=notesByInq[id]||[]).push((data&&data[0])||note); input.value=""; render(); }
        return;
      }
      const nDel=e.target.closest('[data-act="noteDel"]');
      if(nDel){ const nid=nDel.getAttribute("data-nid"); if(confirm(lang==="es"?"\u00bfBorrar esta nota?":"Delete this note?")){ await sb.from("notes").delete().eq("id",nid); notesByInq[id]=(notesByInq[id]||[]).filter(n=>String(n.id)!==String(nid)); render(); } return; }
      const nEdit=e.target.closest('[data-act="noteEdit"]');
      if(nEdit){ const nid=nEdit.getAttribute("data-nid"); const note=(notesByInq[id]||[]).find(n=>String(n.id)===String(nid)); if(!note) return; const nv=prompt(lang==="es"?"Editar nota:":"Edit note:", note.body); if(nv!=null && nv.trim()){ const {error}=await sb.from("notes").update({body:nv.trim()}).eq("id",nid); if(!error){ note.body=nv.trim(); render(); } } return; }
    }
    // reminder actions
    if(card.hasAttribute("data-rid")){
      const id=card.getAttribute("data-rid");
      if(e.target.closest('[data-ract="done"]')){ const row=reminders.find(r=>r.id===id); const nd=!row.done; const {error}=await sb.from("reminders").update({done:nd}).eq("id",id); if(!error){row.done=nd; render();} return; }
      if(e.target.closest('[data-ract="del"]')){ if(confirm(lang==="es"?"\u00bfEliminar?":"Delete?")){ await sb.from("reminders").delete().eq("id",id); reminders=reminders.filter(r=>r.id!==id); render(); } return; }
    }
  });
  $("cards").addEventListener("keydown", e=>{ if(e.key==="Enter" && e.target.matches('[data-act="noteInput"]')){ const card=e.target.closest(".card"); card.querySelector('[data-act="noteSend"]').click(); } });

  // ===== add inquiry/booking sheet =====
  function setAddKind(k){ addKind=k; document.querySelectorAll('#addSeg button').forEach(b=>b.classList.toggle("on",b.getAttribute("data-kind")===k)); $("fWhenWrap").style.display = k==="booking"?"":"none"; }
  $("addSeg").addEventListener("click", e=>{ const b=e.target.closest("button[data-kind]"); if(b) setAddKind(b.getAttribute("data-kind")); });
  $("addSubmit").addEventListener("click", async ()=>{
    const out=$("addMsg"); out.textContent="";
    const client = isAdmin ? $("fClient").value.trim().toLowerCase() : user.email.toLowerCase();
    const payload={ client_email:client, customer_name:$("fName").value.trim(), channel:$("fChannel").value,
      customer_contact:$("fContact").value.trim(), message:$("fMsg").value.trim(),
      status:"new", called:false, kind:addKind, created_by:isAdmin?"admin":"client" };
    if(addKind==="booking"){ const w=$("fWhen").value; if(w) payload.booking_at=new Date(w).toISOString(); }
    if(!client || (!payload.message && !payload.customer_name)){ out.style.color="#FF6F61"; out.textContent=T("needFields"); return; }
    const {error}=await sb.from("inquiries").insert(payload);
    if(error){ out.style.color="#FF6F61"; out.textContent=error.message; return; }
    out.style.color="#347D79"; out.textContent=T("added")+" \u2713";
    $("fName").value="";$("fContact").value="";$("fMsg").value=""; if($("fWhen"))$("fWhen").value="";
    await loadAll(); setTimeout(()=>{ closeOverlay("addOverlay"); out.textContent=""; },700);
  });

  // ===== schedule action on an inquiry =====
  let schedInqId=null;
  function openSchedule(id){ schedInqId=id; $("schedMsg").textContent=""; $("sNote").value=""; $("sWhen").value=""; openOverlay("schedOverlay"); }
  $("schedSubmit").addEventListener("click", async ()=>{
    const out=$("schedMsg"); out.textContent="";
    const row=inquiries.find(r=>r.id===schedInqId); if(!row){ closeOverlay("schedOverlay"); return; }
    const w=$("sWhen").value; if(!w){ out.style.color="#FF6F61"; out.textContent=T("needFields"); return; }
    const type=$("sType").value; const note=$("sNote").value.trim();
    const title=(actionLabel(type))+(row.customer_name?(" \u00b7 "+row.customer_name):"")+(note?(" \u00b7 "+note):"");
    const remKindMap={appointment:"appointment"}; const rk=remKindMap[type]||"followup";
    const payload={ client_email:row.client_email, inquiry_id:row.id, title:title, kind:rk, due_at:new Date(w).toISOString(), done:false, created_by:isAdmin?"admin":"client" };
    const {error}=await sb.from("reminders").insert(payload);
    if(error){ out.style.color="#FF6F61"; out.textContent=error.message; return; }
    out.style.color="#347D79"; out.textContent=T("added")+" \u2713";
    await loadAll(); setTimeout(()=>{ closeOverlay("schedOverlay"); out.textContent=""; },650);
  });

  // ===== add reminder sheet =====
  function setRemKind(k){ remKind=k; document.querySelectorAll('#remSeg button').forEach(b=>b.classList.toggle("on",b.getAttribute("data-rkind")===k)); }
  $("remSeg").addEventListener("click", e=>{ const b=e.target.closest("button[data-rkind]"); if(b) setRemKind(b.getAttribute("data-rkind")); });
  $("remSubmit").addEventListener("click", async ()=>{
    const out=$("remMsg"); out.textContent="";
    const client = isAdmin ? $("rClient").value.trim().toLowerCase() : user.email.toLowerCase();
    const title=$("rTitleIn").value.trim(); const w=$("rWhen").value;
    if(!client || !title || !w){ out.style.color="#FF6F61"; out.textContent=T("needFields"); return; }
    const payload={ client_email:client, title:title, kind:remKind, due_at:new Date(w).toISOString(), done:false, created_by:isAdmin?"admin":"client" };
    const {error}=await sb.from("reminders").insert(payload);
    if(error){ out.style.color="#FF6F61"; out.textContent=error.message; return; }
    out.style.color="#347D79"; out.textContent=T("added")+" \u2713";
    $("rTitleIn").value="";$("rWhen").value="";
    await loadAll(); setTimeout(()=>{ closeOverlay("remOverlay"); out.textContent=""; },700);
  });

  // ===== overlays =====
  function openOverlay(id){ $(id).classList.add("open"); }
  function closeOverlay(id){ $(id).classList.remove("open"); }
  document.querySelectorAll("[data-close]").forEach(b=>b.addEventListener("click",()=>closeOverlay(b.getAttribute("data-close"))));
  document.querySelectorAll(".overlay").forEach(o=>o.addEventListener("click",e=>{ if(e.target===o) o.classList.remove("open"); }));

  // ===== tabs/filters/search =====
  $("panel").addEventListener("click", e=>{ const t=e.target.closest(".tile"); if(!t) return; const f=t.getAttribute("data-f"); if(f==="reminders"){ tab="reminders"; } else { tab="inquiries"; filter=f; } render(); });
  $("tabs").addEventListener("click", e=>{ const t=e.target.closest(".tab"); if(!t) return; tab=t.getAttribute("data-tab"); if(tab==="clients") loadClients(false); render(); });
  $("searchInput").addEventListener("input", e=>{ search=e.target.value; render(); });
  $("langToggle").addEventListener("click", ()=>{ lang=lang==="es"?"en":"es"; applyLang(); });
  $("logoutBtn").addEventListener("click", async ()=>{ await sb.auth.signOut(); location.reload(); });

  // ===== bell =====
  $("bellBtn").addEventListener("click", ()=>{
    const p=$("notifPanel"); p.classList.toggle("open");
    if(p.classList.contains("open")){ renderNotifs(); }
  });
  $("notifClear").addEventListener("click", ()=>{
    // mark all currently-shown-as-unread as read, and delete (clear) them from the list
    notifs.forEach(n=>{ notifRead[n.id]=1; });
    saveNotifState(); updateBadge(); renderNotifs();
  });
  $("notifTabs").addEventListener("click", e=>{ const t=e.target.closest(".ntab"); if(!t) return; notifTab=t.getAttribute("data-ntab"); renderNotifs(); });
  $("notifFilter").addEventListener("click", e=>{ const t=e.target.closest(".nfilt"); if(!t) return; notifFilt=t.getAttribute("data-nfilt"); renderNotifs(); });
  $("notifList").addEventListener("click", e=>{
    const row=e.target.closest(".notif"); if(!row) return; const id=row.getAttribute("data-nid");
    if(e.target.closest('[data-nact="del"]')){ notifDeleted[id]=1; saveNotifState(); buildNotifs(); renderNotifs(); return; }
    // clicking a notification marks it read
    notifRead[id]=1; saveNotifState(); updateBadge(); renderNotifs();
  });
  document.addEventListener("click", e=>{ if(!e.target.closest("#notifPanel") && !e.target.closest("#bellBtn")) $("notifPanel").classList.remove("open"); });

  // ===== realtime =====
  function subscribe(){
    try{
      sb.channel("portal-"+(user.id||"x"))
        .on("postgres_changes",{event:"*",schema:"public",table:"inquiries"},()=>loadAll())
        .on("postgres_changes",{event:"*",schema:"public",table:"reminders"},()=>loadAll())
        .on("postgres_changes",{event:"*",schema:"public",table:"notes"},()=>loadAll())
        .subscribe();
    }catch(e){ console.warn("realtime",e); }
  }

  // ===== gate login =====
  $("gLogin").addEventListener("click", async ()=>{
    const email=$("gEmail").value.trim(); const pass=$("gPass").value; $("gErr").textContent="";
    const {error}=await sb.auth.signInWithPassword({email,password:pass});
    if(error){ $("gErr").textContent=lang==="es"?"No pudimos iniciar sesi\u00f3n. Revisa tus datos.":"We couldn't log you in. Check your details."; return; }
    location.reload();
  });
  $("gPass").addEventListener("keydown", e=>{ if(e.key==="Enter") $("gLogin").click(); });

  applyLang(); boot();
})();
</script>
</body>
</html>
