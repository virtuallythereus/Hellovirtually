<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Workspace , Hello, virtually!</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%23F0EEE9'/%3E%3Ctext x='50' y='68' font-family='Georgia,serif' font-size='52' font-style='italic' font-weight='700' fill='%231F3D3A' text-anchor='middle'%3Eh%3C/text%3E%3Ccircle cx='72' cy='30' r='9' fill='%23CE3375'/%3E%3C/svg%3E">
<style>
:root{
  --ink:#173D35; --ink-2:#2d5a4e; --ink-3:rgba(23,61,53,.55);
  --paper:#F7F5F0; --paper-2:#EEECEA; --white:#ffffff;
  --coral:#F45145; --coral-soft:#e03b31;
  --lav:#B9A7FF; --lav-pale:#EEE9FF;
  --blue:#C9E7F5; --blue-pale:#E8F5FC;
  --mint:#DCEBE8; --mint-2:#c8dbd7;
  --line:rgba(23,61,53,.12); --line-2:rgba(23,61,53,.06);
  --shadow:0 2px 8px rgba(23,61,53,.08);
  --shadow-md:0 8px 24px rgba(23,61,53,.12);
  --shadow-lg:0 20px 60px rgba(23,61,53,.16);
  --radius:14px; --radius-sm:10px; --radius-xs:8px;
  --sidebar:252px;
  --anim:.18s cubic-bezier(.4,0,.2,1);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Helvena','Helvetica Neue',sans-serif;background:var(--paper);color:var(--ink);line-height:1.5;-webkit-font-smoothing:antialiased;}
h1,h2,h3,h4{font-family:'Helvena','Helvetica Neue',sans-serif;font-weight:600;line-height:1.1;letter-spacing:-.3px;}
a{color:var(--coral);text-decoration:none;}
button{font-family:inherit;cursor:pointer;}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;font-weight:700;font-size:.78rem;letter-spacing:.2px;padding:10px 18px;border-radius:var(--radius-sm);border:none;transition:all var(--anim);}
.btn-primary{background:var(--coral);color:#fff;}
.btn-primary:hover{background:var(--coral-soft);transform:translateY(-1px);box-shadow:var(--shadow-md);}
.btn-ghost{background:var(--white);border:1.5px solid var(--line);color:var(--ink);}
.btn-ghost:hover{border-color:var(--ink);background:var(--paper-2);}
.btn-sm{padding:7px 13px;font-size:.72rem;border-radius:var(--radius-xs);}
.btn-block{width:100%;}

/* ===== SHELL ===== */
.shell{display:flex;min-height:100vh;}

/* ===== SIDEBAR ===== */
.sidebar{
  width:var(--sidebar);flex-shrink:0;background:var(--ink);color:#fff;
  display:flex;flex-direction:column;position:fixed;top:0;bottom:0;left:0;z-index:50;
}
.sb-brand{
  padding:24px 20px 20px;display:flex;align-items:center;gap:0;
  font-family:'Lonelline','Georgia',serif;font-weight:400;font-size:1.4rem;color:#fff;
  letter-spacing:-.5px;line-height:1;
}
.sb-brand .dot{width:7px;height:7px;border-radius:50%;background:var(--coral);display:inline-block;margin-left:2px;margin-bottom:10px;}
.sb-nav{flex:1;padding:6px 12px;display:flex;flex-direction:column;gap:2px;}
.nav-item{
  display:flex;align-items:center;gap:10px;padding:10px 12px;
  border-radius:var(--radius-sm);color:rgba(255,255,255,.58);font-weight:600;font-size:.84rem;
  cursor:pointer;transition:all var(--anim);border:none;background:none;text-align:left;width:100%;position:relative;
}
.nav-item:hover{background:rgba(255,255,255,.08);color:rgba(255,255,255,.9);}
.nav-item.active{background:rgba(255,255,255,.12);color:#fff;}
.nav-item .ic{width:17px;height:17px;flex-shrink:0;opacity:.7;}
.nav-item.active .ic{opacity:1;}
.nav-item .nv-badge{
  margin-left:auto;background:var(--coral);color:#fff;font-size:.58rem;font-weight:800;
  min-width:18px;height:18px;border-radius:50px;display:flex;align-items:center;justify-content:center;padding:0 5px;
}
.sb-foot{padding:14px 12px;border-top:1px solid rgba(255,255,255,.1);display:flex;align-items:center;gap:9px;}
.sb-avatar{
  width:32px;height:32px;border-radius:50%;background:var(--coral);color:#fff;
  display:flex;align-items:center;justify-content:center;font-weight:800;font-size:.8rem;flex-shrink:0;
}
.sb-user{flex:1;min-width:0;}
.sb-user .e{font-size:.72rem;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.sb-user .r{font-size:.55rem;letter-spacing:1px;text-transform:uppercase;color:rgba(255,255,255,.45);margin-top:1px;}
.sb-ico{
  background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);color:rgba(255,255,255,.7);
  width:30px;height:30px;border-radius:var(--radius-xs);font-size:.62rem;font-weight:800;
  display:flex;align-items:center;justify-content:center;transition:all var(--anim);
}
.sb-ico:hover{background:rgba(255,255,255,.16);color:#fff;}

/* ===== MAIN ===== */
.main{flex:1;margin-left:var(--sidebar);min-width:0;display:flex;flex-direction:column;}
.topbar{
  position:sticky;top:0;z-index:40;background:rgba(247,245,240,.92);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  border-bottom:1px solid var(--line);padding:14px 28px;
  display:flex;align-items:center;justify-content:space-between;gap:14px;
}
.topbar h1{font-size:1.35rem;font-weight:500;color:var(--ink);}
.topbar h1 em{font-style:italic;color:var(--coral);}
.tb-actions{display:flex;align-items:center;gap:8px;}
.bell{
  position:relative;background:var(--white);border:1.5px solid var(--line);
  width:36px;height:36px;border-radius:var(--radius-sm);
  display:inline-flex;align-items:center;justify-content:center;
  transition:all var(--anim);color:var(--ink);
}
.bell:hover{border-color:var(--ink);background:var(--paper-2);}
.bell-badge{
  position:absolute;top:-6px;right:-6px;min-width:16px;height:16px;padding:0 4px;
  border-radius:50px;background:var(--coral);color:#fff;font-size:.55rem;font-weight:800;
  display:flex;align-items:center;justify-content:center;border:2px solid var(--paper);
}
.content{padding:24px 28px 70px;max-width:1200px;width:100%;}

/* ===== TODAY ===== */
.greet-row{margin-bottom:24px;}
.greet-row .hi{font-family:'Helvena','Helvetica Neue',sans-serif;font-size:1.6rem;font-weight:400;}
.greet-row .hi em{font-style:italic;color:var(--coral);}
.greet-row .date{color:var(--ink-3);font-size:.84rem;margin-top:3px;}
.stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:28px;}
.stat{
  background:var(--white);border:1.5px solid var(--line);border-radius:var(--radius);
  padding:18px 20px;cursor:pointer;transition:all var(--anim);
}
.stat:hover{border-color:var(--ink-2);box-shadow:var(--shadow-md);transform:translateY(-1px);}
.stat .n{font-family:'Helvena','Helvetica Neue',sans-serif;font-size:2rem;font-weight:400;line-height:1;}
.stat .l{font-size:.6rem;font-weight:800;letter-spacing:.8px;text-transform:uppercase;color:var(--ink-3);margin-top:7px;}
.stat.s1 .n{color:var(--coral);}
.stat.s2 .n{color:var(--coral);}
.stat.s3 .n{color:var(--ink-2);}
.stat.s4 .n{color:var(--ink);}
.section-block{margin-bottom:28px;}
.section-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.section-h h3{font-size:1rem;font-weight:600;}
.section-h .sh-link{font-size:.72rem;font-weight:700;color:var(--ink-2);cursor:pointer;opacity:.7;}
.section-h .sh-link:hover{opacity:1;}

/* ===== LISTS / TASK ROWS ===== */
.rowlist{background:var(--white);border:1.5px solid var(--line);border-radius:var(--radius);overflow:hidden;}
.lrow{
  display:flex;align-items:center;gap:12px;padding:13px 18px;
  border-bottom:1px solid var(--line-2);cursor:pointer;transition:background var(--anim);
}
.lrow:last-child{border-bottom:none;}
.lrow:hover{background:var(--paper-2);}
.lrow .chk{
  width:20px;height:20px;border-radius:6px;border:1.5px solid var(--line);
  flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;
  color:#fff;font-size:.65rem;transition:all var(--anim);
}
.lrow .chk.done{background:var(--ink-2);border-color:var(--ink-2);}
.lrow .lr-main{flex:1;min-width:0;}
.lrow .lr-title{font-weight:600;font-size:.88rem;overflow:hidden;text-overflow:ellipsis;}
.lrow .lr-title.done{text-decoration:line-through;color:var(--ink-3);opacity:.6;}
.lrow .lr-sub{font-size:.72rem;color:var(--ink-3);margin-top:1px;}
.lr-when{font-size:.7rem;font-weight:700;color:var(--ink-3);white-space:nowrap;}
.lr-when.overdue{color:var(--coral);}
.prio-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.prio-high{background:var(--coral);}
.prio-normal{background:var(--lav);}
.prio-low{background:var(--line);}
.type-chip{
  font-size:.56rem;font-weight:800;letter-spacing:.4px;text-transform:uppercase;
  padding:3px 8px;border-radius:50px;background:var(--mint);color:var(--ink-2);white-space:nowrap;
}

/* ===== INQUIRY CARDS ===== */
.tbl-toolbar{display:flex;gap:10px;align-items:center;margin-bottom:16px;flex-wrap:wrap;}
.search{
  flex:1;min-width:200px;display:flex;align-items:center;gap:8px;
  background:var(--white);border:1.5px solid var(--line);border-radius:var(--radius-sm);
  padding:9px 14px;transition:border-color var(--anim);
}
.search:focus-within{border-color:var(--ink-2);}
.search input{border:none;outline:none;background:transparent;font-family:inherit;font-size:.86rem;color:var(--ink);width:100%;}
.search input::placeholder{color:var(--ink-3);}

/* Filter tabs */
.filter-pills{display:flex;gap:4px;flex-wrap:wrap;background:var(--white);border:1.5px solid var(--line);border-radius:var(--radius-sm);padding:4px;}
.fpill{
  font-size:.65rem;font-weight:700;letter-spacing:.3px;text-transform:uppercase;
  padding:6px 12px;border-radius:7px;border:none;background:transparent;color:var(--ink-3);cursor:pointer;
  transition:all var(--anim);white-space:nowrap;
}
.fpill:hover{background:var(--paper-2);color:var(--ink);}
.fpill.active{background:var(--ink);color:#fff;}

/* Inquiry card list */
.inq-list{display:flex;flex-direction:column;gap:8px;}
.inq-card{
  display:flex;align-items:center;gap:14px;padding:16px 18px;
  background:var(--white);border:1.5px solid var(--line);border-radius:var(--radius);
  cursor:pointer;transition:all var(--anim);
}
.inq-card:hover{border-color:var(--ink-2);box-shadow:var(--shadow-md);transform:translateY(-1px);}
.inq-av{
  width:42px;height:42px;border-radius:50%;border:1.5px solid var(--line);
  background:var(--mint);color:var(--ink-2);font-family:'Helvena','Helvetica Neue',sans-serif;
  font-weight:800;font-size:.8rem;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;letter-spacing:.02em;
}
.inq-main{flex:1;min-width:0;}
.inq-name{font-family:'Helvena','Helvetica Neue',sans-serif;font-weight:700;font-size:.95rem;color:var(--ink);line-height:1.2;margin-bottom:2px;display:flex;align-items:center;gap:6px;}
.inq-name .nd{width:7px;height:7px;border-radius:50%;background:var(--coral);flex-shrink:0;}
.inq-svc{font-size:.8rem;color:var(--ink-3);margin-bottom:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.inq-sub{font-size:.76rem;color:var(--ink-3);}
.inq-task b{color:var(--ink-2);font-weight:700;}
.inq-right{display:flex;flex-direction:column;align-items:flex-end;gap:8px;flex-shrink:0;}
.inq-arr{
  width:30px;height:30px;border-radius:50%;border:1.5px solid var(--line);
  background:transparent;color:var(--ink-3);font-size:.85rem;
  display:flex;align-items:center;justify-content:center;transition:all var(--anim);
}
.inq-arr:hover{background:var(--ink);color:#fff;border-color:var(--ink);}

/* Status pills */
.pill{
  display:inline-flex;align-items:center;gap:5px;
  font-family:'Helvena','Helvetica Neue',sans-serif;font-size:.64rem;font-weight:700;letter-spacing:.04em;
  padding:4px 10px;border-radius:50px;border:1.5px solid transparent;white-space:nowrap;
}
.pill-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
/* status colors */
.pill.new{background:var(--lav-pale);border-color:rgba(185,167,255,.3);color:#6b52cc;}
.pill.new .pill-dot{background:var(--lav);}
.pill.contacting,.pill.contacted{background:var(--blue-pale);border-color:rgba(201,231,245,.5);color:#2a7fa8;}
.pill.contacting .pill-dot,.pill.contacted .pill-dot{background:var(--blue);}
.pill.qualified{background:#edfaf3;border-color:#c5eed9;color:#1a7a45;}
.pill.qualified .pill-dot{background:#4caf50;}
.pill.estimate_sent,.pill.estimate-sent{background:#fff3e0;border-color:#ffd99e;color:#b36000;}
.pill.estimate_sent .pill-dot,.pill.estimate-sent .pill-dot{background:#ff9800;}
.pill.follow_up,.pill.follow-up{background:var(--mint);border-color:var(--mint-2);color:var(--ink-2);}
.pill.follow_up .pill-dot,.pill.follow-up .pill-dot{background:var(--ink-2);}
.pill.won{background:#edfaf3;border-color:#c5eed9;color:#1a7a45;}
.pill.won .pill-dot{background:#4caf50;}
.pill.lost,.pill.closed{background:var(--paper-2);border-color:var(--line);color:var(--ink-3);}
.pill.lost .pill-dot,.pill.closed .pill-dot{background:var(--line);}
/* Old pill classes (legacy) */
.pill.booked{background:var(--lav-pale);border-color:rgba(185,167,255,.3);color:#6b52cc;}

/* CRM head hidden */
.crm-head{display:none;}
.crm-table,.crm-row{display:none;}

/* Empty state */
.empty{text-align:center;padding:60px 20px;color:var(--ink-3);}
.empty .big{font-family:'Helvena','Helvetica Neue',sans-serif;font-style:italic;font-size:1.3rem;color:var(--ink-2);margin-bottom:8px;}
.empty .hand{font-family:'SFT Script',cursive;font-size:1.2rem;color:var(--coral);margin-top:8px;}

/* ===== DETAIL DRAWER ===== */
.drawer-bg{position:fixed;inset:0;background:rgba(23,61,53,.3);backdrop-filter:blur(4px);z-index:90;opacity:0;pointer-events:none;transition:opacity .25s;}
.drawer-bg.open{opacity:1;pointer-events:auto;}
.drawer{
  position:fixed;top:0;right:0;bottom:0;width:480px;max-width:92vw;
  background:var(--paper);z-index:95;box-shadow:var(--shadow-lg);
  transform:translateX(100%);transition:transform .28s cubic-bezier(.4,0,.2,1);
  display:flex;flex-direction:column;
}
.drawer.open{transform:translateX(0);}
.drawer-head{
  padding:20px 22px 18px;border-bottom:1px solid var(--line);
  display:flex;align-items:flex-start;justify-content:space-between;gap:12px;background:var(--white);
}
.drawer-head h2{font-size:1.2rem;font-weight:600;}
.drawer-head .dh-sub{font-size:.76rem;color:var(--ink-3);margin-top:4px;display:flex;gap:7px;align-items:center;flex-wrap:wrap;}
.drawer-close{background:none;border:none;font-size:1.4rem;color:var(--ink-3);cursor:pointer;line-height:1;padding:2px 4px;border-radius:6px;transition:all var(--anim);}
.drawer-close:hover{color:var(--ink);background:var(--paper-2);}
.drawer-body{flex:1;overflow-y:auto;padding:20px 22px;}
.dsec{margin-bottom:22px;}
.dsec-l{font-size:.58rem;font-weight:800;letter-spacing:.8px;text-transform:uppercase;color:var(--ink-3);margin-bottom:8px;}
.dmsg{background:var(--white);border:1.5px solid var(--line);border-radius:var(--radius-sm);padding:13px 16px;font-size:.9rem;white-space:pre-wrap;line-height:1.6;}

/* Pipeline steps */
.pipe{display:flex;gap:5px;flex-wrap:wrap;}
.pstep{
  flex:1;min-width:60px;font-size:.62rem;font-weight:700;letter-spacing:.3px;text-transform:uppercase;
  padding:8px 6px;border-radius:var(--radius-xs);border:1.5px solid var(--line);
  background:var(--white);color:var(--ink-3);cursor:pointer;transition:all var(--anim);text-align:center;
}
.pstep:hover{border-color:var(--ink-2);color:var(--ink);}
.pstep.past{background:var(--mint);border-color:var(--mint-2);color:var(--ink-2);}
.pstep.on{background:var(--ink);border-color:var(--ink);color:#fff;}

/* Actions in drawer */
.drow{display:flex;gap:8px;flex-wrap:wrap;}
.mini-btn{
  display:inline-flex;align-items:center;gap:6px;font-size:.74rem;font-weight:700;
  padding:9px 14px;border-radius:var(--radius-xs);border:1.5px solid var(--line);
  background:var(--white);color:var(--ink-2);transition:all var(--anim);
}
.mini-btn:hover{border-color:var(--ink);color:var(--ink);}
.mini-btn.done{background:var(--ink);border-color:var(--ink);color:#fff;}
.mini-btn.alt{border-color:var(--lav);color:#6b52cc;}
.mini-btn.alt:hover{background:var(--lav-pale);}
.del-link{background:none;border:none;color:var(--coral);font-weight:700;font-size:.72rem;cursor:pointer;transition:opacity var(--anim);}
.del-link:hover{opacity:.7;}

/* Notes */
.note{background:var(--white);border:1.5px solid var(--line);border-radius:var(--radius-xs);padding:10px 14px;margin-bottom:8px;}
.note .nmeta{display:flex;align-items:center;gap:7px;font-size:.6rem;color:var(--ink-3);margin-bottom:4px;}
.who-tag{font-weight:800;letter-spacing:.4px;text-transform:uppercase;padding:2px 7px;border-radius:50px;font-size:.52rem;}
.who-tag.admin{background:var(--ink);color:#fff;}
.who-tag.client{background:var(--lav-pale);color:#6b52cc;border:1px solid rgba(185,167,255,.3);}
.note .nbody{font-size:.86rem;line-height:1.5;}
.note-ctrls{margin-left:auto;display:flex;gap:8px;}
.note-edit{color:var(--ink-2);cursor:pointer;font-weight:700;font-size:.7rem;}
.note-del{color:var(--coral);cursor:pointer;font-weight:700;font-size:.7rem;}
.note-add{display:flex;gap:8px;margin-top:10px;}
.note-add input{
  flex:1;font-family:inherit;font-size:.84rem;padding:9px 13px;
  border-radius:var(--radius-xs);border:1.5px solid var(--line);background:var(--white);outline:none;
  transition:border-color var(--anim);
}
.note-add input:focus{border-color:var(--ink-2);}
.lrow .lr-sub.reminder{font-size:.74rem;color:var(--ink-2);}

/* ===== MODALS ===== */
.overlay{
  position:fixed;inset:0;background:rgba(23,61,53,.35);backdrop-filter:blur(4px);
  z-index:100;display:none;align-items:flex-start;justify-content:center;
  padding:6vh 16px;overflow-y:auto;
}
.overlay.open{display:flex;}
.sheet{
  background:var(--white);border-radius:18px;width:100%;max-width:460px;
  padding:26px;box-shadow:var(--shadow-lg);
}
.sheet h3{font-size:1.2rem;font-weight:600;margin-bottom:3px;}
.sheet .sub{font-size:.8rem;color:var(--ink-3);margin-bottom:16px;}
.sheet-close{float:right;background:none;border:none;font-size:1.4rem;color:var(--ink-3);cursor:pointer;padding:2px;}
.fld{display:flex;flex-direction:column;gap:5px;margin-bottom:12px;}
.fld label{font-size:.6rem;font-weight:800;letter-spacing:.7px;text-transform:uppercase;color:var(--ink-3);}
.fld input,.fld select,.fld textarea{
  font-family:inherit;font-size:.9rem;padding:10px 13px;
  border-radius:var(--radius-xs);border:1.5px solid var(--line);background:var(--paper);
  color:var(--ink);outline:none;transition:border-color var(--anim);
}
.fld input:focus,.fld select:focus,.fld textarea:focus{border-color:var(--ink-2);}
.fld textarea{resize:vertical;min-height:68px;}
.fld-row{display:grid;grid-template-columns:1fr 1fr;gap:11px;}
.form-msg{font-size:.78rem;min-height:17px;margin-top:3px;}
.seg{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap;}
.seg button{
  flex:1;font-size:.68rem;font-weight:700;letter-spacing:.3px;text-transform:uppercase;
  padding:9px;border-radius:var(--radius-xs);border:1.5px solid var(--line);
  background:var(--white);color:var(--ink-3);transition:all var(--anim);
}
.seg button.on{background:var(--ink);color:#fff;border-color:var(--ink);}

/* ===== NOTIFICATIONS PANEL ===== */
.notif-panel{
  position:fixed;top:64px;right:20px;width:360px;max-width:calc(100vw - 28px);
  background:var(--white);border:1.5px solid var(--line);border-radius:var(--radius);
  box-shadow:var(--shadow-lg);z-index:80;display:none;overflow:hidden;
}
.notif-panel.open{display:block;}
.notif-head{padding:14px 18px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;}
.notif-head h4{font-size:.95rem;font-weight:700;}
.notif-tabs{display:flex;gap:4px;padding:10px 12px 6px;border-bottom:1px solid var(--line-2);background:var(--paper);}
.ntab{
  font-size:.58rem;font-weight:800;letter-spacing:.3px;text-transform:uppercase;
  padding:5px 9px;border-radius:6px;border:none;background:transparent;color:var(--ink-3);cursor:pointer;
  transition:all var(--anim);
}
.ntab:hover{background:var(--paper-2);color:var(--ink);}
.ntab.active{background:var(--ink);color:#fff;}
.notif-filter{display:flex;gap:5px;padding:8px 12px;border-bottom:1px solid var(--line-2);}
.nfilt{
  font-size:.6rem;font-weight:700;padding:4px 10px;border-radius:50px;
  border:1.5px solid var(--line);background:transparent;color:var(--ink-3);cursor:pointer;
  transition:all var(--anim);
}
.nfilt.active{background:var(--ink);color:#fff;border-color:var(--ink);}
.notif-list{max-height:50vh;overflow-y:auto;}
.notif{
  padding:12px 18px;border-bottom:1px solid var(--line-2);
  display:flex;gap:10px;align-items:flex-start;cursor:pointer;transition:background var(--anim);
}
.notif:hover{background:var(--paper);}
.notif:last-child{border-bottom:none;}
.notif .ndot{width:8px;height:8px;border-radius:50%;background:var(--coral);margin-top:5px;flex-shrink:0;transition:background var(--anim);}
.notif.read .ndot{background:var(--line);}
.notif .nt{font-size:.82rem;font-weight:700;}
.notif .ns{font-size:.72rem;color:var(--ink-3);margin-top:1px;}
.notif .nx{margin-left:auto;color:var(--ink-3);font-size:.8rem;padding-left:6px;opacity:.6;}
.notif .nx:hover{color:var(--coral);opacity:1;}
.notif-empty{padding:28px 18px;text-align:center;color:var(--ink-3);font-size:.84rem;}

/* ===== CALENDAR ===== */
.calendar-wrap{background:var(--white);border:1.5px solid var(--line);border-radius:var(--radius);padding:20px;}
.cal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.cal-head h3{font-size:1.1rem;font-weight:600;}
.cal-nav{display:flex;gap:6px;}
.cal-nav button{
  width:32px;height:32px;border-radius:var(--radius-xs);
  border:1.5px solid var(--line);background:var(--white);color:var(--ink);
  font-size:.95rem;display:flex;align-items:center;justify-content:center;
  transition:all var(--anim);
}
.cal-nav button:hover{border-color:var(--ink);background:var(--paper-2);}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;}
.cal-dow{font-size:.58rem;font-weight:800;letter-spacing:.5px;text-transform:uppercase;color:var(--ink-3);text-align:center;padding:6px 0;}
.cal-cell{
  min-height:70px;border:1.5px solid var(--line-2);border-radius:var(--radius-xs);
  padding:6px;background:var(--white);display:flex;flex-direction:column;gap:3px;
  cursor:pointer;transition:all var(--anim);
}
.cal-cell:hover{border-color:var(--ink-2);background:var(--paper-2);}
.cal-cell.empty{background:transparent;border:none;cursor:default;}
.cal-cell.today{border-color:var(--coral);background:#fff8f7;}
.cal-date{font-size:.68rem;font-weight:700;color:var(--ink-3);}
.cal-cell.today .cal-date{color:var(--coral);}
.cal-ev{
  font-size:.55rem;font-weight:700;padding:2px 5px;border-radius:5px;
  background:var(--lav-pale);color:#6b52cc;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}
.cal-ev.rem{background:var(--mint);color:var(--ink-2);}
.cal-more{font-size:.54rem;color:var(--ink-3);}
.cal-day-detail{margin-top:16px;border-top:1px dashed var(--line);padding-top:14px;}
.cal-di{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--line-2);font-size:.84rem;}
.cal-di .dot{width:8px;height:8px;border-radius:50%;background:var(--coral);flex-shrink:0;}
.cal-di .dot.rem{background:var(--ink-2);}

/* ===== CLIENTS ===== */
.cl-summary{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:18px;}
.cl-stat{background:var(--ink);color:#fff;border-radius:var(--radius);padding:18px 20px;}
.cl-stat .n{font-family:'Helvena','Helvetica Neue',sans-serif;font-size:1.8rem;font-weight:400;}
.cl-stat .l{font-size:.58rem;font-weight:800;letter-spacing:.7px;text-transform:uppercase;opacity:.7;margin-top:5px;}
.client-card{background:var(--white);border:1.5px solid var(--line);border-radius:var(--radius);padding:20px;margin-bottom:12px;transition:border-color var(--anim);}
.client-card:hover{border-color:var(--ink-2);}
.client-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-wrap:wrap;}
.client-name{font-family:'Helvena','Helvetica Neue',sans-serif;font-size:1.05rem;font-weight:600;}
.client-email{font-size:.78rem;color:var(--ink-3);margin-top:2px;}
.cl-items{display:flex;flex-wrap:wrap;gap:6px;margin:12px 0;}
.cl-item{font-size:.64rem;font-weight:700;background:var(--mint);border:1px solid var(--mint-2);border-radius:50px;padding:4px 11px;color:var(--ink-2);}
.cl-mrr{font-family:'Helvena','Helvetica Neue',sans-serif;font-size:1.2rem;color:var(--coral);}
.cl-mrr small{font-size:.68rem;color:var(--ink-3);}
.cl-notes{margin-top:14px;border-top:1px dashed var(--line);padding-top:12px;}
.cl-notes .nh{font-size:.58rem;font-weight:800;letter-spacing:.7px;text-transform:uppercase;color:var(--ink-3);margin-bottom:9px;}
.cl-note{background:var(--paper);border-radius:var(--radius-xs);padding:8px 12px;margin-bottom:7px;font-size:.84rem;display:flex;justify-content:space-between;gap:10px;align-items:flex-start;}
.cl-note-time{font-size:.58rem;color:var(--ink-3);margin-top:3px;}
.cl-note-ctrls{display:flex;gap:8px;flex-shrink:0;}
.cl-note .x{color:var(--ink-2);cursor:pointer;font-weight:700;font-size:.66rem;opacity:.7;}
.cl-note .x:hover{opacity:1;}
.cl-note .x.del{color:var(--coral);}
.cl-note-add{display:flex;gap:8px;margin-top:8px;}
.cl-note-add input{flex:1;font-family:inherit;font-size:.84rem;padding:8px 12px;border-radius:var(--radius-xs);border:1.5px solid var(--line);background:var(--white);outline:none;}
.cl-loading{text-align:center;padding:48px;color:var(--ink-3);}
.cl-status{font-size:.56rem;font-weight:800;letter-spacing:.7px;text-transform:uppercase;padding:4px 10px;border-radius:50px;}
.cl-status.active,.cl-status.trialing{background:var(--mint);color:var(--ink-2);}
.cl-status.past_due,.cl-status.unpaid{background:#ffede8;color:#c2410c;}
.cl-status.canceled{background:var(--paper-2);color:var(--ink-3);}

/* ===== GATE (login) ===== */
.gate-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:var(--paper);}
.gate{
  max-width:400px;width:100%;background:var(--white);border:1.5px solid var(--line);
  border-radius:20px;padding:36px 32px;text-align:center;box-shadow:var(--shadow-lg);

.gate .gb{font-family:'Lonelline','Georgia',serif;font-weight:400;font-size:1.35rem;margin-bottom:20px;color:var(--ink);}
.gate .gb .dot{width:7px;height:7px;border-radius:50%;background:var(--coral);display:inline-block;margin-left:2px;margin-bottom:9px;}
.gate h2{font-size:1.5rem;font-weight:400;}
.gate h2 em{font-style:italic;color:var(--coral);}
.gate p{color:var(--ink-3);font-size:.86rem;margin:10px 0 22px;}
.gate .fld{text-align:left;}
.gate .err{color:var(--coral);font-size:.8rem;min-height:18px;margin-bottom:6px;}
.gate .alt{margin-top:16px;font-size:.8rem;color:var(--ink-3);}

/* ===== MOBILE ===== */
.hamburger{
  display:none;background:var(--white);border:1.5px solid var(--line);
  width:36px;height:36px;border-radius:var(--radius-sm);
  font-size:1rem;align-items:center;justify-content:center;
}
@media(max-width:900px){
  .sidebar{transform:translateX(-100%);transition:transform .25s;width:240px;}
  .sidebar.open{transform:translateX(0);}
  .main{margin-left:0;}
  .hamburger{display:inline-flex;}
  .stat-row{grid-template-columns:repeat(2,1fr);}

  .content{padding:18px 16px 70px;}

  .filter-pills{flex-wrap:nowrap;overflow-x:auto;}
}
.sb-scrim{display:none;position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:45;}
.sb-scrim.open{display:block;}
@media(min-width:901px){.sb-scrim{display:none!important;}}

  const locale=()=>lang==="es"?"es-PR":"en-US";
  function fmtDate(d){ try{ const t=new Date(d); return t.toLocaleDateString(locale(),{month:"short",day:"numeric"}); }catch(e){ return ""; } }
  function fmtExact(d){ try{ const t=new Date(d); return t.toLocaleDateString(locale(),{year:"numeric",month:"short",day:"numeric"})+" \u00b7 "+t.toLocaleTimeString(locale(),{hour:"numeric",minute:"2-digit"}); }catch(e){ return ""; } }
  function fmtWhen(d){ try{ const t=new Date(d),n=new Date(); const sd=t.toDateString()===n.toDateString(); const tm=new Date(n); tm.setDate(n.getDate()+1); const it=t.toDateString()===tm.toDateString(); const hm=t.toLocaleTimeString(locale(),{hour:"numeric",minute:"2-digit"}); if(sd)return T("today")+" "+hm; if(it)return T("tomorrow")+" "+hm; return t.toLocaleDateString(locale(),{month:"short",day:"numeric"})+" \u00b7 "+hm; }catch(e){ return ""; } }
  function actionLabel(k){ return {call:T("actCall"),followup:T("actFollow"),appointment:T("actAppt"),email:T("actEmail"),other:T("actOther")}[k]||T("actOther"); }
  const startOfDay=d=>{ const x=new Date(d); x.setHours(0,0,0,0); return x.getTime(); };

  // ===== boot =====
  async function boot(){
    if(!sb) return;
    const {data}=await sb.auth.getSession();
    user=data&&data.session?data.session.user:null;
    if(!user){ $("gateWrap").style.display="flex"; $("shell").style.display="none"; return; }
    isAdmin=CFG.adminEmails.map(x=>x.toLowerCase()).includes((user.email||"").toLowerCase());
    try{ notifRead=JSON.parse(localStorage.getItem("hv_nread_"+user.id)||"{}")||{}; notifDeleted=JSON.parse(localStorage.getItem("hv_ndel_"+user.id)||"{}")||{}; }catch(e){ notifRead={}; notifDeleted={}; }
    $("gateWrap").style.display="none"; $("shell").style.display="flex";
    $("sbEmail").textContent=user.email; $("sbAvatar").textContent=(user.email||"?")[0].toUpperCase();
    $("navClients").style.display=isAdmin?"":"none";
    $("fClientWrap").style.display=isAdmin?"":"none"; $("tClientWrap").style.display=isAdmin?"":"none";
    applyLang();
    await loadAll(); subscribe();
  }

    $("nfUnread").textContent=T("nUnread"); $("nfAll").textContent=T("nAllF");
    // add sheet

    $("lblClientEmail").textContent=T("clientEmail"); $("lblName").textContent=T("name"); $("lblChannel").textContent=T("channel");
    $("lblContact").textContent=T("contact"); $("lblWhen").textContent=T("apptWhen"); $("lblMsg").textContent=T("msg"); $("addSubmit").textContent=T("add");
    $("lblTClient").textContent=T("clientEmail"); $("lblTTitle").textContent=T("taskTitle"); $("lblTPrio").textContent=T("priority"); $("lblTWhen").textContent=T("due");
    const tp=$("tPrio"); if(tp){ tp.options[0].textContent=T("prioLow"); tp.options[1].textContent=T("prioNormal"); tp.options[2].textContent=T("prioHigh"); }
    // sched sheet
    $("schedTitle").textContent=T("schedTitle"); $("schedSub").textContent=T("schedSub");
    $("lblSType").textContent=T("sType"); $("lblSNote").textContent=T("sNote"); $("lblSWhen").textContent=T("sWhen"); $("schedSubmit").textContent=T("schedBtn");
    const st=$("sType"); if(st){ const m=["actCall","actFollow","actAppt","actEmail","actOther"]; Array.from(st.options).forEach((o,i)=>o.textContent=T(m[i])); }
    renderViewTitle(); render(); renderNotifs();
  }

  // ===== data =====
  async function loadAll(){
    if(!sb||!user) return;
    const [iq,rm,nt,tk]=await Promise.all([
      sb.from("inquiries").select("*").order("created_at",{ascending:false}),
      sb.from("reminders").select("*").order("due_at",{ascending:true}),
      sb.from("notes").select("*").order("created_at",{ascending:true}),
      sb.from("tasks").select("*").order("created_at",{ascending:false})
    ]);
    inquiries=(iq&&iq.data)||[]; reminders=(rm&&rm.data)||[]; tasks=(tk&&tk.data)||[];
    notesByInq={}; ((nt&&nt.data)||[]).forEach(n=>{ (notesByInq[n.inquiry_id]=notesByInq[n.inquiry_id]||[]).push(n); });
    buildNotifs(); updateNavBadges(); render(); renderNotifs();
    if(detailId) openDetail(detailId,true);
  }
  function subscribe(){
    try{ sb.channel("ws-"+(user.id||"x"))
      .on("postgres_changes",{event:"*",schema:"public",table:"inquiries"},()=>loadAll())
      .on("postgres_changes",{event:"*",schema:"public",table:"reminders"},()=>loadAll())
      .on("postgres_changes",{event:"*",schema:"public",table:"notes"},()=>loadAll())
      .on("postgres_changes",{event:"*",schema:"public",table:"tasks"},()=>loadAll())
      .subscribe(); }catch(e){ console.warn(e); }
  }

  function nextActionFor(id){ return reminders.filter(x=>x.inquiry_id===id&&!x.done).sort((a,b)=>new Date(a.due_at)-new Date(b.due_at))[0]; }
  function updateNavBadges(){
    const nNew=inquiries.filter(r=>r.status==="new").length;
    const openTasks=tasks.filter(t=>!t.done).length + reminders.filter(r=>!r.done).length;
    const bi=$("nbInq"),bt=$("nbTasks");
    if(nNew>0){ bi.style.display="flex"; bi.textContent=nNew; } else bi.style.display="none";
    if(openTasks>0){ bt.style.display="flex"; bt.textContent=openTasks>9?"9+":openTasks; } else bt.style.display="none";
  }

  // ===== view routing =====
  function setView(v){ view=v; document.querySelectorAll(".nav-item").forEach(n=>n.classList.toggle("active",n.getAttribute("data-view")===v)); closeSidebar(); renderViewTitle(); render(); }
  function renderViewTitle(){ const map={today:"titleToday",inquiries:"titleInq",tasks:"titleTasks",calendar:"titleCal",clients:"titleClients"}; $("viewTitle").textContent=T(map[view]||"titleToday"); }
  function render(){
    if($("shell").style.display==="none") return;
    if(view==="today") return renderToday();
    if(view==="inquiries") return renderInquiries();
    if(view==="tasks") return renderTasks();
    if(view==="calendar") return renderCalendar();
    if(view==="clients"){ loadClients(false); return renderClients(); }
  }

  // ===== TODAY =====
  function renderToday(){
    const c=$("content");
    const newInq=inquiries.filter(r=>r.status==="new");
    const actionsToday=reminders.filter(r=>!r.done&&isToday(r.due_at));
    const tasksToday=tasks.filter(t=>!t.done&&(t.due_at?isToday(t.due_at):true));
    const openTasks=tasks.filter(t=>!t.done).length+reminders.filter(r=>!r.done).length;
    const upcoming=inquiries.filter(r=>r.kind==="booking"&&r.booking_at&&new Date(r.booking_at)>new Date()).length;
    const now=new Date();
    const dateStr=now.toLocaleDateString(locale(),{weekday:"long",month:"long",day:"numeric"});
    const hi=isAdmin?T("hiAdmin"):(T("hi")+", "+(user.email.split("@")[0]));
    let html='<div class="greet-row"><div class="hi">'+esc(hi)+' <em>\u00b7</em></div><div class="date">'+esc(dateStr)+'</div></div>';
    html+='<div class="stat-row">'+
      tile("s1",newInq.length,T("stNew"),"inquiries","new")+
      tile("s2",actionsToday.length,T("stActions"),"tasks","")+
      tile("s3",openTasks,T("stTasks"),"tasks","")+
      tile("s4",upcoming,T("stAppts"),"calendar","")+
    '</div>';
    // today's actions
    html+='<div class="section-block"><div class="section-h"><h3>'+esc(T("todaysActions"))+'</h3><span class="sh-link" data-go="tasks">'+esc(T("viewAll"))+'</span></div>';
    const items=actionsToday.concat(tasksToday.filter(t=>t.due_at&&isToday(t.due_at)));
    if(!items.length) html+='<div class="empty"><div class="big">'+esc(T("nothingToday"))+'</div></div>';
    else { html+='<div class="rowlist">'+actionsToday.map(r=>taskRow(r,"rem")).join("")+tasksToday.filter(t=>t.due_at&&isToday(t.due_at)).map(t=>taskRow(t,"task")).join("")+'</div>'; }
    html+='</div>';
    // new inquiries
    html+='<div class="section-block"><div class="section-h"><h3>'+esc(T("newInquiries"))+'</h3><span class="sh-link" data-go="inquiries">'+esc(T("viewAll"))+'</span></div>';
    if(!newInq.length) html+='<div class="empty"><div class="big">'+esc(T("noNew"))+'</div><div class="hand">'+esc(T("hand"))+'</div></div>';
    else html+='<div class="rowlist">'+newInq.slice(0,6).map(inqMiniRow).join("")+'</div>';
    html+='</div>';
    c.innerHTML=html;
  }
  function tile(cls,n,label,go,filt){ return '<div class="stat '+cls+'" data-go="'+go+'"'+(filt?' data-filt="'+filt+'"':'')+'><div class="n">'+n+'</div><div class="l">'+esc(label)+'</div></div>'; }
  function inqMiniRow(r){
    const na=nextActionFor(r.id);
    return '<div class="lrow" data-open="'+r.id+'"><div class="lr-main"><div class="lr-title">'+esc(r.customer_name||"\u2014")+'</div><div class="lr-sub">'+esc(r.channel||"")+(r.message?' \u00b7 '+esc(r.message.slice(0,46)):'')+'</div></div>'+(na?'<span class="lr-when">'+esc(fmtWhen(na.due_at))+'</span>':'<span class="pill new">'+esc(T("statusNew"))+'</span>')+'</div>';
  }
  function taskRow(item,kind){
    const id=item.id; const done=item.done;
    const title=item.title;
    const due=item.due_at;
    const overdue=due&&!done&&new Date(due)<new Date();
    const prio=kind==="task"?(item.priority||"normal"):null;
    const linkTag=kind==="rem"&&item.inquiry_id?'<span class="type-chip">'+esc(T("linked"))+'</span>':'';
    return '<div class="lrow" data-task="'+id+'" data-tkind="'+kind+'">'+
      '<div class="chk'+(done?' done':'')+'" data-act="toggleTask">'+(done?'\u2713':'')+'</div>'+
      (prio?'<span class="prio-dot prio-'+prio+'"></span>':'')+
      '<div class="lr-main"><div class="lr-title'+(done?' done':'')+'">'+esc(title)+'</div>'+(due?'<div class="lr-sub">'+esc(fmtWhen(due))+'</div>':'')+'</div>'+
      linkTag+
      (overdue?'<span class="lr-when overdue">'+esc(T("overdue"))+'</span>':'')+
      '<button class="del-link" data-act="delTask">\u00d7</button>'+
    '</div>';
  }

  // ===== INQUIRIES (table) =====
  function renderInquiries(){
    const c=$("content");
    let html='<div class="tbl-toolbar"><div class="search"><span><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" aria-hidden="true"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg></span><input type="text" id="searchInput" placeholder="'+esc(T("search"))+'" value="'+esc(search)+'"></div>'+
      '<div class="filter-pills">'+
        pill2("all","All")+pill2("new","New")+pill2("contacting","Contacting")+pill2("qualified","Qualified")+pill2("estimate_sent","Estimate Sent")+pill2("follow_up","Follow-up")+pill2("won","Won")+
      '</div></div>';
    let list=inquiries.slice();
    if(inqFilter!=="all") list=list.filter(r=>r.status===inqFilter);
    if(search){ const s=search.toLowerCase(); list=list.filter(r=>((r.customer_name||"")+" "+(r.message||"")+" "+(r.channel||"")+" "+(r.customer_contact||"")).toLowerCase().includes(s)); }
    if(!list.length){ html+='<div class="empty"><div class="big">'+esc(T("noInq"))+'</div><div>'+esc(T("noInqSub"))+'</div><div class="hand">'+esc(T("hand"))+'</div></div>'; c.innerHTML=html; bindSearch(); return; }
    html+='<div class="inq-list">';
    html+=list.map(r=>{
      const na=nextActionFor(r.id);
      const notes=(notesByInq[r.id]||[]);
      const unread=notes.some(n=>n.author_role&&n.author_role!==(isAdmin?"admin":"client")&&!notifRead["note-"+n.id]);
      const initials=(r.customer_name||'?').split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
      const lastNote=(notesByInq[r.id]||[]).slice(-1)[0];
      const subLine=na?'<span class="inq-task"><b>Task:</b> '+esc(na.title||actionLabel(na.kind))+(na.due_at?' &middot; '+esc(fmtWhen(na.due_at)):'')+'</span>':(lastNote?esc(lastNote.body.slice(0,60)):esc(r.message?r.message.slice(0,60):''));
      return '<div class="inq-card" data-open="'+r.id+'">'+
        '<div class="inq-av">'+initials+'</div>'+
        '<div class="inq-main">'+
          '<div class="inq-name">'+(unread?'<span class="nd"></span>':'')+esc(r.customer_name||'\u2014')+'</div>'+
          '<div class="inq-svc">'+esc(r.message?r.message.slice(0,50):(r.channel||'\u2014'))+'</div>'+
          (subLine?'<div class="inq-sub">'+subLine+'</div>':'')+
        '</div>'+
        '<div class="inq-right">'+
          '<span class="pill '+(r.status||'new')+'"><span class="pill-dot"></span>'+esc(T('status'+cap(r.status||'new')))+'</span>'+
          '<button class="inq-arr" data-open="'+r.id+'" aria-label="Open">&#8594;</button>'+
        '</div>'+
      '</div>';
    }).join("");
    html+='</div>';
    c.innerHTML=html; bindSearch();
  }
  function cap(s){ return s.charAt(0).toUpperCase()+s.slice(1); }
  function pill2(v,l){ return '<button class="fpill'+(inqFilter===v?' active':'')+'" data-filt2="'+v+'">'+esc(l)+'</button>'; }
  function bindSearch(){ const si=$("searchInput"); if(si){ si.addEventListener("input",e=>{ search=e.target.value; const pos=e.target.selectionStart; renderInquiries(); const n=$("searchInput"); if(n){ n.focus(); try{n.setSelectionRange(pos,pos);}catch(e){} } }); } }

  // ===== DETAIL drawer =====
  function openDetail(id,keep){
    const r=inquiries.find(x=>x.id===id); if(!r) return;
    detailId=id;
    $("dName").textContent=r.customer_name||"\u2014";
    $("dSub").innerHTML=(r.channel?'<span class="type-chip">'+esc(r.channel)+'</span>':'')+(r.customer_contact?' '+esc(r.customer_contact):'')+' \u00b7 '+esc(fmtExact(r.created_at));
    const notes=(notesByInq[id]||[]);
    const myRole=isAdmin?"admin":"client";
    const notesHTML=notes.map(n=>{
      const mine=(n.author_role===myRole);
      const ctrls=mine?'<span class="note-ctrls"><span class="note-edit" data-act="noteEdit" data-nid="'+n.id+'">\u270e</span><span class="note-del" data-act="noteDel" data-nid="'+n.id+'">\u00d7</span></span>':'';
      return '<div class="note"><div class="nmeta"><span class="who-tag '+(n.author_role==="admin"?"admin":"client")+'">'+esc(n.author_role==="admin"?T("admin"):T("client"))+'</span><span>'+esc(fmtExact(n.created_at))+'</span>'+ctrls+'</div><div class="nbody">'+esc(n.body)+'</div></div>';
    }).join("");
    const steps=[["new",T("statusNew")],["contacted",T("statusContacted")],["booked",T("statusBooked")],["closed",T("statusClosed")]];
    const ci=steps.findIndex(s=>s[0]===r.status);
    const pipe='<div class="pipe">'+steps.map((s,i)=>'<button class="pstep'+(i===ci?' on':'')+(i<ci?' past':'')+'" data-act="pstep" data-st="'+s[0]+'">'+esc(s[1])+'</button>').join("")+'</div>';
    const acts=reminders.filter(x=>x.inquiry_id===id&&!x.done).sort((a,b)=>new Date(a.due_at)-new Date(b.due_at));
    const actsHTML=acts.length?acts.map(a=>'<div class="lrow" style="padding:10px 0;border:none;cursor:default"><span class="prio-dot prio-normal"></span><div class="lr-main"><div class="lr-title">'+esc(a.title)+'</div><div class="lr-sub">'+esc(fmtWhen(a.due_at))+'</div></div><button class="del-link" data-act="doneAct" data-rid="'+a.id+'">\u2713</button></div>').join(""):'<div class="lr-sub">'+esc(T("none"))+'</div>';
    const calledLbl=r.called?(T("called")+(r.called_at?" \u00b7 "+fmtExact(r.called_at):"")):T("markCalled");
    let body='';
    if(r.message) body+='<div class="dsec"><div class="dsec-l">'+esc(T("detMessage"))+'</div><div class="dmsg">'+esc(r.message)+'</div></div>';
    body+='<div class="dsec"><div class="dsec-l">'+esc(T("detStatus"))+'</div>'+pipe+'</div>';
    body+='<div class="dsec"><div class="dsec-l">'+esc(T("detActions"))+'</div><div class="drow"><button class="mini-btn'+(r.called?" done":"")+'" data-act="call">&#9742; '+esc(calledLbl)+'</button><button class="mini-btn alt" data-act="schedule">+ '+esc(T("schedule"))+'</button>'+((isAdmin||r.created_by==="client")?'<button class="del-link" data-act="delInq" style="margin-left:auto">'+esc(T("del"))+'</button>':'')+'</div></div>';
    body+='<div class="dsec"><div class="dsec-l">'+esc(T("detNext"))+'</div>'+actsHTML+'</div>';
    body+='<div class="dsec"><div class="dsec-l">'+esc(T("detNotes"))+'</div>'+notesHTML+'<div class="note-add"><input type="text" id="dNoteInput" placeholder="'+esc(T("notePlace"))+'"><button class="btn btn-ghost btn-sm" data-act="noteSend">'+esc(T("send"))+'</button></div></div>';
    $("drawerBody").innerHTML=body;
    // mark notes read
    notes.forEach(n=>{ notifRead["note-"+n.id]=1; }); saveNotifState(); updateBadge();
    if(!keep){ $("drawer").classList.add("open"); $("drawerBg").classList.add("open"); }
  }
  function closeDetail(){ detailId=null; $("drawer").classList.remove("open"); $("drawerBg").classList.remove("open"); }
  $("drawerClose").addEventListener("click",closeDetail);
  $("drawerBg").addEventListener("click",closeDetail);

  // ===== TASKS =====
  function renderTasks(){
    const c=$("content");
    let html='<div class="tbl-toolbar"><button class="btn btn-primary btn-sm" id="openTask">'+esc(T("addTask"))+'</button></div>';
    const open=tasks.filter(t=>!t.done), openR=reminders.filter(r=>!r.done);
    const doneAll=tasks.filter(t=>t.done);
    if(!open.length&&!openR.length&&!doneAll.length){ html+='<div class="empty"><div class="big">'+esc(T("noTasks"))+'</div><div>'+esc(T("noTasksSub"))+'</div></div>'; c.innerHTML=html; $("openTask").onclick=()=>{ setAddKind("task"); openOverlay("addOverlay"); }; return; }
    // merge open reminders + open tasks, sort by due
    const merged=open.map(t=>({_k:"task",d:t.due_at?new Date(t.due_at).getTime():Infinity,o:t})).concat(openR.map(r=>({_k:"rem",d:new Date(r.due_at).getTime(),o:r}))).sort((a,b)=>a.d-b.d);
    html+='<div class="rowlist">'+merged.map(m=>taskRow(m.o,m._k)).join("")+'</div>';
    if(doneAll.length){ html+='<div class="section-block" style="margin-top:22px"><div class="section-h"><h3 style="font-size:.95rem;color:var(--ink-2)">'+esc(lang==="es"?"Completadas":"Completed")+'</h3></div><div class="rowlist">'+doneAll.slice(0,10).map(t=>taskRow(t,"task")).join("")+'</div></div>'; }
    c.innerHTML=html; $("openTask").onclick=()=>{ setAddKind("task"); openOverlay("addOverlay"); };
  }

  // ===== CALENDAR =====
  let calRef=new Date(); calRef.setDate(1); let calSel=null;
  function calEvents(){ const map={}; const add=(d,ev)=>{ if(!d)return; const k=d.getFullYear()+"-"+d.getMonth()+"-"+d.getDate(); (map[k]=map[k]||[]).push(ev); };
    inquiries.forEach(r=>{ if(r.kind==="booking"&&r.booking_at) add(new Date(r.booking_at),{type:"booking",title:r.customer_name||T("booking"),time:r.booking_at}); });
    reminders.forEach(r=>{ add(new Date(r.due_at),{type:"rem",title:r.title,time:r.due_at}); });
    tasks.forEach(t=>{ if(t.due_at) add(new Date(t.due_at),{type:"rem",title:t.title,time:t.due_at}); });
    return map; }
  function renderCalendar(){
    const evs=calEvents(); const y=calRef.getFullYear(),m=calRef.getMonth();
    const monthName=calRef.toLocaleDateString(locale(),{month:"long",year:"numeric"});
    const firstDow=new Date(y,m,1).getDay(); const daysIn=new Date(y,m+1,0).getDate();
    const dows=lang==="es"?["D","L","M","M","J","V","S"]:["S","M","T","W","T","F","S"];
    const today=new Date(); let cells="";
    for(let i=0;i<firstDow;i++) cells+='<div class="cal-cell empty"></div>';
    for(let d=1;d<=daysIn;d++){ const k=y+"-"+m+"-"+d; const it=today.getFullYear()===y&&today.getMonth()===m&&today.getDate()===d; const list=evs[k]||[];
      let e=list.slice(0,2).map(x=>'<div class="cal-ev'+(x.type==="rem"?" rem":"")+'">'+esc(x.title)+'</div>').join(""); if(list.length>2)e+='<div class="cal-more">+'+(list.length-2)+'</div>';
      cells+='<div class="cal-cell'+(it?" today":"")+'" data-day="'+d+'"><span class="cal-date">'+d+'</span>'+e+'</div>'; }
    let detail="";
    if(calSel){ const k=y+"-"+m+"-"+calSel; const list=evs[k]||[]; detail='<div class="cal-day-detail"><h4>'+calSel+" "+calRef.toLocaleDateString(locale(),{month:"long"})+'</h4>'+(list.length?list.map(x=>'<div class="cal-di"><span class="dot'+(x.type==="rem"?" rem":"")+'"></span><span>'+esc(fmtWhen(x.time))+'</span><span>'+esc(x.title)+'</span></div>').join(""):'<div class="cal-di">'+esc(T("nothingToday"))+'</div>')+'</div>'; }
    $("content").innerHTML='<div class="calendar-wrap"><div class="cal-head"><h3>'+esc(monthName)+'</h3><div class="cal-nav"><button data-cal="prev">\u2039</button><button data-cal="today">\u2022</button><button data-cal="next">\u203a</button></div></div><div class="cal-grid">'+dows.map(d=>'<div class="cal-dow">'+d+'</div>').join("")+cells+'</div>'+detail+'</div>';
  }

  // ===== CLIENTS =====
  async function loadClients(force){ if(!isAdmin)return; if(clientsData&&!force)return; if(clientsLoading)return; clientsLoading=true; if(view==="clients")renderClients();
    try{ const r=await fetch(CFG.clientsFn,{method:"POST",headers:{"Content-Type":"application/json","Authorization":"Bearer "+CFG.key,"apikey":CFG.key},body:JSON.stringify({requester:user.email})}); const d=await r.json(); clientsData=(d&&d.clients)?d.clients:[]; if(d&&d.error)clientsData={__error:d.error}; }catch(e){ clientsData={__error:String(e)}; }
    try{ const {data}=await sb.from("client_notes").select("*").order("created_at",{ascending:true}); clientNotes={}; (data||[]).forEach(n=>{ (clientNotes[(n.client_email||"").toLowerCase()]=clientNotes[(n.client_email||"").toLowerCase()]||[]).push(n); }); }catch(e){}
    clientsLoading=false; if(view==="clients")renderClients(); }
  function renderClients(){
    const c=$("content");
    if(clientsLoading||clientsData===null){ c.innerHTML='<div class="cl-loading">'+esc(T("loading"))+'</div>'; return; }
    if(clientsData&&clientsData.__error){ c.innerHTML='<div class="cl-loading">'+esc(T("clientsErr"))+'<br><small style="opacity:.6">'+esc(clientsData.__error)+'</small></div>'; return; }
    const list=Array.isArray(clientsData)?clientsData:[];
    const totalMRR=list.reduce((a,x)=>a+(x.mrr||0),0); const active=list.filter(x=>x.status==="active"||x.status==="trialing").length;
    let html='<div class="cl-summary"><div class="cl-stat"><div class="n">'+list.length+'</div><div class="l">'+esc(T("clClients"))+'</div></div><div class="cl-stat"><div class="n">'+active+'</div><div class="l">'+esc(T("clActive"))+'</div></div><div class="cl-stat"><div class="n">$'+totalMRR.toLocaleString("en-US",{maximumFractionDigits:0})+'</div><div class="l">'+esc(T("clMRR"))+'</div></div></div>';
    if(!list.length){ html+='<div class="cl-loading">'+esc(T("clNone"))+'</div>'; c.innerHTML=html; return; }
    html+=list.map(x=>{ const em=(x.email||"").toLowerCase(); const notes=clientNotes[em]||[];
      const nh=notes.map(n=>'<div class="cl-note" data-cnid="'+n.id+'"><div><div>'+esc(n.body)+'</div><div class="cl-note-time">'+esc(fmtExact(n.created_at))+'</div></div><span class="cl-note-ctrls"><span class="x" data-cnact="edit">\u270e</span><span class="x del" data-cnact="del">\u00d7</span></span></div>').join("");
      const stc=(x.status||"").replace(/[^a-z_]/g,"");
      return '<div class="client-card" data-cemail="'+esc(em)+'"><div class="client-top"><div><div class="client-name">'+esc(x.name||x.email||"\u2014")+'</div>'+(x.email?'<div class="client-email">'+esc(x.email)+'</div>':'')+'</div><span class="cl-status '+stc+'">'+esc(x.status||"")+'</span></div><div class="cl-items">'+(x.items||[]).map(i=>'<span class="cl-item">'+esc(i)+'</span>').join("")+'</div><div class="cl-mrr">$'+(x.mrr||0).toLocaleString("en-US",{maximumFractionDigits:0})+' <small>'+esc(T("perMonth"))+'</small></div><div class="cl-notes"><div class="nh">'+esc(T("internalNotes"))+'</div>'+nh+'<div class="cl-note-add"><input type="text" data-cnact="input" placeholder="'+esc(T("addInternal"))+'"><button class="btn btn-ghost btn-sm" data-cnact="add">'+esc(T("send"))+'</button></div></div></div>';
    }).join("");
    c.innerHTML=html;
  }

  // ===== mutations =====
  async function patchInq(id,f){ f.updated_at=new Date().toISOString(); const {error}=await sb.from("inquiries").update(f).eq("id",id); if(error){console.warn(error);return false;} const r=inquiries.find(x=>x.id===id); if(r)Object.assign(r,f); return true; }

  // ===== global click handling =====
  document.addEventListener("click", async e=>{
    // nav
    const nav=e.target.closest(".nav-item"); if(nav){ setView(nav.getAttribute("data-view")); return; }
    // go links / tiles
    const go=e.target.closest("[data-go]"); if(go){ const f=go.getAttribute("data-filt"); if(f)inqFilter=f; setView(go.getAttribute("data-go")); return; }
    // open inquiry detail
    const op=e.target.closest("[data-open]"); if(op && !e.target.closest("[data-act]")){ openDetail(op.getAttribute("data-open")); return; }
    // filter pills
    const fp=e.target.closest("[data-filt2]"); if(fp){ inqFilter=fp.getAttribute("data-filt2"); renderInquiries(); return; }
    // calendar
    const cal=e.target.closest("[data-cal]"); if(cal){ const a=cal.getAttribute("data-cal"); if(a==="prev")calRef.setMonth(calRef.getMonth()-1); else if(a==="next")calRef.setMonth(calRef.getMonth()+1); else {calRef=new Date();calRef.setDate(1);} calSel=null; renderCalendar(); return; }
    const cell=e.target.closest(".cal-cell[data-day]"); if(cell){ calSel=parseInt(cell.getAttribute("data-day"),10); renderCalendar(); return; }
    // task rows
    const trow=e.target.closest("[data-task]");
    if(trow){
      const id=trow.getAttribute("data-task"), tk=trow.getAttribute("data-tkind");
      if(e.target.closest('[data-act="toggleTask"]')){
        if(tk==="task"){ const t=tasks.find(x=>x.id===id); const nd=!t.done; const {error}=await sb.from("tasks").update({done:nd}).eq("id",id); if(!error){t.done=nd;render();} }
        else { const r=reminders.find(x=>x.id===id); const nd=!r.done; const {error}=await sb.from("reminders").update({done:nd}).eq("id",id); if(!error){r.done=nd;render();} }
        return;
      }
      if(e.target.closest('[data-act="delTask"]')){ if(confirm(lang==="es"?"\u00bfBorrar?":"Delete?")){ if(tk==="task"){ await sb.from("tasks").delete().eq("id",id); tasks=tasks.filter(x=>x.id!==id); } else { await sb.from("reminders").delete().eq("id",id); reminders=reminders.filter(x=>x.id!==id); } render(); } return; }
    }
    // drawer actions
    if(detailId && e.target.closest("#drawerBody")){
      const id=detailId;
      if(e.target.closest('[data-act="pstep"]')){ await patchInq(id,{status:e.target.closest('[data-act="pstep"]').getAttribute("data-st")}); openDetail(id,true); render(); return; }
      if(e.target.closest('[data-act="call"]')){ const r=inquiries.find(x=>x.id===id); const now=!r.called; await patchInq(id,{called:now,called_at:now?new Date().toISOString():null}); openDetail(id,true); render(); return; }
      if(e.target.closest('[data-act="schedule"]')){ openSchedule(id); return; }
      if(e.target.closest('[data-act="delInq"]')){ if(confirm(lang==="es"?"\u00bfEliminar esta consulta?":"Delete this inquiry?")){ await sb.from("inquiries").delete().eq("id",id); inquiries=inquiries.filter(x=>x.id!==id); closeDetail(); render(); } return; }
      if(e.target.closest('[data-act="doneAct"]')){ const rid=e.target.closest('[data-act="doneAct"]').getAttribute("data-rid"); await sb.from("reminders").update({done:true}).eq("id",rid); const rr=reminders.find(x=>x.id===rid); if(rr)rr.done=true; openDetail(id,true); render(); return; }
      if(e.target.closest('[data-act="noteSend"]')){ const inp=$("dNoteInput"); const body=(inp.value||"").trim(); if(!body)return; const r=inquiries.find(x=>x.id===id); const note={inquiry_id:id,client_email:r.client_email,body:body,author_role:isAdmin?"admin":"client",author_email:user.email}; const {data,error}=await sb.from("notes").insert(note).select(); if(!error){ (notesByInq[id]=notesByInq[id]||[]).push((data&&data[0])||note); openDetail(id,true); } return; }
      const nd=e.target.closest('[data-act="noteDel"]'); if(nd){ const nid=nd.getAttribute("data-nid"); if(confirm(lang==="es"?"\u00bfBorrar nota?":"Delete note?")){ await sb.from("notes").delete().eq("id",nid); notesByInq[id]=(notesByInq[id]||[]).filter(n=>String(n.id)!==String(nid)); openDetail(id,true); } return; }
      const ne=e.target.closest('[data-act="noteEdit"]'); if(ne){ const nid=ne.getAttribute("data-nid"); const note=(notesByInq[id]||[]).find(n=>String(n.id)===String(nid)); if(note){ const nv=prompt(lang==="es"?"Editar nota:":"Edit note:",note.body); if(nv!=null&&nv.trim()){ await sb.from("notes").update({body:nv.trim()}).eq("id",nid); note.body=nv.trim(); openDetail(id,true); } } return; }
    }
    // client notes
    const ccard=e.target.closest(".client-card");
    if(ccard){
      const email=ccard.getAttribute("data-cemail");
      if(e.target.closest('[data-cnact="add"]')){ const inp=ccard.querySelector('[data-cnact="input"]'); const body=(inp.value||"").trim(); if(!body)return; const {data,error}=await sb.from("client_notes").insert({client_email:email,body:body}).select(); if(!error){ (clientNotes[email]=clientNotes[email]||[]).push((data&&data[0])||{id:Math.random(),body:body,created_at:new Date().toISOString()}); renderClients(); } return; }
      const d=e.target.closest('[data-cnact="del"]'); if(d){ const id=d.closest("[data-cnid]").getAttribute("data-cnid"); if(confirm(lang==="es"?"\u00bfBorrar?":"Delete?")){ await sb.from("client_notes").delete().eq("id",id); clientNotes[email]=(clientNotes[email]||[]).filter(n=>String(n.id)!==String(id)); renderClients(); } return; }
      const ed=e.target.closest('[data-cnact="edit"]'); if(ed){ const id=ed.closest("[data-cnid]").getAttribute("data-cnid"); const note=(clientNotes[email]||[]).find(n=>String(n.id)===String(id)); if(note){ const nv=prompt(lang==="es"?"Editar:":"Edit:",note.body); if(nv!=null&&nv.trim()){ await sb.from("client_notes").update({body:nv.trim()}).eq("id",id); note.body=nv.trim(); renderClients(); } } return; }
    }
    if(!e.target.closest("#notifPanel")&&!e.target.closest("#bellBtn")) $("notifPanel").classList.remove("open");
  });
  document.addEventListener("keydown",e=>{ if(e.key==="Enter"&&e.target.id==="dNoteInput"){ const b=$("drawerBody").querySelector('[data-act="noteSend"]'); if(b)b.click(); } });

  // ===== add sheet =====
  function setAddKind(k){ addKind=k; document.querySelectorAll('#addSeg button').forEach(b=>b.classList.toggle("on",b.getAttribute("data-kind")===k)); $("ibFields").style.display=k==="task"?"none":"block"; $("taskFields").style.display=k==="task"?"block":"none"; $("fWhenWrap").style.display=k==="booking"?"":"none"; }
  $("addSeg").addEventListener("click",e=>{ const b=e.target.closest("button[data-kind]"); if(b)setAddKind(b.getAttribute("data-kind")); });
  $("quickAddBtn").addEventListener("click",()=>{ setAddKind(isAdmin?"inquiry":"booking"); if(!isAdmin){ $("segInq").style.display="none"; } openOverlay("addOverlay"); });
  $("addSubmit").addEventListener("click", async ()=>{
    const out=$("addMsg"); out.textContent="";
    if(addKind==="task"){
      const client=isAdmin?$("tClient").value.trim().toLowerCase():user.email.toLowerCase();
      const title=$("tTitle").value.trim(); if(!client||!title){ out.style.color="#F45145"; out.textContent=T("needFields"); return; }
      const p={client_email:client,title:title,priority:$("tPrio").value,done:false,created_by:isAdmin?"admin":"client"}; const w=$("tWhen").value; if(w)p.due_at=new Date(w).toISOString();
      const {error}=await sb.from("tasks").insert(p); if(error){ out.style.color="#F45145"; out.textContent=error.message; return; }
      out.style.color="#347D79"; out.textContent=T("added")+" \u2713"; $("tTitle").value="";$("tWhen").value="";
      await loadAll(); setTimeout(()=>{ closeOverlay("addOverlay"); out.textContent=""; },650); return;
    }
    const client=isAdmin?$("fClient").value.trim().toLowerCase():user.email.toLowerCase();
    const p={client_email:client,customer_name:$("fName").value.trim(),channel:$("fChannel").value,customer_contact:$("fContact").value.trim(),message:$("fMsg").value.trim(),status:"new",called:false,kind:addKind,created_by:isAdmin?"admin":"client"};
    if(addKind==="booking"){ const w=$("fWhen").value; if(w)p.booking_at=new Date(w).toISOString(); }
    if(!client||(!p.message&&!p.customer_name)){ out.style.color="#F45145"; out.textContent=T("needFields"); return; }
    const {error}=await sb.from("inquiries").insert(p); if(error){ out.style.color="#F45145"; out.textContent=error.message; return; }
    out.style.color="#347D79"; out.textContent=T("added")+" \u2713"; $("fName").value="";$("fContact").value="";$("fMsg").value=""; if($("fWhen"))$("fWhen").value="";
    await loadAll(); setTimeout(()=>{ closeOverlay("addOverlay"); out.textContent=""; },650);
  });

  // ===== schedule sheet =====
  function openSchedule(id){ schedInqId=id; $("schedMsg").textContent=""; $("sNote").value=""; $("sWhen").value=""; openOverlay("schedOverlay"); }
  $("schedSubmit").addEventListener("click", async ()=>{
    const out=$("schedMsg"); out.textContent=""; const r=inquiries.find(x=>x.id===schedInqId); if(!r){ closeOverlay("schedOverlay"); return; }
    const w=$("sWhen").value; if(!w){ out.style.color="#F45145"; out.textContent=T("needFields"); return; }
    const type=$("sType").value; const note=$("sNote").value.trim();
    const title=actionLabel(type)+(r.customer_name?" \u00b7 "+r.customer_name:"")+(note?" \u00b7 "+note:"");
    const rk=type==="appointment"?"appointment":"followup";
    const {error}=await sb.from("reminders").insert({client_email:r.client_email,inquiry_id:r.id,title:title,kind:rk,due_at:new Date(w).toISOString(),done:false,created_by:isAdmin?"admin":"client"});
    if(error){ out.style.color="#F45145"; out.textContent=error.message; return; }
    out.style.color="#347D79"; out.textContent=T("added")+" \u2713";
    await loadAll(); setTimeout(()=>{ closeOverlay("schedOverlay"); out.textContent=""; if(detailId)openDetail(detailId,true); },600);
  });

  // ===== overlays =====
  function openOverlay(id){ $(id).classList.add("open"); }
  function closeOverlay(id){ $(id).classList.remove("open"); }
  document.querySelectorAll("[data-close]").forEach(b=>b.addEventListener("click",()=>closeOverlay(b.getAttribute("data-close"))));
  document.querySelectorAll(".overlay").forEach(o=>o.addEventListener("click",e=>{ if(e.target===o)o.classList.remove("open"); }));

  // ===== notifications =====
  function buildNotifs(){
    notifs=[]; const now=Date.now();
    inquiries.forEach(r=>{ const c=new Date(r.created_at).getTime();
      if(r.kind!=="booking"&&r.status==="new") notifs.push({id:"inq-"+r.id,type:"new",t:T("notifNew"),s:(r.customer_name||"")+" \u00b7 "+(r.channel||""),at:c});
      if(r.kind==="booking"&&r.booking_at){ const b=new Date(r.booking_at).getTime(); if(b>now&&b-now<1000*60*60*48) notifs.push({id:"appt-"+r.id,type:"appt",t:T("notifAppt"),s:(r.customer_name||"")+" \u00b7 "+fmtWhen(r.booking_at),at:c}); }
    });
    reminders.forEach(r=>{ if(r.done)return; const due=new Date(r.due_at).getTime(); if(due-now<1000*60*60*24) notifs.push({id:"rem-"+r.id,type:"rem",t:T("notifRem"),s:r.title+" \u00b7 "+fmtWhen(r.due_at),at:new Date(r.created_at).getTime()}); });
    tasks.forEach(t=>{ if(t.done||!t.due_at)return; const due=new Date(t.due_at).getTime(); if(due-now<1000*60*60*24) notifs.push({id:"task-"+t.id,type:"rem",t:T("notifRem"),s:t.title+" \u00b7 "+fmtWhen(t.due_at),at:new Date(t.created_at).getTime()}); });
    const myRole=isAdmin?"admin":"client";
    Object.keys(notesByInq).forEach(iid=>{ const inq=inquiries.find(x=>x.id===iid); (notesByInq[iid]||[]).forEach(n=>{ if(n.author_role&&n.author_role!==myRole){ const who=inq?(inq.customer_name||inq.client_email||""):""; notifs.push({id:"note-"+n.id,type:"note",t:T("notifNote"),s:who+" \u00b7 "+(n.body||"").slice(0,40),at:new Date(n.created_at).getTime()}); } }); });
    notifs=notifs.filter(n=>!notifDeleted[n.id]); notifs.sort((a,b)=>b.at-a.at); updateBadge();
  }
  function isUnread(n){ return !notifRead[n.id]; }
  function updateBadge(){ const u=notifs.filter(isUnread).length; const b=$("bellBadge"); if(u>0){ b.style.display="flex"; b.textContent=u>9?"9+":u; } else b.style.display="none"; }
  function saveNotifState(){ try{ localStorage.setItem("hv_nread_"+user.id,JSON.stringify(notifRead)); localStorage.setItem("hv_ndel_"+user.id,JSON.stringify(notifDeleted)); }catch(e){} }
  function renderNotifs(){
    const list=$("notifList"); if(!list)return;
    document.querySelectorAll("#notifTabs .ntab").forEach(t=>t.classList.toggle("active",t.getAttribute("data-ntab")===notifTab));
    document.querySelectorAll("#notifFilter .nfilt").forEach(t=>t.classList.toggle("active",t.getAttribute("data-nfilt")===notifFilt));
    let l=notifs.slice(); if(notifTab!=="all")l=l.filter(n=>n.type===notifTab); if(notifFilt==="unread")l=l.filter(isUnread);
    if(!l.length){ list.innerHTML='<div class="notif-empty">'+esc(T("noNotif"))+'</div>'; return; }
    list.innerHTML=l.map(n=>'<div class="notif'+(isUnread(n)?'':' read')+'" data-nid="'+esc(n.id)+'"><span class="ndot"></span><div><div class="nt">'+esc(n.t)+'</div><div class="ns">'+esc(n.s)+'</div></div><span class="nx" data-nact="del">\u00d7</span></div>').join("");
  }
  $("bellBtn").addEventListener("click",()=>{ const p=$("notifPanel"); p.classList.toggle("open"); if(p.classList.contains("open"))renderNotifs(); });
  $("notifClear").addEventListener("click",()=>{ notifs.forEach(n=>{ notifRead[n.id]=1; }); saveNotifState(); updateBadge(); renderNotifs(); });
  $("notifTabs").addEventListener("click",e=>{ const t=e.target.closest(".ntab"); if(!t)return; notifTab=t.getAttribute("data-ntab"); renderNotifs(); });
  $("notifFilter").addEventListener("click",e=>{ const t=e.target.closest(".nfilt"); if(!t)return; notifFilt=t.getAttribute("data-nfilt"); renderNotifs(); });
  $("notifList").addEventListener("click",e=>{ const row=e.target.closest(".notif"); if(!row)return; const id=row.getAttribute("data-nid"); if(e.target.closest('[data-nact="del"]')){ notifDeleted[id]=1; saveNotifState(); buildNotifs(); renderNotifs(); return; } notifRead[id]=1; saveNotifState(); updateBadge(); renderNotifs(); });

  // ===== misc =====
  $("langToggle").addEventListener("click",()=>{ lang=lang==="es"?"en":"es"; applyLang(); });
  $("logoutBtn").addEventListener("click", async ()=>{ await sb.auth.signOut(); location.reload(); });
  $("hamburger").addEventListener("click",()=>{ $("sidebar").classList.add("open"); $("sbScrim").classList.add("open"); });
  $("sbScrim").addEventListener("click",closeSidebar);
  function closeSidebar(){ $("sidebar").classList.remove("open"); $("sbScrim").classList.remove("open"); }
  $("gLogin").addEventListener("click", async ()=>{ const email=$("gEmail").value.trim(),pass=$("gPass").value; $("gErr").textContent=""; if(!email||!pass){ $("gErr").textContent=lang==="es"?"Escribe correo y contrase\u00f1a.":"Enter email and password."; return; } const {error}=await sb.auth.signInWithPassword({email,password:pass}); if(error){ $("gErr").textContent=lang==="es"?"No pudimos iniciar sesi\u00f3n. Revisa tus datos.":"We couldn't log you in. Check your details."; return; } location.reload(); });
  $("gPass").addEventListener("keydown",e=>{ if(e.key==="Enter")$("gLogin").click(); });

  applyLang(); boot();
})();
</script>
</body>
