<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Workspace , Hello, virtually!</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#173D35">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Workspace">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%23F0EEE9'/%3E%3Ctext x='50' y='68' font-family='Georgia,serif' font-size='52' font-style='italic' font-weight='700' fill='%231F3D3A' text-anchor='middle'%3Eh%3C/text%3E%3Ccircle cx='72' cy='30' r='9' fill='%23CE3375'/%3E%3C/svg%3E">
<style>
:root{
  --ink:#173D35; --ink-2:#2d5a4e; --ink-3:rgba(23,61,53,.55);
  --paper:#F7F5F0; --paper-2:#EEECEA; --white:#ffffff;
  --coral:#F45145; --coral-soft:#e03b31;
  --lav:#B9A7FF; --lav-pale:#EEE9FF;
  --blue:#C9E7F5; --blue-pale:#E8F5FC;
  --mint:#DCEBE8; --mint-2:#c8dbd7;
  --line:rgba(23,61,53,.12); --line-2:rgba(23,61,53,.06);
  --shadow:0 2px 8px rgba(23,61,53,.08);
  --shadow-md:0 6px 18px rgba(23,61,53,.09);
  --shadow-lg:0 20px 60px rgba(23,61,53,.16);
  --radius:14px; --radius-sm:10px; --radius-xs:8px;
  --sidebar:252px;
  --anim:.18s cubic-bezier(.4,0,.2,1);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Helvena','Helvetica Neue',sans-serif;background:var(--paper);color:var(--ink);line-height:1.5;-webkit-font-smoothing:antialiased;}
h1,h2,h3,h4{font-family:'Helvena','Helvetica Neue',sans-serif;font-weight:600;line-height:1.1;letter-spacing:-.3px;}
a{color:var(--coral);text-decoration:none;}
button{font-family:inherit;cursor:pointer;}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;font-weight:700;font-size:.78rem;letter-spacing:.2px;padding:10px 18px;border-radius:var(--radius-sm);border:none;transition:all var(--anim);}
.btn-primary{background:var(--coral);color:#fff;}
.btn-primary:hover{background:var(--coral-soft);transform:translateY(-1px);box-shadow:var(--shadow-md);}
.btn-ghost{background:var(--white);border:1.5px solid var(--line);color:var(--ink);}
.btn-ghost:hover{border-color:var(--ink);background:var(--paper-2);}
.btn-sm{padding:7px 13px;font-size:.72rem;border-radius:var(--radius-xs);}
.btn-block{width:100%;}

/* ===== SHELL ===== */
.shell{display:flex;min-height:100vh;}

/* ===== SIDEBAR ===== */
.sidebar{
  width:var(--sidebar);flex-shrink:0;background:var(--ink);color:#fff;
  display:flex;flex-direction:column;position:fixed;top:0;bottom:0;left:0;z-index:50;
}
.sb-brand{
  padding:24px 20px 20px;display:flex;align-items:center;gap:0;
  font-family:'Helvena','Helvetica Neue',sans-serif;font-weight:700;font-size:1.05rem;color:#fff;
  letter-spacing:-.2px;line-height:1;
}
.sb-brand .dot{width:7px;height:7px;border-radius:50%;background:var(--coral);display:inline-block;margin-left:2px;margin-bottom:10px;}
.sb-nav{flex:1;padding:8px 12px;display:flex;flex-direction:column;gap:3px;}
.nav-item{
  display:flex;align-items:center;gap:10px;padding:9px 12px;
  border-radius:var(--radius-sm);color:rgba(255,255,255,.52);font-weight:500;font-size:.84rem;
  cursor:pointer;transition:all var(--anim);border:none;background:none;text-align:left;width:100%;position:relative;
}
.nav-item:hover{background:rgba(255,255,255,.06);color:rgba(255,255,255,.88);}
.nav-item.active{background:rgba(255,255,255,.1);color:#fff;font-weight:600;}
.nav-item .ic{width:17px;height:17px;flex-shrink:0;opacity:.6;}
.nav-item.active .ic{opacity:1;}
.nav-item .nv-badge{
  margin-left:auto;background:var(--coral);color:#fff;font-size:.58rem;font-weight:800;
  min-width:18px;height:18px;border-radius:50px;display:flex;align-items:center;justify-content:center;padding:0 5px;
}
.sb-foot{margin:10px;padding:10px;border-top:none;background:rgba(255,255,255,.05);border-radius:12px;display:flex;align-items:center;gap:9px;}
.sb-avatar{
  width:32px;height:32px;border-radius:50%;background:var(--coral);color:#fff;
  display:flex;align-items:center;justify-content:center;font-weight:800;font-size:.8rem;flex-shrink:0;
}
.sb-user{flex:1;min-width:0;}
.sb-user .e{font-size:.72rem;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.sb-user .r{font-size:.55rem;letter-spacing:1px;text-transform:uppercase;color:rgba(255,255,255,.45);margin-top:1px;}
.sb-ico{
  background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);color:rgba(255,255,255,.7);
  width:30px;height:30px;border-radius:var(--radius-xs);font-size:.62rem;font-weight:800;
  display:flex;align-items:center;justify-content:center;transition:all var(--anim);
}
.sb-ico:hover{background:rgba(255,255,255,.16);color:#fff;}

/* ===== MAIN ===== */
.main{flex:1;margin-left:var(--sidebar);min-width:0;display:flex;flex-direction:column;}
.topbar{
  position:sticky;top:0;z-index:40;background:rgba(247,245,240,.92);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  border-bottom:1px solid var(--line);padding:14px 28px;
  display:flex;align-items:center;justify-content:space-between;gap:14px;
}
.topbar h1{font-size:1.35rem;font-weight:500;color:var(--ink);}
.topbar h1 em{font-style:italic;color:var(--coral);}
.tb-actions{display:flex;align-items:center;gap:8px;}
.bell{
  position:relative;background:var(--white);border:1.5px solid var(--line);
  width:36px;height:36px;border-radius:var(--radius-sm);
  display:inline-flex;align-items:center;justify-content:center;
  transition:all var(--anim);color:var(--ink);
}
.bell:hover{border-color:var(--ink);background:var(--paper-2);}
.bell-badge{
  position:absolute;top:-6px;right:-6px;min-width:16px;height:16px;padding:0 4px;
  border-radius:50px;background:var(--coral);color:#fff;font-size:.55rem;font-weight:800;
  display:flex;align-items:center;justify-content:center;border:2px solid var(--paper);
}
.content{padding:24px 28px 70px;max-width:1200px;width:100%;}

/* ===== TODAY ===== */
.greet-row{margin-bottom:22px;}
.greet-row .hi{font-family:'Helvena','Helvetica Neue',sans-serif;font-size:1.5rem;font-weight:600;color:var(--ink);letter-spacing:-.02em;}
.greet-row .date{color:var(--ink-3);font-size:.86rem;margin-top:3px;}
.greet-row .hi em{font-style:italic;color:var(--coral);}
.greet-row .hi .hi-acc{display:none;}

/* Pipeline bar */
.pipe-bar{display:flex;gap:4px;height:26px;margin-bottom:8px;}
.pipe-seg{display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all var(--anim);min-width:26px;position:relative;border-radius:7px;}
.pipe-seg:hover{filter:brightness(1.06);transform:translateY(-1px);}
.pipe-seg-n{font-family:'Helvena','Helvetica Neue',sans-serif;font-weight:800;font-size:.72rem;color:#fff;text-shadow:0 1px 2px rgba(0,0,0,.15);}
.pipe-legend{display:flex;flex-wrap:wrap;gap:14px;}
.pipe-leg{display:inline-flex;align-items:center;gap:6px;font-size:.72rem;font-weight:600;color:var(--ink-3);cursor:pointer;transition:color var(--anim);}
.pipe-leg:hover{color:var(--ink);}
.pipe-leg b{color:var(--ink);font-weight:800;}
.pipe-leg-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}

/* Needs attention */
.attn-clear{display:flex;align-items:center;gap:11px;background:var(--paper);border:1px solid var(--line-2);border-radius:12px;padding:13px 15px;}
.attn-check{display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:50%;background:var(--mint);color:var(--ink-2);font-size:.7rem;font-weight:900;flex-shrink:0;}
.attn-list{display:flex;flex-direction:column;gap:8px;}
.attn-card{display:flex;align-items:center;gap:12px;background:#fffaf9;border:1px solid rgba(244,81,69,.2);border-radius:12px;padding:12px 15px;cursor:pointer;transition:all var(--anim);}
.attn-card:hover{border-color:var(--coral);box-shadow:var(--shadow-md);transform:translateY(-1px);}
.attn-dot{width:9px;height:9px;border-radius:50%;background:var(--coral);flex-shrink:0;animation:attnPulse 2s infinite;}
@keyframes attnPulse{0%,100%{opacity:1;}50%{opacity:.4;}}
.attn-main{flex:1;min-width:0;}
.attn-t{font-weight:700;font-size:.9rem;color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.attn-s{font-size:.74rem;color:var(--ink-3);margin-top:1px;}
.attn-tag{font-size:.56rem;font-weight:800;letter-spacing:.4px;text-transform:uppercase;color:var(--coral);background:#fff;border:1px solid rgba(244,81,69,.3);padding:3px 9px;border-radius:50px;white-space:nowrap;}

/* Activity feed */
.feed{display:flex;flex-direction:column;}
.feed-item{display:flex;align-items:center;gap:13px;padding:12px 4px;border-bottom:1px solid var(--line-2);cursor:pointer;transition:all var(--anim);border-radius:var(--radius-xs);}
.feed-item:last-child{border-bottom:none;}
.feed-item:hover{background:var(--white);padding-left:12px;padding-right:12px;}
.feed-ic{display:inline-flex;align-items:center;justify-content:center;width:34px;height:34px;border-radius:50%;flex-shrink:0;}
.feed-ic svg{width:17px;height:17px;}
.fd-inq .feed-ic{background:var(--lav-pale);color:#6b52cc;}
.fd-note .feed-ic{background:var(--mint);color:var(--ink-2);}
.fd-book .feed-ic{background:#edfaf3;color:#1a7a45;}
.feed-main{flex:1;min-width:0;}
.feed-t{font-size:.86rem;color:var(--ink);}
.feed-t b{font-weight:700;}
.feed-s{font-size:.74rem;color:var(--ink-3);margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.feed-when{font-size:.7rem;font-weight:600;color:var(--ink-3);white-space:nowrap;flex-shrink:0;}
.greet-row .date{color:var(--ink-3);font-size:.84rem;margin-top:3px;}
.stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:22px;}
.stat{
  background:var(--white);border:1px solid var(--line);border-radius:16px;
  padding:14px 16px 13px;cursor:pointer;transition:all var(--anim);display:flex;flex-direction:column;
}
.stat:hover{border-color:var(--ink-2);box-shadow:var(--shadow);transform:translateY(-1px);}
.stat-top{display:flex;align-items:center;margin-bottom:9px;}
.stat-ic{display:inline-flex;align-items:center;justify-content:center;width:30px;height:30px;border-radius:9px;background:var(--mint);color:var(--ink-2);}
.stat-ic svg{width:16px;height:16px;}
.stat.s1 .stat-ic{background:var(--lav-pale);color:#6b52cc;}
.stat.s2 .stat-ic{background:#fdeceb;color:var(--coral);}
.stat.s3 .stat-ic{background:var(--mint);color:var(--ink-2);}
.stat.s4 .stat-ic{background:var(--blue-pale);color:#2a7fa8;}
.stat .n{font-family:'Helvena','Helvetica Neue',sans-serif;font-size:1.6rem;font-weight:600;line-height:1;color:var(--ink);letter-spacing:-.02em;}
.stat .l{font-size:.68rem;font-weight:600;letter-spacing:.25px;color:var(--ink-3);margin-top:5px;}
.stat-ctx{font-size:.64rem;font-weight:600;color:var(--ink-3);margin-top:7px;padding-top:7px;border-top:1px solid var(--line-2);}
.stat-ctx.urgent{color:var(--coral);}

/* Dashboard 2-column grid */
.dash-grid{display:grid;grid-template-columns:1.5fr 1fr;gap:18px;align-items:start;}
.dash-left,.dash-right{display:flex;flex-direction:column;gap:18px;min-width:0;}
.panel{background:var(--white);border:1px solid var(--line);border-radius:16px;padding:18px 20px;}
.panel-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.panel-h h3{font-size:.88rem;font-weight:700;color:var(--ink);letter-spacing:.01em;}
.panel-h .sh-link{font-size:.72rem;font-weight:600;color:var(--ink-2);cursor:pointer;opacity:.75;}
.panel-h .sh-link:hover{opacity:1;}
.panel-link{margin-top:14px;width:100%;background:var(--paper);border:1px solid var(--line);border-radius:10px;padding:10px;font-family:'Helvena','Helvetica Neue',sans-serif;font-weight:600;font-size:.78rem;color:var(--ink-2);cursor:pointer;transition:all var(--anim);}
.panel-link:hover{background:var(--ink);color:#fff;border-color:var(--ink);}

/* Onboarding card */
.onboard{display:flex;gap:16px;align-items:center;background:var(--white);border:1px solid var(--line);border-radius:16px;padding:18px 20px;margin-bottom:22px;position:relative;}
.onboard-t::after{content:"";display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--coral);margin-left:5px;margin-bottom:6px;}
.onboard-link{margin-left:auto;flex-shrink:0;font-size:.7rem;font-weight:600;color:var(--ink-3);background:var(--paper);border:1px solid var(--line);border-radius:50px;padding:7px 13px;max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
@media(max-width:900px){.onboard-link{display:none;}}
.onboard-ic{display:inline-flex;align-items:center;justify-content:center;width:40px;height:40px;border-radius:11px;background:var(--lav-pale);color:#6b52cc;flex-shrink:0;}
.onboard-ic svg{width:20px;height:20px;}
.onboard-main{flex:1;}
.onboard-t{font-size:1rem;font-weight:600;color:var(--ink);letter-spacing:-.01em;}
.onboard-s{font-size:.8rem;color:var(--ink-3);margin-top:4px;line-height:1.45;max-width:520px;}
.onboard-actions{display:flex;gap:8px;margin-top:11px;flex-wrap:wrap;}

/* Needs attention */
.attn-clear-x{display:none;}
.attn-check{display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;border-radius:50%;background:#4caf50;color:#fff;font-size:.8rem;font-weight:900;flex-shrink:0;}
.attn-clear-t{font-size:.85rem;font-weight:600;color:var(--ink-2);}
.attn-clear-s{font-size:.76rem;color:var(--ink-3);margin-top:2px;}
.attn-list{display:flex;flex-direction:column;gap:8px;}
.attn-card{display:flex;align-items:center;gap:12px;background:var(--paper);border:1px solid var(--line-2);border-radius:12px;padding:12px 14px;transition:all var(--anim);}
.attn-card:hover{border-color:var(--line);background:#fff;}
.attn-main{flex:1;min-width:0;cursor:pointer;}
.attn-t{font-weight:600;font-size:.88rem;color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.attn-s{font-size:.74rem;color:var(--ink-3);margin-top:2px;display:flex;align-items:center;gap:5px;}
.attn-reason{font-weight:700;color:var(--coral);text-transform:uppercase;font-size:.62rem;letter-spacing:.3px;}
.attn-reason.lav{color:#6b52cc;}
.attn-btn{flex-shrink:0;font-family:'Helvena','Helvetica Neue',sans-serif;font-size:.72rem;font-weight:700;padding:7px 13px;border-radius:8px;border:1px solid var(--line);background:#fff;color:var(--ink-2);cursor:pointer;transition:all var(--anim);white-space:nowrap;}
.attn-btn:hover{border-color:var(--ink);background:var(--ink);color:#fff;}
.attn-btn.done:hover{background:#4caf50;border-color:#4caf50;}

/* Mini empty states */
.empty-mini{text-align:center;padding:20px 14px;}
.empty-mini-t{font-size:.92rem;font-weight:600;color:var(--ink-2);}
.empty-mini-s{font-size:.78rem;color:var(--ink-3);margin-top:5px;margin-bottom:14px;line-height:1.5;}

/* Pipeline rows */
.pipe-rows{display:flex;flex-direction:column;gap:1px;margin-top:12px;}
.pipe-row{display:flex;align-items:center;gap:9px;padding:7px 9px;border-radius:8px;cursor:pointer;transition:background var(--anim);}
.pipe-row:hover{background:var(--paper);}
.pipe-row-l{flex:1;font-size:.8rem;font-weight:500;color:var(--ink-2);}
.pipe-row-n{font-family:'Helvena','Helvetica Neue',sans-serif;font-size:.84rem;font-weight:700;color:var(--ink);font-variant-numeric:tabular-nums;}
.empty-seg{background:var(--paper-2)!important;}

/* legacy compat */
.section-block{margin-bottom:24px;}
.section-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.section-h h3{font-size:1rem;font-weight:600;}
.section-h .sh-link{font-size:.72rem;font-weight:700;color:var(--ink-2);cursor:pointer;opacity:.7;}
.section-h .sh-link:hover{opacity:1;}

/* ===== LISTS / TASK ROWS ===== */
.rowlist{background:var(--white);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;}
.lrow{
  display:flex;align-items:center;gap:12px;padding:13px 18px;
  border-bottom:1px solid var(--line-2);cursor:pointer;transition:background var(--anim);
}
.lrow:last-child{border-bottom:none;}
.lrow:hover{background:var(--paper-2);}
.lrow .chk{
  width:20px;height:20px;border-radius:6px;border:1.5px solid var(--line);
  flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;
  color:#fff;font-size:.65rem;transition:all var(--anim);
}
.lrow .chk.done{background:var(--ink-2);border-color:var(--ink-2);}
.lrow .lr-main{flex:1;min-width:0;}
.lrow .lr-title{font-weight:600;font-size:.88rem;overflow:hidden;text-overflow:ellipsis;}
.lrow .lr-title.done{text-decoration:line-through;color:var(--ink-3);opacity:.6;}
.lrow .lr-sub{font-size:.72rem;color:var(--ink-3);margin-top:1px;}
.lr-when{font-size:.7rem;font-weight:700;color:var(--ink-3);white-space:nowrap;}
.lr-when.overdue{color:var(--coral);}
.prio-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.prio-high{background:var(--coral);}
.prio-normal{background:var(--lav);}
.prio-low{background:var(--line);}
.lr-right{display:flex;align-items:center;gap:9px;flex-shrink:0;}
.lr-del{font-size:.95rem;line-height:1;opacity:.45;}
.lrow:hover .lr-del{opacity:1;}
.type-chip{
  font-size:.56rem;font-weight:800;letter-spacing:.4px;text-transform:uppercase;
  padding:3px 8px;border-radius:50px;background:var(--mint);color:var(--ink-2);white-space:nowrap;
}

/* ===== INQUIRY CARDS ===== */
.tbl-toolbar{display:flex;gap:10px;align-items:center;margin-bottom:16px;flex-wrap:wrap;}
.search{
  flex:1;min-width:200px;display:flex;align-items:center;gap:8px;
  background:var(--white);border:1.5px solid var(--line);border-radius:var(--radius-sm);
  padding:9px 14px;transition:border-color var(--anim);
}
.search:focus-within{border-color:var(--ink-2);}
.search input{border:none;outline:none;background:transparent;font-family:inherit;font-size:.86rem;color:var(--ink);width:100%;}
.search input::placeholder{color:var(--ink-3);}

/* Filter tabs */
.filter-pills{display:flex;gap:4px;flex-wrap:wrap;background:var(--white);border:1.5px solid var(--line);border-radius:var(--radius-sm);padding:4px;}
.fpill{
  font-size:.65rem;font-weight:700;letter-spacing:.3px;text-transform:uppercase;
  padding:6px 12px;border-radius:7px;border:none;background:transparent;color:var(--ink-3);cursor:pointer;
  transition:all var(--anim);white-space:nowrap;
}
.fpill:hover{background:var(--paper-2);color:var(--ink);}
.fpill.active{background:var(--ink);color:#fff;}
.fpill-n{display:inline-flex;align-items:center;justify-content:center;min-width:16px;height:16px;padding:0 5px;margin-left:6px;border-radius:50px;background:var(--line-2);color:var(--ink-2);font-size:.58rem;font-weight:800;line-height:1;vertical-align:middle;}
.fpill.active .fpill-n{background:rgba(255,255,255,.22);color:#fff;}
.inq-wait{display:inline-flex;align-items:center;justify-content:center;height:20px;padding:0 9px;border-radius:50px;background:var(--mint);color:var(--ink-2);font-family:'Helvena','Helvetica Neue',sans-serif;font-size:.62rem;font-weight:800;letter-spacing:.02em;white-space:nowrap;}
.inq-wait.urgent{background:#fff0ee;color:var(--coral);border:1px solid rgba(244,81,69,.25);}

/* Inquiry card list */
.inq-list{display:flex;flex-direction:column;gap:8px;}
.inq-card{
  display:flex;align-items:center;gap:14px;padding:16px 18px;
  background:var(--white);border:1.5px solid var(--line);border-radius:var(--radius);
  cursor:pointer;transition:all var(--anim);
}
.inq-card:hover{border-color:var(--ink-2);box-shadow:var(--shadow-md);transform:translateY(-1px);}
.inq-av{
  width:42px;height:42px;border-radius:50%;border:1.5px solid var(--line);
  background:var(--mint);color:var(--ink-2);font-family:'Helvena','Helvetica Neue',sans-serif;
  font-weight:800;font-size:.8rem;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;letter-spacing:.02em;
}
.inq-main{flex:1;min-width:0;}
.inq-name{font-family:'Helvena','Helvetica Neue',sans-serif;font-weight:700;font-size:.95rem;color:var(--ink);line-height:1.2;margin-bottom:2px;display:flex;align-items:center;gap:6px;}
.inq-name .nd{width:7px;height:7px;border-radius:50%;background:var(--coral);flex-shrink:0;}
.inq-qa{display:flex;gap:7px;margin-top:11px;flex-wrap:wrap;}
.qa-btn{display:inline-flex;align-items:center;gap:6px;font-family:'Helvena','Helvetica Neue',sans-serif;font-size:.7rem;font-weight:700;padding:7px 12px;border-radius:8px;border:1.5px solid var(--line);background:var(--white);color:var(--ink-2);cursor:pointer;transition:all var(--anim);white-space:nowrap;}
.qa-btn svg{width:14px;height:14px;}
.qa-btn:hover{border-color:var(--ink);background:var(--paper-2);color:var(--ink);}
.qa-btn.qa-primary{border-color:var(--ink);color:#fff;background:var(--ink);}
.qa-btn.qa-primary:hover{background:var(--ink-2);border-color:var(--ink-2);color:#fff;transform:translateY(-1px);}
.qa-btn.qa-quiet{border-color:transparent;background:transparent;color:var(--ink-3);padding-left:8px;padding-right:8px;}
.qa-btn.qa-quiet:hover{border-color:transparent;background:var(--paper-2);color:var(--ink);}

/* View toggle */
.view-toggle{display:flex;gap:3px;background:var(--white);border:1.5px solid var(--line);border-radius:var(--radius-sm);padding:3px;flex-shrink:0;}
.vt-btn{display:inline-flex;align-items:center;justify-content:center;width:36px;height:32px;border:none;background:transparent;color:var(--ink-3);border-radius:7px;cursor:pointer;transition:all var(--anim);}
.vt-btn svg{width:18px;height:18px;}
.vt-btn:hover{background:var(--paper-2);color:var(--ink);}
.vt-btn.active{background:var(--ink);color:#fff;}

/* Kanban board */
.board{display:grid;grid-template-columns:repeat(6,minmax(215px,1fr));gap:14px;align-items:start;overflow-x:auto;padding-bottom:8px;-webkit-overflow-scrolling:touch;}
.board-col{background:var(--paper-2);border-radius:var(--radius);padding:12px;min-height:200px;}
.board-col-h{display:flex;align-items:center;gap:8px;padding:4px 6px 12px;}
.bch-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.bch-l{font-size:.78rem;font-weight:700;color:var(--ink);letter-spacing:.01em;}
.bch-n{margin-left:auto;font-size:.68rem;font-weight:800;color:var(--ink-3);background:var(--white);border-radius:50px;min-width:20px;height:20px;display:inline-flex;align-items:center;justify-content:center;padding:0 6px;}
.board-drop{display:flex;flex-direction:column;gap:9px;min-height:120px;border-radius:var(--radius-sm);transition:background var(--anim);padding:2px;}
.board-drop.over{background:var(--lav-pale);outline:2px dashed var(--lav);outline-offset:-2px;}
.board-empty{text-align:center;font-size:.66rem;color:var(--ink-3);opacity:.5;padding:14px 6px;border:1.5px dashed var(--line);border-radius:var(--radius-sm);}
.board-drop:not(:only-child) .board-empty,.board-drop .bcard~.board-empty{display:none;}
.bcard{background:var(--white);border:1.5px solid var(--line);border-radius:12px;padding:13px;cursor:grab;transition:all var(--anim);}
.bcard:hover{border-color:var(--ink-2);box-shadow:var(--shadow-md);}
.bcard:active{cursor:grabbing;}
.bcard.dragging{opacity:.4;border-style:dashed;}
.bcard-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px;}
.bcard-av{width:34px;height:34px;border-radius:50%;background:var(--mint);color:var(--ink-2);display:flex;align-items:center;justify-content:center;font-family:'Helvena','Helvetica Neue',sans-serif;font-weight:800;font-size:.72rem;}
.bcard-name{font-family:'Helvena','Helvetica Neue',sans-serif;font-weight:700;font-size:.86rem;color:var(--ink);line-height:1.2;}
.bcard-svc{font-size:.74rem;color:var(--ink-3);margin-top:3px;line-height:1.35;}
.bcard-owner{font-size:.6rem;font-weight:700;color:var(--ink-2);background:var(--lav-pale);border:1px solid rgba(185,167,255,.3);padding:2px 7px;border-radius:50px;margin-top:8px;display:inline-block;}
@media(max-width:900px){
  .board{grid-template-columns:repeat(6,minmax(200px,220px));}
}
.inq-owner{font-family:'Helvena','Helvetica Neue',sans-serif;font-size:.58rem;font-weight:700;letter-spacing:.02em;color:var(--ink-2);background:var(--lav-pale);border:1px solid rgba(185,167,255,.35);padding:2px 8px;border-radius:50px;margin-left:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:160px;}
.inq-svc{font-size:.8rem;color:var(--ink-3);margin-bottom:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.inq-sub{font-size:.76rem;color:var(--ink-3);}
.inq-task b{color:var(--ink-2);font-weight:700;}
.inq-right{display:flex;flex-direction:column;align-items:flex-end;gap:8px;flex-shrink:0;}
.inq-arr{
  width:30px;height:30px;border-radius:50%;border:1.5px solid var(--line);
  background:transparent;color:var(--ink-3);font-size:.85rem;
  display:flex;align-items:center;justify-content:center;transition:all var(--anim);
}
.inq-arr:hover{background:var(--ink);color:#fff;border-color:var(--ink);}

/* Status pills */
.pill{
  display:inline-flex;align-items:center;gap:5px;
  font-family:'Helvena','Helvetica Neue',sans-serif;font-size:.64rem;font-weight:700;letter-spacing:.04em;
  padding:4px 10px;border-radius:50px;border:1.5px solid transparent;white-space:nowrap;
}
.pill-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
/* status colors */
.pill.new{background:var(--lav-pale);border-color:rgba(185,167,255,.3);color:#6b52cc;}
.pill.new .pill-dot{background:var(--lav);}
.pill.contacting,.pill.contacted{background:var(--blue-pale);border-color:rgba(201,231,245,.5);color:#2a7fa8;}
.pill.contacting .pill-dot,.pill.contacted .pill-dot{background:var(--blue);}
.pill.estimate_sent,.pill.estimate-sent{background:#fff3e0;border-color:#ffd99e;color:#b36000;}
.pill.estimate_sent .pill-dot,.pill.estimate-sent .pill-dot{background:#ff9800;}
.pill.follow_up,.pill.follow-up{background:var(--mint);border-color:var(--mint-2);color:var(--ink-2);}
.pill.follow_up .pill-dot,.pill.follow-up .pill-dot{background:var(--ink-2);}
.pill.won,.pill.hired{background:#edfaf3;border-color:#c5eed9;color:#1a7a45;}
.pill.won .pill-dot,.pill.hired .pill-dot{background:#4caf50;}
.pill.lost,.pill.closed,.pill.not_hired{background:var(--paper-2);border-color:var(--line);color:var(--ink-3);}
.pill.lost .pill-dot,.pill.closed .pill-dot,.pill.not_hired .pill-dot{background:var(--line);}
/* Estimate */
.est-chip{font-family:'Helvena','Helvetica Neue',sans-serif;font-size:.66rem;font-weight:800;color:#b36000;background:#fff3e0;border:1px solid #ffd99e;padding:2px 8px;border-radius:50px;white-space:nowrap;}
.est-row{display:flex;align-items:center;gap:8px;}
.est-row .est-cur{font-weight:800;color:var(--ink-3);font-size:.9rem;}
.est-row input{flex:1;min-width:0;max-width:180px;border:1px solid var(--line);border-radius:var(--radius-xs);padding:9px 12px;font-family:inherit;font-size:.86rem;font-weight:700;color:var(--ink);background:var(--white);}
.est-row input:focus{outline:none;border-color:var(--ink);}
.pipe-val{display:flex;align-items:baseline;justify-content:space-between;gap:8px;background:#fff3e0;border:1px solid #ffd99e;border-radius:var(--radius-sm);padding:9px 12px;margin-bottom:12px;}
.pipe-val span{font-size:.68rem;font-weight:700;letter-spacing:.03em;color:#b36000;}
.pipe-val b{font-family:'Helvena','Helvetica Neue',sans-serif;font-size:1.05rem;font-weight:800;color:#b36000;}
/* Next-step chips */
.step-chips{display:flex;flex-wrap:wrap;gap:7px;}
.step-chip{font-family:inherit;font-size:.74rem;font-weight:700;padding:8px 13px;border-radius:50px;border:1.5px solid var(--line);background:var(--white);color:var(--ink);cursor:pointer;transition:all var(--anim);}
.step-chip:hover{border-color:var(--ink);background:var(--paper-2);}
.step-chip.on{background:var(--ink);border-color:var(--ink);color:#fff;}
/* Estimate doc */
.est-doc{margin-top:9px;display:flex;align-items:center;gap:10px;}
.doc-btn{display:inline-flex;cursor:pointer;}
.doc-link{font-size:.78rem;font-weight:700;color:var(--ink);text-decoration:underline;text-decoration-color:var(--lav);text-underline-offset:3px;}
.doc-link:hover{color:var(--coral);}
/* Waiting list + form answers */
.wait-list{display:flex;flex-direction:column;}
.wait-item{display:flex;align-items:center;gap:10px;padding:11px 2px;border-bottom:1px solid var(--line-2);cursor:pointer;}
.wait-item:last-child{border-bottom:none;}
.wait-item:hover .day-t{color:var(--coral);}
.wait-main{flex:1;min-width:0;}
.fa-list{background:var(--paper);border:1px solid var(--line-2);border-radius:var(--radius-sm);padding:4px 13px;}
.dsec-fa .fa-list{border-left:3px solid var(--lav);}
.fa-row{display:flex;gap:12px;padding:8px 0;border-bottom:1px solid var(--line-2);}
.fa-row:last-child{border-bottom:none;}
.fa-k{flex:0 0 38%;font-size:.72rem;font-weight:700;color:var(--ink-3);text-transform:capitalize;padding-top:1px;}
.fa-v{flex:1;font-size:.82rem;color:var(--ink);font-weight:500;word-break:break-word;}
/* Focus mode */
.focus-ov{position:fixed;inset:0;background:var(--paper);z-index:300;display:flex;flex-direction:column;align-items:center;overflow-y:auto;}
.focus-ov[hidden]{display:none;}
.focus-head{width:100%;max-width:560px;display:flex;justify-content:space-between;align-items:center;padding:20px 22px 8px;}
#focusCount{font-family:'Helvena','Helvetica Neue',sans-serif;font-weight:800;font-size:.8rem;color:var(--ink-3);letter-spacing:.08em;}
.focus-x{background:none;border:none;font-size:1.6rem;color:var(--ink-3);cursor:pointer;line-height:1;padding:4px;}
.focus-x:hover{color:var(--ink);}
.focus-prog{width:100%;max-width:516px;height:3px;background:var(--line-2);border-radius:3px;margin:0 22px 28px;overflow:hidden;}
#focusBar{height:100%;background:var(--coral);border-radius:3px;transition:width .3s ease;width:0;}
.focus-card{width:100%;max-width:560px;padding:0 22px 44px;}
.focus-k{font-size:.66rem;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:var(--coral);margin-bottom:10px;}
.focus-name{font-family:'Helvena','Helvetica Neue',sans-serif;font-size:1.9rem;font-weight:600;color:var(--ink);letter-spacing:-.02em;margin-bottom:10px;}
.focus-msg{font-size:.9rem;color:var(--ink-2);line-height:1.55;margin:14px 0;background:var(--white);border:1px solid var(--line);border-radius:12px;padding:13px 15px;}
.focus-card .msg-body{margin-top:10px;}
.focus-foot{display:flex;justify-content:space-between;align-items:center;margin-top:22px;gap:10px;flex-wrap:wrap;}
.focus-done{text-align:center;padding:56px 0;}
.attn-check.big{width:54px;height:54px;font-size:1.4rem;margin-bottom:18px;}
.focus-done-t{font-family:'Helvena','Helvetica Neue',sans-serif;font-size:1.8rem;font-weight:600;color:var(--ink);}
.focus-done-s{font-size:.9rem;color:var(--ink-3);margin:8px 0 24px;}
/* Lost reason */
.lost-chips{display:flex;flex-wrap:wrap;gap:8px;padding:4px 0 8px;}
/* Confetti */
.confetti{position:fixed;top:-14px;width:9px;height:14px;z-index:400;pointer-events:none;border-radius:2px;animation:confettiFall 1.6s ease-in forwards;}
@keyframes confettiFall{to{transform:translate(var(--dx,0),105vh) rotate(560deg);opacity:.85;}}
/* Editorial numbers strip */
.ed-nums{display:flex;flex-wrap:wrap;align-items:baseline;gap:0 34px;padding:6px 2px 18px;margin-bottom:20px;border-bottom:1px solid var(--line);}
.ed-num{display:inline-flex;align-items:baseline;gap:9px;cursor:pointer;padding:4px 0;transition:opacity var(--anim);}
.ed-num:hover{opacity:.75;}
.ed-n{font-family:'Helvena','Helvetica Neue',sans-serif;font-size:2.1rem;font-weight:600;color:var(--ink);letter-spacing:-.03em;line-height:1;}
.ed-n.money{font-size:1.6rem;}
.ed-n.urgent{color:var(--coral);}
.ed-l{font-size:.72rem;font-weight:600;letter-spacing:.04em;color:var(--ink-3);}
/* Your day list */
.day-count{font-family:'Helvena','Helvetica Neue',sans-serif;font-size:.7rem;font-weight:800;color:var(--ink-2);background:var(--mint);border-radius:50px;min-width:22px;height:22px;display:inline-flex;align-items:center;justify-content:center;padding:0 7px;}
.day-list{display:flex;flex-direction:column;}
.day-item{display:flex;align-items:center;gap:12px;padding:12px 2px;border-bottom:1px solid var(--line-2);}
.day-item:last-child{border-bottom:none;}
.day-main{display:flex;align-items:center;gap:14px;flex:1;min-width:0;cursor:pointer;}
.day-idx{font-family:'Helvena','Helvetica Neue',sans-serif;font-size:.78rem;font-weight:800;color:var(--lav);letter-spacing:.02em;flex-shrink:0;}
.day-t{font-weight:700;font-size:.88rem;color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.day-s{font-size:.73rem;color:var(--ink-3);margin-top:1px;}
.day-reason{color:var(--coral);font-weight:700;}
.day-reason.lav{color:#6b52cc;}
/* Message composer */
.msg-tpl{width:100%;border:1px solid var(--line);border-radius:var(--radius-xs);padding:9px 12px;font-family:inherit;font-size:.82rem;font-weight:600;color:var(--ink);background:var(--white);margin-bottom:8px;}
.msg-body{width:100%;border:1px solid var(--line);border-radius:var(--radius-xs);padding:10px 12px;font-family:inherit;font-size:.84rem;color:var(--ink);background:var(--white);resize:vertical;line-height:1.5;margin-bottom:8px;}
.msg-body:focus,.msg-tpl:focus{outline:none;border-color:var(--ink);}
.msg-ch{display:flex;flex-wrap:wrap;gap:7px;}
.msg-none{font-size:.74rem;color:var(--ink-3);margin-top:6px;}
/* My form */
.form-grid{display:grid;grid-template-columns:1.4fr 1fr;gap:18px;align-items:start;max-width:860px;}
@media(max-width:900px){.form-grid{grid-template-columns:1fr;}}
.form-link-row{display:flex;align-items:center;gap:10px;background:var(--paper);border:1px solid var(--line);border-radius:var(--radius-sm);padding:10px 12px;}
.form-link{flex:1;min-width:0;font-size:.8rem;font-weight:600;color:var(--ink-2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.form-cap{margin-top:14px;font-size:.82rem;color:var(--ink-3);}
.form-cap b{font-family:'Helvena','Helvetica Neue',sans-serif;font-size:1.2rem;color:var(--ink);margin-right:4px;}
.form-hint{font-size:.76rem;color:var(--ink-3);line-height:1.5;margin:12px 0;}
.qr-box{display:flex;justify-content:center;background:var(--white);border:1px solid var(--line-2);border-radius:var(--radius-sm);padding:10px;}
.qr-box img{width:100%;max-width:220px;height:auto;image-rendering:pixelated;}
.form-hero{max-width:860px;margin:0 0 18px;}
.form-hero-t{font-family:'Helvena','Helvetica Neue',sans-serif;font-size:1.15rem;font-weight:600;color:var(--ink);letter-spacing:-.01em;}
.form-hero-s{font-size:.86rem;color:var(--ink-3);margin-top:4px;line-height:1.5;max-width:620px;}
.form-side{display:flex;flex-direction:column;gap:18px;}
.form-open-link{font-size:.74rem;font-weight:700;color:var(--coral);white-space:nowrap;}
.form-open-link:hover{color:var(--coral-soft);}
.device{max-width:330px;margin:4px auto 0;border:9px solid var(--ink);border-radius:30px;background:var(--ink);box-shadow:var(--shadow-md);overflow:hidden;}
.device-screen{background:var(--white);border-radius:21px;overflow:hidden;line-height:0;}
.device-screen iframe{width:100%;height:540px;border:0;display:block;background:var(--white);}
.form-tailored{margin-top:14px;font-size:.78rem;color:var(--ink-2);line-height:1.5;text-align:center;background:var(--mint);border:1px solid var(--mint-2);border-radius:var(--radius-sm);padding:10px 12px;}
@media(max-width:900px){.device-screen iframe{height:480px;}}
/* Results */
.res-wrap{max-width:640px;}
.res-month{font-family:'Helvena','Helvetica Neue',sans-serif;font-size:.78rem;font-weight:800;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-3);margin-bottom:6px;}
.res-row{display:flex;align-items:center;gap:20px;padding:20px 2px;border-bottom:1px solid var(--line);}
.res-idx{font-family:'Helvena','Helvetica Neue',sans-serif;font-size:.8rem;font-weight:800;color:var(--lav);flex-shrink:0;}
.res-n{font-family:'Helvena','Helvetica Neue',sans-serif;font-size:2.6rem;font-weight:600;color:var(--ink);letter-spacing:-.03em;line-height:1;min-width:110px;}
.res-l{font-size:.9rem;font-weight:600;color:var(--ink);}
.res-s{font-size:.76rem;color:var(--ink-3);margin-top:2px;}
/* Monthly report */
.res-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
.res-mbtn{background:none;border:1px solid var(--line);border-radius:8px;width:30px;height:30px;font-size:.95rem;color:var(--ink);cursor:pointer;line-height:1;}
.res-mbtn:hover{background:var(--paper-2);}
.res-mbtn:disabled{opacity:.3;cursor:default;}
.res-sec{font-family:'Helvena','Helvetica Neue',sans-serif;font-size:.78rem;font-weight:800;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-3);margin:34px 0 6px;}
.res-src{display:flex;align-items:center;gap:12px;padding:10px 2px;border-bottom:1px solid var(--line);}
.res-src-l{font-size:.86rem;font-weight:600;color:var(--ink);min-width:110px;}
.res-src-bar{flex:1;height:10px;background:var(--paper-2);border-radius:5px;overflow:hidden;}
.res-src-fill{height:100%;background:var(--lav);border-radius:5px;}
.res-src-n{font-family:'Helvena','Helvetica Neue',sans-serif;font-size:.85rem;font-weight:800;color:var(--ink);min-width:22px;text-align:right;}
.res-lead{display:flex;align-items:center;gap:12px;padding:12px 2px;border-bottom:1px solid var(--line);cursor:pointer;}
.res-lead:hover{background:var(--paper-2);}
.res-lead-main{flex:1;min-width:0;}
.res-lead-t{font-size:.9rem;font-weight:600;color:var(--ink);}
.res-lead-s{font-size:.76rem;color:var(--ink-3);margin-top:2px;}
.res-share-wrap{margin-top:26px;}
@media(max-width:560px){.res-src-l{min-width:84px;font-size:.8rem;}}
@media(max-width:560px){.res-n{font-size:2rem;min-width:80px;}.ed-nums{gap:0 22px;}.ed-n{font-size:1.7rem;}}
/* Completed in calendar */
.cal-ev.done{opacity:.55;text-decoration:line-through;}
.cal-di.done{opacity:.65;}
.cal-di.done .cal-di-t{text-decoration:line-through;}
/* Old pill classes (legacy) */
.pill.booked{background:var(--lav-pale);border-color:rgba(185,167,255,.3);color:#6b52cc;}

/* CRM head hidden */
.crm-head{display:none;}
.crm-table,.crm-row{display:none;}

/* Empty state */
.empty{text-align:center;padding:60px 20px;color:var(--ink-3);}
.empty .big{font-family:'Helvena','Helvetica Neue',sans-serif;font-style:italic;font-size:1.3rem;color:var(--ink-2);margin-bottom:8px;}
.empty .hand{display:none;}

/* ===== DETAIL DRAWER ===== */
.drawer-bg{position:fixed;inset:0;background:rgba(23,61,53,.3);backdrop-filter:blur(4px);z-index:90;opacity:0;pointer-events:none;transition:opacity .25s;}
.drawer-bg.open{opacity:1;pointer-events:auto;}
.drawer{
  position:fixed;top:0;right:0;bottom:0;width:480px;max-width:92vw;
  background:var(--paper);z-index:95;box-shadow:var(--shadow-lg);
  transform:translateX(100%);transition:transform .28s cubic-bezier(.4,0,.2,1);
  display:flex;flex-direction:column;
}
.drawer.open{transform:translateX(0);}
.drawer-head{
  padding:20px 22px 18px;border-bottom:1px solid var(--line);
  display:flex;align-items:flex-start;justify-content:space-between;gap:12px;background:var(--white);
}
.drawer-head h2{font-size:1.2rem;font-weight:600;}
.drawer-head .dh-sub{font-size:.76rem;color:var(--ink-3);margin-top:4px;display:flex;gap:7px;align-items:center;flex-wrap:wrap;}
.drawer-close{background:none;border:none;font-size:1.4rem;color:var(--ink-3);cursor:pointer;line-height:1;padding:2px 4px;border-radius:6px;transition:all var(--anim);}
.drawer-close:hover{color:var(--ink);background:var(--paper-2);}
.drawer-body{flex:1;overflow-y:auto;padding:20px 22px;}
.dsec{margin-bottom:18px;padding-bottom:18px;border-bottom:1px solid var(--line-2);}
.dsec:last-child{border-bottom:none;}
.dsec-l{font-size:.58rem;font-weight:800;letter-spacing:.8px;text-transform:uppercase;color:var(--ink-3);margin-bottom:8px;}
.dmsg{background:var(--white);border:1px solid var(--line);border-radius:var(--radius-sm);padding:13px 16px;font-size:.9rem;white-space:pre-wrap;line-height:1.6;}

/* Pipeline steps */
.pipe{display:flex;gap:5px;flex-wrap:wrap;}
.pipe{gap:6px;}
.pstep{
  font-size:.68rem;font-weight:700;letter-spacing:.02em;
  padding:7px 12px;border-radius:50px;border:1px solid var(--line);
  background:var(--white);color:var(--ink-3);cursor:pointer;transition:all var(--anim);white-space:nowrap;
}
.pstep:hover{border-color:var(--ink-2);color:var(--ink);}
.pstep.past{background:var(--mint);border-color:var(--mint-2);color:var(--ink-2);}
.pstep.on{background:var(--ink);border-color:var(--ink);color:#fff;}

/* Actions in drawer */
.drow{display:flex;gap:8px;flex-wrap:wrap;}
.mini-btn{
  display:inline-flex;align-items:center;gap:6px;font-size:.74rem;font-weight:700;
  padding:9px 14px;border-radius:var(--radius-xs);border:1.5px solid var(--line);
  background:var(--white);color:var(--ink-2);transition:all var(--anim);
}
.mini-btn:hover{border-color:var(--ink);color:var(--ink);}
.mini-btn.done{background:var(--ink);border-color:var(--ink);color:#fff;}
.mini-btn.alt{border-color:var(--lav);color:#6b52cc;}
.mini-btn.alt:hover{background:var(--lav-pale);}
.del-link{background:none;border:none;color:var(--coral);font-weight:700;font-size:.72rem;cursor:pointer;transition:opacity var(--anim);}
.del-link:hover{opacity:.7;}

/* Notes */
.note{background:var(--white);border:1.5px solid var(--line);border-radius:var(--radius-xs);padding:10px 14px;margin-bottom:8px;}
.note .nmeta{display:flex;align-items:center;gap:7px;font-size:.6rem;color:var(--ink-3);margin-bottom:4px;}
.who-tag{font-weight:800;letter-spacing:.4px;text-transform:uppercase;padding:2px 7px;border-radius:50px;font-size:.52rem;}
.who-tag.admin{background:var(--ink);color:#fff;}
.who-tag.client{background:var(--lav-pale);color:#6b52cc;border:1px solid rgba(185,167,255,.3);}
.note .nbody{font-size:.86rem;line-height:1.5;}
.note-ctrls{margin-left:auto;display:flex;gap:8px;}
.note-edit{color:var(--ink-2);cursor:pointer;font-weight:700;font-size:.7rem;}
.note-del{color:var(--coral);cursor:pointer;font-weight:700;font-size:.7rem;}
.note-add{display:flex;gap:8px;margin-top:10px;}
.note-add input{
  flex:1;font-family:inherit;font-size:.84rem;padding:9px 13px;
  border-radius:var(--radius-xs);border:1.5px solid var(--line);background:var(--white);outline:none;
  transition:border-color var(--anim);
}
.note-add input:focus{border-color:var(--ink-2);}
.lrow .lr-sub.reminder{font-size:.74rem;color:var(--ink-2);}

/* ===== MODALS ===== */
.overlay{
  position:fixed;inset:0;background:rgba(23,61,53,.35);backdrop-filter:blur(4px);
  z-index:100;display:none;align-items:flex-start;justify-content:center;
  padding:6vh 16px;overflow-y:auto;
}
.overlay.open{display:flex;}
.sheet{
  background:var(--white);border-radius:18px;width:100%;max-width:460px;
  padding:26px;box-shadow:var(--shadow-lg);
}
.sheet h3{font-size:1.2rem;font-weight:600;margin-bottom:3px;}
.sheet .sub{font-size:.8rem;color:var(--ink-3);margin-bottom:16px;}
.sheet-close{float:right;background:none;border:none;font-size:1.4rem;color:var(--ink-3);cursor:pointer;padding:2px;}
.fld{display:flex;flex-direction:column;gap:5px;margin-bottom:12px;}
.fld label{font-size:.6rem;font-weight:800;letter-spacing:.7px;text-transform:uppercase;color:var(--ink-3);}
.fld input,.fld select,.fld textarea{
  font-family:inherit;font-size:.9rem;padding:10px 13px;
  border-radius:var(--radius-xs);border:1.5px solid var(--line);background:var(--paper);
  color:var(--ink);outline:none;transition:border-color var(--anim);
}
.fld input:focus,.fld select:focus,.fld textarea:focus{border-color:var(--ink-2);}
.fld textarea{resize:vertical;min-height:68px;}
.fld-row{display:grid;grid-template-columns:1fr 1fr;gap:11px;}
.form-msg{font-size:.78rem;min-height:17px;margin-top:3px;}
.seg{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap;}
.seg button{
  flex:1;font-size:.68rem;font-weight:700;letter-spacing:.3px;text-transform:uppercase;
  padding:9px;border-radius:var(--radius-xs);border:1.5px solid var(--line);
  background:var(--white);color:var(--ink-3);transition:all var(--anim);
}
.seg button.on{background:var(--ink);color:#fff;border-color:var(--ink);}

/* ===== NOTIFICATIONS PANEL ===== */
.notif-panel{
  position:fixed;top:64px;right:20px;width:360px;max-width:calc(100vw - 28px);
  background:var(--white);border:1.5px solid var(--line);border-radius:var(--radius);
  box-shadow:var(--shadow-lg);z-index:80;display:none;overflow:hidden;
}
.notif-panel.open{display:block;}
.notif-head{padding:14px 18px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;}
.push-card{margin:10px 12px 2px;padding:11px 13px;background:var(--lav-pale);border:1px solid var(--lav);border-radius:12px;display:flex;flex-direction:column;gap:9px;}
.push-card .push-tx{font-size:.83rem;line-height:1.45;color:var(--ink);}
.push-card .push-tx.push-ok{color:#2d5a4e;font-weight:600;}
.push-card .btn{align-self:flex-start;}
.notif-head h4{font-size:.95rem;font-weight:700;}
.notif-tabs{display:flex;gap:4px;padding:10px 12px 6px;border-bottom:1px solid var(--line-2);background:var(--paper);}
.ntab{
  font-size:.58rem;font-weight:800;letter-spacing:.3px;text-transform:uppercase;
  padding:5px 9px;border-radius:6px;border:none;background:transparent;color:var(--ink-3);cursor:pointer;
  transition:all var(--anim);
}
.ntab:hover{background:var(--paper-2);color:var(--ink);}
.ntab.active{background:var(--ink);color:#fff;}
.notif-filter{display:flex;gap:5px;padding:8px 12px;border-bottom:1px solid var(--line-2);}
.nfilt{
  font-size:.6rem;font-weight:700;padding:4px 10px;border-radius:50px;
  border:1.5px solid var(--line);background:transparent;color:var(--ink-3);cursor:pointer;
  transition:all var(--anim);
}
.nfilt.active{background:var(--ink);color:#fff;border-color:var(--ink);}
.notif-list{max-height:50vh;overflow-y:auto;}
.notif{
  padding:12px 18px;border-bottom:1px solid var(--line-2);
  display:flex;gap:10px;align-items:flex-start;cursor:pointer;transition:background var(--anim);
}
.notif:hover{background:var(--paper);}
.notif:last-child{border-bottom:none;}
.notif .ndot{width:8px;height:8px;border-radius:50%;background:var(--coral);margin-top:5px;flex-shrink:0;transition:background var(--anim);}
.notif.read .ndot{background:var(--line);}
.notif .nt{font-size:.82rem;font-weight:700;}
.notif .ns{font-size:.72rem;color:var(--ink-3);margin-top:1px;}
.notif .nx{margin-left:auto;color:var(--ink-3);font-size:.8rem;padding-left:6px;opacity:.6;}
.notif .nx:hover{color:var(--coral);opacity:1;}
.notif-empty{padding:28px 18px;text-align:center;color:var(--ink-3);font-size:.84rem;}

/* ===== CALENDAR ===== */
.calendar-wrap{background:var(--white);border:1.5px solid var(--line);border-radius:var(--radius);padding:20px;}
.cal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.cal-head h3{font-size:1.1rem;font-weight:600;}
.cal-nav{display:flex;gap:6px;}
.cal-nav button{
  width:32px;height:32px;border-radius:var(--radius-xs);
  border:1.5px solid var(--line);background:var(--white);color:var(--ink);
  font-size:.95rem;display:flex;align-items:center;justify-content:center;
  transition:all var(--anim);
}
.cal-nav button:hover{border-color:var(--ink);background:var(--paper-2);}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;}
.cal-dow{font-size:.58rem;font-weight:800;letter-spacing:.5px;text-transform:uppercase;color:var(--ink-3);text-align:center;padding:6px 0;}
.cal-cell{
  min-height:70px;border:1px solid var(--line-2);border-radius:var(--radius-xs);
  padding:6px;background:var(--white);display:flex;flex-direction:column;gap:3px;
  cursor:pointer;transition:all var(--anim);
}
.cal-cell:hover{border-color:var(--ink-2);background:var(--paper-2);}
.cal-cell.empty{background:transparent;border:none;cursor:default;}
.cal-cell.today{border-color:var(--coral);background:#fff8f7;}
.cal-date{font-size:.68rem;font-weight:700;color:var(--ink-3);}
.cal-cell.today .cal-date{color:var(--coral);}
.cal-ev{
  font-size:.55rem;font-weight:700;padding:2px 5px;border-radius:5px;
  background:var(--lav-pale);color:#6b52cc;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}
.cal-ev.rem{background:var(--mint);color:var(--ink-2);}
.cal-more{font-size:.54rem;color:var(--ink-3);}
.cal-day-detail{margin-top:16px;border-top:1px dashed var(--line);padding-top:14px;}
.cal-di{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--line-2);font-size:.84rem;}
.cal-di .dot{width:8px;height:8px;border-radius:50%;background:var(--coral);flex-shrink:0;}
.cal-di .dot.rem{background:var(--ink-2);}
.cal-di.clickable{cursor:pointer;border-radius:var(--radius-xs);margin:0 -8px;padding-left:8px;padding-right:8px;transition:background var(--anim);}
.cal-di.clickable:hover{background:var(--paper-2);}
.cal-di-arr{margin-left:auto;color:var(--ink-3);font-size:.9rem;}
.cal-di.clickable:hover .cal-di-arr{color:var(--coral);}

/* ===== CLIENTS ===== */
.cl-summary{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:18px;}
.cl-stat{background:var(--ink);color:#fff;border-radius:var(--radius);padding:18px 20px;}
.cl-stat .n{font-family:'Helvena','Helvetica Neue',sans-serif;font-size:1.8rem;font-weight:400;}
.cl-stat .l{font-size:.58rem;font-weight:800;letter-spacing:.7px;text-transform:uppercase;opacity:.7;margin-top:5px;}
.client-card{background:var(--white);border:1.5px solid var(--line);border-radius:var(--radius);padding:20px;margin-bottom:12px;transition:border-color var(--anim);}
.client-card:hover{border-color:var(--ink-2);}
.client-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-wrap:wrap;}
.client-name{font-family:'Helvena','Helvetica Neue',sans-serif;font-size:1.05rem;font-weight:600;}
.client-email{font-size:.78rem;color:var(--ink-3);margin-top:2px;}
.cl-items{display:flex;flex-wrap:wrap;gap:6px;margin:12px 0;}
.cl-item{font-size:.64rem;font-weight:700;background:var(--mint);border:1px solid var(--mint-2);border-radius:50px;padding:4px 11px;color:var(--ink-2);}
.cl-mrr{font-family:'Helvena','Helvetica Neue',sans-serif;font-size:1.2rem;color:var(--coral);}
.cl-mrr small{font-size:.68rem;color:var(--ink-3);}
.cl-notes{margin-top:14px;border-top:1px dashed var(--line);padding-top:12px;}
.cl-notes .nh{font-size:.58rem;font-weight:800;letter-spacing:.7px;text-transform:uppercase;color:var(--ink-3);margin-bottom:9px;}
.cl-note{background:var(--paper);border-radius:var(--radius-xs);padding:8px 12px;margin-bottom:7px;font-size:.84rem;display:flex;justify-content:space-between;gap:10px;align-items:flex-start;}
.cl-note-time{font-size:.58rem;color:var(--ink-3);margin-top:3px;}
.cl-note-ctrls{display:flex;gap:8px;flex-shrink:0;}
.cl-note .x{color:var(--ink-2);cursor:pointer;font-weight:700;font-size:.66rem;opacity:.7;}
.cl-note .x:hover{opacity:1;}
.cl-note .x.del{color:var(--coral);}
.cl-note-add{display:flex;gap:8px;margin-top:8px;}
.cl-note-add input{flex:1;font-family:inherit;font-size:.84rem;padding:8px 12px;border-radius:var(--radius-xs);border:1.5px solid var(--line);background:var(--white);outline:none;}
.cl-loading{text-align:center;padding:48px;color:var(--ink-3);}
.cl-status{font-size:.56rem;font-weight:800;letter-spacing:.7px;text-transform:uppercase;padding:4px 10px;border-radius:50px;}
.cl-status.active,.cl-status.trialing{background:var(--mint);color:var(--ink-2);}
.cl-status.past_due,.cl-status.unpaid{background:#ffede8;color:#c2410c;}
.cl-status.canceled{background:var(--paper-2);color:var(--ink-3);}

/* ===== GATE (login) ===== */
.gate-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:var(--paper);}
.gate{
  max-width:400px;width:100%;background:var(--white);border:1.5px solid var(--line);
  border-radius:20px;padding:36px 32px;text-align:center;box-shadow:var(--shadow-lg);
}
.gate .gb{font-family:'Helvena','Helvetica Neue',sans-serif;font-weight:700;font-size:1.1rem;margin-bottom:20px;color:var(--ink);letter-spacing:-.2px;}
.gate .gb .dot{width:7px;height:7px;border-radius:50%;background:var(--coral);display:inline-block;margin-left:2px;margin-bottom:9px;}
.gate h2{font-size:1.5rem;font-weight:400;}
.gate h2 em{font-style:italic;color:var(--coral);}
.gate p{color:var(--ink-3);font-size:.86rem;margin:10px 0 22px;}
.gate .fld{text-align:left;}
.gate .err{color:var(--coral);font-size:.8rem;min-height:18px;margin-bottom:6px;}
.gate .alt{margin-top:16px;font-size:.8rem;color:var(--ink-3);}

/* ===== MOBILE ===== */
.hamburger{
  display:none;background:var(--white);border:1.5px solid var(--line);
  width:36px;height:36px;border-radius:var(--radius-sm);
  font-size:1rem;align-items:center;justify-content:center;
}
@media(max-width:1000px){
  .dash-grid{grid-template-columns:1fr;}
}
@media(max-width:900px){
  .sidebar{transform:translateX(-100%);transition:transform .25s;width:240px;}
  .sidebar.open{transform:translateX(0);}
  .main{margin-left:0;}
  .hamburger{display:inline-flex;}
  .stat-row{grid-template-columns:repeat(2,1fr);}
  .cl-summary{grid-template-columns:1fr;}
  .content{padding:18px 16px 70px;}
  .topbar{padding:12px 16px;}
  .filter-pills{flex-wrap:nowrap;overflow-x:auto;}
  .onboard{flex-direction:column;gap:14px;}
}
@media(max-width:560px){
  .stat-row{grid-template-columns:1fr 1fr;gap:10px;}
  .stat .n{font-size:1.6rem;}
  .attn-card{flex-wrap:wrap;}
  .attn-btn{width:100%;margin-top:4px;}
}
.sb-scrim{display:none;position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:45;}
.sb-scrim.open{display:block;}
@media(min-width:901px){.sb-scrim{display:none!important;}}

<body>

<!-- GATE -->
<div class="gate-wrap" id="gateWrap">
  <div class="gate">
    <div class="gb">hello, virtually<span class="dot"></span></div>
    <h2 id="gateTitle">Your <em>workspace</em></h2>
    <p id="gateSub">Log in to see everything we've handled for you.</p>
    <div class="fld"><label id="lblEmail">Email</label><input type="email" id="gEmail" placeholder="you@business.com"></div>
    <div class="fld"><label id="lblPass">Password</label><input type="password" id="gPass" placeholder="********"></div>
    <div class="err" id="gErr"></div>
    <button class="btn btn-primary btn-block" id="gLogin">Log in</button>
    <p class="alt"><span id="lblNoAcct">No account yet?</span> <a href="index.html#build" id="lblGoSite">Create one on our site</a></p>
  </div>
</div>

<!-- APP -->
<div class="shell" id="shell" style="display:none">
  <aside class="sidebar" id="sidebar">
    <div class="sb-brand">Hello, Virtually<span class="dot"></span></div>
    <nav class="sb-nav" id="sbNav">
      <button class="nav-item active" data-view="today"><span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="17" rx="2"/><path d="M3 9h18M8 2v4M16 2v4"/><circle cx="12" cy="15" r="2.2" fill="currentColor" stroke="none"/></svg></span><span data-t="navToday">Today</span></button>
      <button class="nav-item" data-view="inquiries"><span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 5h16v11H8l-4 4z"/><path d="M8 9h8M8 12h5"/></svg></span><span data-t="navInq">Inquiries</span><span class="nv-badge" id="nbInq" style="display:none">0</span></button>
      <button class="nav-item" data-view="tasks"><span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 6h2.5l1.5 1.5L11 4"/><path d="M13 6h7"/><path d="M4 13h2.5L8 14.5 11 11"/><path d="M13 13h7"/><path d="M4 20h2.5L8 21.5 11 18"/><path d="M13 20h7"/></svg></span><span data-t="navTasks">Tasks</span><span class="nv-badge" id="nbTasks" style="display:none">0</span></button>
      <button class="nav-item" data-view="calendar"><span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="17" rx="2"/><path d="M3 9h18M8 2v4M16 2v4M7 13h2M11 13h2M15 13h2M7 17h2M11 17h2"/></svg></span><span data-t="navCal">Calendar</span></button>
      <button class="nav-item" data-view="form"><span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><path d="M14 14h3v3h-3zM18 18h3v3h-3z"/></svg></span><span data-t="navForm">My form</span></button>
      <button class="nav-item" data-view="results"><span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 20V10M10 20V4M16 20v-7M22 20H2"/></svg></span><span data-t="navResults">Results</span></button>
      <button class="nav-item" data-view="clients" id="navClients" style="display:none"><span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="8" r="3.2"/><path d="M3.5 20c0-3.3 2.5-5.5 5.5-5.5s5.5 2.2 5.5 5.5"/><path d="M16 5.2a3.2 3.2 0 0 1 0 6M18 14.6c2.2.5 3.8 2.4 3.8 5"/></svg></span><span data-t="navClients">Clients</span></button>
    </nav>
    <div class="sb-foot">
      <div class="sb-avatar" id="sbAvatar">H</div>
      <div class="sb-user"><div class="e" id="sbName"></div><div class="r" id="sbRole">CLIENT</div></div>
      <button class="sb-ico" id="langToggle">ES</button>
      <button class="sb-ico" id="logoutBtn" title="Log out">&#8594;]</button>
    </div>
  </aside>
  <div class="sb-scrim" id="sbScrim"></div>

  <main class="main">
    <div class="topbar">
      <div style="display:flex;align-items:center;gap:12px;">
        <button class="hamburger" id="hamburger">&#9776;</button>
        <h1 id="viewTitle">Today</h1>
      </div>
      <div class="tb-actions">
        <button class="btn btn-primary btn-sm" id="quickAddBtn" data-t="quickAddInq">+ New inquiry</button>
        <button class="bell" id="bellBtn"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg><span class="bell-badge" id="bellBadge" style="display:none">0</span></button>
      </div>
    </div>
    <div class="content" id="content"></div>
  </main>
</div>

<!-- notifications -->
<div class="notif-panel" id="notifPanel">
  <div class="notif-head"><h4 id="notifTitle">Notifications</h4><button class="del-link" id="notifClear">Clear all</button></div>
  <div class="push-card" id="pushCard" style="display:none"></div>
  <div class="notif-tabs" id="notifTabs">
    <button class="ntab active" data-ntab="all" id="ntabAll">All</button>
    <button class="ntab" data-ntab="new" id="ntabNew">Inquiries</button>
    <button class="ntab" data-ntab="appt" id="ntabAppt">Appts</button>
    <button class="ntab" data-ntab="rem" id="ntabRem">Tasks</button>
    <button class="ntab" data-ntab="note" id="ntabNote">Notes</button>
  </div>
  <div class="notif-filter" id="notifFilter">
    <button class="nfilt active" data-nfilt="unread" id="nfUnread">Unread</button>
    <button class="nfilt" data-nfilt="all" id="nfAll">All</button>
  </div>
  <div class="notif-list" id="notifList"></div>
</div>

<!-- detail drawer -->
<div class="drawer-bg" id="drawerBg"></div>
<div class="drawer" id="drawer">
  <div class="drawer-head">
    <div><h2 id="dName">,</h2><div class="dh-sub" id="dSub"></div></div>
    <button class="drawer-close" id="drawerClose">&times;</button>
  </div>
  <div class="drawer-body" id="drawerBody"></div>
</div>

<!-- SHEET: quick add (inquiry/booking/task) -->
<div class="overlay" id="addOverlay">
  <div class="sheet">
    <button class="sheet-close" data-close="addOverlay">&times;</button>
    <h3 id="addTitle">Add</h3>
    <div class="sub" id="addSub"></div>
    <div class="seg" id="addSeg">
      <button data-kind="inquiry" class="on" id="segInq">Inquiry</button>
      <button data-kind="booking" id="segBook">Booking</button>
      <button data-kind="task" id="segTask">Task</button>
    </div>
    <!-- inquiry/booking fields -->
    <div id="ibFields">
      <div class="fld" id="fClientWrap"><label id="lblClientEmail">Client account email</label><input type="email" id="fClient" placeholder="client@business.com"></div>
      <div class="fld-row">
        <div class="fld"><label id="lblName">Name</label><input type="text" id="fName" placeholder="Maria Lopez"></div>
        <div class="fld"><label id="lblChannel">Channel</label>
          <select id="fChannel"><option>WhatsApp</option><option>Instagram</option><option>Facebook</option><option>Website form</option><option>Email</option><option>Phone</option></select>
        </div>
      </div>
      <div class="fld"><label id="lblContact">Their contact</label><input type="text" id="fContact" placeholder="787-555-0100 / @handle"></div>
      <div class="fld" id="fWhenWrap" style="display:none"><label id="lblWhen">Appointment date & time</label><input type="datetime-local" id="fWhen"></div>
      <div class="fld"><label id="lblMsg">Message / details</label><textarea id="fMsg" placeholder="What they need..."></textarea></div>
    </div>
    <!-- task fields -->
    <div id="taskFields" style="display:none">

  function statusPatch(id,st){ const r=inquiries.find(x=>String(x.id)===String(id))||{}; const f={status:st}; if(st==="hired"){ if(!r.won_at) f.won_at=new Date().toISOString(); } else if(r.won_at){ f.won_at=null; } return f; }

  const fmtMoney=n=>"$"+Number(n||0).toLocaleString(locale(),{maximumFractionDigits:0});
  function toLocalInput(d){ const p=n=>String(n).padStart(2,"0"); return d.getFullYear()+"-"+p(d.getMonth()+1)+"-"+p(d.getDate())+"T"+p(d.getHours())+":"+p(d.getMinutes()); }
  // ===== smart next-step presets =====
  function contactOf(r){
    const raw=((r.customer_contact||"")+" "+(r.customer_email||"")+" "+(r.customer_phone||""));
    const em=(raw.match(/[\w.+-]+@[\w-]+\.[\w.]+/)||[])[0]||"";
    const ph=((raw.replace(em,"").match(/\+?\d[\d\s().-]{6,}/)||[""])[0]).replace(/[^\d+]/g,"");
    return {em:em,ph:ph};
  }
  function estLink(r){ return (r&&r.id)?("https://itshellovirtually.com/e.html?id="+r.id):""; }
  function fillTpl(k,r){
    const first=((r.customer_name||"").trim().split(" ")[0])||"";
    const proj=(r.message&&r.message.length<=35)?r.message:T("projFallback");
    const amt=parseFloat(r.estimate_amount)>0?" ("+fmtMoney(r.estimate_amount)+")":"";
    let out=T("tplb_"+k).replace(/\{name\}/g,first).replace(/\{project\}/g,proj).replace(/\{amount\}/g,amt);
    if(r.estimate_url&&(k==="estimate"||k==="followup"||k==="followup2"||k==="lastcall")) out+="\n\n"+T("docLine")+" "+estLink(r);
    return out;
  }
  let myFormUrl=null;
  function formLink(){ return myFormUrl||("https://itshellovirtually.com/form?c="+encodeURIComponent((user&&user.email)||"")); }
  const STEP_PRESETS={
    initial:{type:"message",note:"stepInitial",days:0},
    estimate:{type:"estimate",days:1},
    followup:{type:"followup",days:3},
    followup2:{type:"followup",note:"stepSecond",days:4}
  };
  const STAGE_STEPS={new:["initial","estimate"],contacting:["estimate","followup"],estimate_sent:["followup"],follow_up:["followup2"],hired:[],not_hired:[]};
  function applyPreset(pid){
    const pr=STEP_PRESETS[pid]; if(!pr) return;
    try{ $("sType").value=pr.type; }catch(e){}
    $("sNote").value=pr.note?T(pr.note):"";

    else { d.setDate(d.getDate()+pr.days); d.setHours(10,0,0,0); }

  function fmtDate(d){ try{ const t=new Date(d); return t.toLocaleDateString(locale(),{month:"short",day:"numeric"}); }catch(e){ return ""; } }
  function fmtExact(d){ try{ const t=new Date(d); return t.toLocaleDateString(locale(),{year:"numeric",month:"short",day:"numeric"})+" \u00b7 "+t.toLocaleTimeString(locale(),{hour:"numeric",minute:"2-digit"}); }catch(e){ return ""; } }
  function fmtWhen(d){ try{ const t=new Date(d),n=new Date(); const sd=t.toDateString()===n.toDateString(); const tm=new Date(n); tm.setDate(n.getDate()+1); const it=t.toDateString()===tm.toDateString(); const hm=t.toLocaleTimeString(locale(),{hour:"numeric",minute:"2-digit"}); if(sd)return T("today")+" "+hm; if(it)return T("tomorrow")+" "+hm; return t.toLocaleDateString(locale(),{month:"short",day:"numeric"})+" \u00b7 "+hm; }catch(e){ return ""; } }
  function actionLabel(k){ return {call:T("actCall"),message:T("actMessage"),followup:T("actFollow"),estimate:T("actEstimate"),appointment:T("actAppt"),email:T("actEmail"),other:T("actOther")}[k]||T("actOther"); }
  const startOfDay=d=>{ const x=new Date(d); x.setHours(0,0,0,0); return x.getTime(); };
  const isToday=d=>startOfDay(d)===startOfDay(new Date());

    renderViewTitle(); render(); renderNotifs(); try{ renderPushCard(); }catch(e){}

  // ===== data =====
  async function loadAll(){
    if(!sb||!user) return;
    const [iq,rm,nt,tk]=await Promise.all([
      sb.from("inquiries").select("*").order("created_at",{ascending:false}),
      sb.from("reminders").select("*").order("due_at",{ascending:true}),
      sb.from("notes").select("*").order("created_at",{ascending:true}),
      sb.from("tasks").select("*").order("created_at",{ascending:false})
    ]);
    inquiries=(iq&&iq.data)||[]; reminders=(rm&&rm.data)||[]; tasks=(tk&&tk.data)||[];
    notesByInq={}; ((nt&&nt.data)||[]).forEach(n=>{ (notesByInq[n.inquiry_id]=notesByInq[n.inquiry_id]||[]).push(n); });
    buildNotifs(); updateNavBadges(); render(); renderNotifs();
    try{ const ti=$("tInq"); if(ti&&ti.options.length<=1) fillInqSelect(ti,ti.value||null); const ei=$("eInq"); if(ei&&ei.options.length<=1) fillInqSelect(ei,ei.value||null); }catch(e){}
    if(detailId) openDetail(detailId,true);
  }
  function subscribe(){
    try{ sb.channel("ws-"+(user.id||"x"))
      .on("postgres_changes",{event:"*",schema:"public",table:"inquiries"},()=>loadAll())
      .on("postgres_changes",{event:"*",schema:"public",table:"reminders"},()=>loadAll())
      .on("postgres_changes",{event:"*",schema:"public",table:"notes"},()=>loadAll())
      .on("postgres_changes",{event:"*",schema:"public",table:"tasks"},()=>loadAll())
      .subscribe(); }catch(e){ console.warn(e); }
  }

  function nextActionFor(id){ return reminders.filter(x=>x.inquiry_id===id&&!x.done).sort((a,b)=>new Date(a.due_at)-new Date(b.due_at))[0]; }
  function updateNavBadges(){
    const nNew=inquiries.filter(r=>stOf(r)==="new"&&!r.archived).length;
    const openTasks=tasks.filter(t=>!t.done).length + reminders.filter(r=>!r.done).length;
    const bi=$("nbInq"),bt=$("nbTasks");

  // ===== view routing =====
  function setView(v){ view=v; try{localStorage.setItem("hv_view",v);}catch(e){} document.querySelectorAll(".nav-item").forEach(n=>n.classList.toggle("active",n.getAttribute("data-view")===v)); closeSidebar(); renderViewTitle(); render(); }
  function renderViewTitle(){ const map={today:"titleToday",inquiries:"titleInq",tasks:"titleTasks",calendar:"titleCal",form:"titleForm",results:"titleRes",clients:"titleClients"}; $("viewTitle").textContent=T(map[view]||"titleToday"); }
  function render(){

  // ===== TODAY =====
  function tile(cls,n,label,go,filt,ctx,ctxUrgent,icon){
    const ctxHtml=ctx?'<div class="stat-ctx'+(ctxUrgent?' urgent':'')+'">'+esc(ctx)+'</div>':'';
    return '<div class="stat '+cls+'" data-go="'+go+'"'+(filt?' data-filt="'+filt+'"':'')+'><div class="stat-top"><span class="stat-ic">'+icon+'</span></div><div class="n">'+n+'</div><div class="l">'+esc(label)+'</div>'+ctxHtml+'</div>';

  function icoInq(){ return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 5h16v11H8l-4 4z"/></svg>'; }
  function icoBell(){ return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9a6 6 0 1 1 12 0c0 5 2 6 2 6H4s2-1 2-6"/><path d="M10 20a2 2 0 0 0 4 0"/></svg>'; }
  function icoCheck(){ return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 6h2.5l1.5 1.5L11 4"/><path d="M13 6h7M4 13h2.5L8 14.5 11 11M13 13h7M4 20h2.5L8 21.5 11 18M13 20h7"/></svg>'; }
  function icoCal(){ return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="17" rx="2"/><path d="M3 9h18M8 2v4M16 2v4"/></svg>'; }
  function renderToday(){
    const c=$("content");
    const now=new Date();
    const dayMs=86400000;
    const newInq=inquiries.filter(r=>stOf(r)==="new"&&!r.archived);
    const actionsToday=reminders.filter(r=>!r.done&&isToday(r.due_at));
    const tasksToday=tasks.filter(t=>!t.done&&(t.due_at?isToday(t.due_at):true));
    const openTasks=tasks.filter(t=>!t.done).length+reminders.filter(r=>!r.done).length;
    const upcoming=inquiries.filter(r=>r.kind==="booking"&&r.booking_at&&new Date(r.booking_at)>now).length;
    const realInq=inquiries.filter(r=>r.kind!=="booking"&&!r.archived);
    const dateStr=now.toLocaleDateString(locale(),{weekday:"long",month:"long",day:"numeric"});
    const hr=now.getHours();
    const greetKey=hr<12?"greetAM":(hr<18?"greetPM":"greetEve");
    const who=isAdmin?"":(", "+displayName());
    const hi=isAdmin?(T(greetKey)+", "+displayName()):(T(greetKey)+who);

    let html='<div class="greet-row"><div class="hi">'+esc(hi)+'</div><div class="date">'+esc(dateStr.charAt(0).toUpperCase()+dateStr.slice(1))+'</div></div>';

    // ── onboarding card (empty account) ──
    if(!realInq.length && !openTasks){
      html+='<div class="onboard"><div class="onboard-ic">'+icoInq()+'</div><div class="onboard-main"><div class="onboard-t">'+esc(T("onbTitle"))+'</div><div class="onboard-s">'+esc(T("onbText"))+'</div><div class="onboard-actions"><button class="btn btn-primary btn-sm" data-act="copylink">'+esc(T("copyLink"))+'</button><button class="btn btn-ghost btn-sm" data-go-add="1">'+esc(T("addInquiry"))+'</button></div></div><div class="onboard-link">'+esc(formLink().replace(/^https?:\/\//,""))+'</div></div>';
    }

    // ── editorial numbers strip ──
    const overdueAll=reminders.filter(r=>!r.done&&r.due_at&&new Date(r.due_at)<now).length+tasks.filter(t=>!t.done&&t.due_at&&new Date(t.due_at)<now).length;
    const dueToday=actionsToday.length+tasksToday.filter(t=>t.due_at&&isToday(t.due_at)).length;
    const estOutList=realInq.filter(r=>stOf(r)==="estimate_sent"||stOf(r)==="follow_up");
    const estOutSum=estOutList.reduce((a,r)=>a+(parseFloat(r.estimate_amount)||0),0);
    html+='<div class="ed-nums">'+
      '<div class="ed-num" data-go="inquiries" data-filt="new"><span class="ed-n">'+newInq.length+'</span><span class="ed-l">'+esc(T("edNew"))+'</span></div>'+
      '<div class="ed-num" data-go="tasks"><span class="ed-n'+(overdueAll?' urgent':'')+'">'+dueToday+'</span><span class="ed-l">'+esc(T("edDue"))+'</span></div>'+
      '<div class="ed-num" data-go="inquiries" data-filt="estimate_sent"><span class="ed-n">'+estOutList.length+'</span><span class="ed-l">'+esc(T("edEst"))+'</span></div>'+
      (estOutSum>0?'<div class="ed-num" data-go="results"><span class="ed-n money">'+fmtMoney(estOutSum)+'</span><span class="ed-l">'+esc(T("edEstVal"))+'</span></div>':'')+
    '</div>';

    // ── two column layout ──
    html+='<div class="dash-grid">';
    html+='<div class="dash-left">';

    // ── your day: one prioritized list ──
    const stale=newInq.filter(r=>r.created_at&&(now-new Date(r.created_at))>dayMs);
    const noStep=realInq.filter(r=>stOf(r)!=="hired"&&stOf(r)!=="not_hired"&&!nextActionFor(r.id)&&!stale.includes(r));
    const overdue=reminders.filter(r=>!r.done&&r.due_at&&new Date(r.due_at)<now).concat(tasks.filter(t=>!t.done&&t.due_at&&new Date(t.due_at)<now));
    const day=[];
    stale.slice(0,3).forEach(r=>day.push({kind:"stale",r:r}));
    overdue.slice(0,3).forEach(o=>day.push({kind:"od",o:o}));
    actionsToday.filter(x=>!overdue.includes(x)).slice(0,4).forEach(o=>day.push({kind:"due",o:o}));
    tasksToday.filter(t=>t.due_at&&isToday(t.due_at)&&!overdue.includes(t)).slice(0,3).forEach(o=>day.push({kind:"duet",o:o}));
    noStep.slice(0,2).forEach(r=>day.push({kind:"nostep",r:r}));
    dayQueue=day;
    html+='<div class="panel day-panel"><div class="panel-h"><h3>'+esc(T("yourDay"))+'</h3>'+(day.length?'<span style="display:flex;align-items:center;gap:9px"><span class="day-count">'+day.length+'</span><button class="btn btn-primary btn-sm" data-act="focusStart">'+esc(T("startDay"))+'</button></span>':'')+'</div>';
    if(!day.length){
      html+='<div class="attn-clear"><span class="attn-check">\u2713</span><div><div class="attn-clear-t">'+esc(T("noAttn"))+'</div><div class="attn-clear-s">'+esc(T("caughtUpSub"))+'</div></div></div>';
    } else {
      html+='<div class="day-list">'+day.slice(0,6).map(function(a,i){
        const idx='<span class="day-idx">'+String(i+1).padStart(2,"0")+'</span>';
        if(a.kind==="stale"){ const r=a.r; const days=Math.floor((now-new Date(r.created_at))/dayMs);
          return '<div class="day-item"><div class="day-main" data-open="'+r.id+'">'+idx+'<div><div class="day-t">'+esc(r.customer_name||'\u2014')+'</div><div class="day-s"><span class="day-reason">'+esc(T("stuckLbl"))+'</span> \u00b7 '+days+'d '+esc(T("waitingSince"))+'</div></div></div><button class="attn-btn" data-open="'+r.id+'">'+esc(T("reviewInq"))+'</button></div>';
        }
        if(a.kind==="nostep"){ const r=a.r;
          return '<div class="day-item"><div class="day-main" data-open="'+r.id+'">'+idx+'<div><div class="day-t">'+esc(r.customer_name||'\u2014')+'</div><div class="day-s"><span class="day-reason lav">'+esc(T("addStep"))+'</span></div></div></div><button class="attn-btn" data-open="'+r.id+'">'+esc(T("addStep"))+'</button></div>';
        }
        const o=a.o; const late=a.kind==="od";
        return '<div class="day-item"><div class="day-main"'+(o.inquiry_id?' data-open="'+o.inquiry_id+'"':'')+'>'+idx+'<div><div class="day-t">'+esc(o.title)+'</div><div class="day-s">'+(late?'<span class="day-reason">'+esc(T("overdueLbl"))+'</span> \u00b7 ':'')+esc(fmtWhen(o.due_at))+'</div></div></div><button class="attn-btn done" data-donerem="'+o.id+'" data-kind="'+(o.priority!==undefined?"task":"rem")+'">'+esc(T("markDone"))+'</button></div>';
      }).join("")+'</div>';
    }
    html+='</div>';

    html+='</div>'; // end left

    // RIGHT COLUMN (narrower)
    html+='<div class="dash-right">';

    // Pipeline overview
    const waiting=estOutList.slice().sort((a,b)=>new Date(a.updated_at||a.created_at)-new Date(b.updated_at||b.created_at));
    html+='<div class="panel"><div class="panel-h"><h3>'+esc(T("waitingTitle"))+'</h3>'+(waiting.length?'<span class="day-count">'+waiting.length+'</span>':'')+'</div>';
    if(!waiting.length){ html+='<div class="empty-mini"><div class="empty-mini-t">'+esc(T("noWaiting"))+'</div><div class="empty-mini-s">'+esc(T("noWaitingSub"))+'</div></div>'; }
    else{
      html+='<div class="wait-list">'+waiting.slice(0,5).map(function(r){
        const days=Math.floor((now-new Date(r.updated_at||r.created_at))/dayMs);
        return '<div class="wait-item" data-open="'+r.id+'"><div class="wait-main"><div class="day-t">'+esc(r.customer_name||'\u2014')+'</div><div class="day-s">'+esc(stLbl(stOf(r)))+' \u00b7 '+days+'d</div></div>'+(parseFloat(r.estimate_amount)>0?'<span class="est-chip">'+fmtMoney(r.estimate_amount)+'</span>':'');
      }).join("")+'</div>';
      html+='<button class="panel-link" data-go="inquiries" data-filt="estimate_sent">'+esc(T("allInquiries"))+' \u2192</button>';
    }
    html+='</div>';

    // Recent activity
    const feed=[];
    realInq.forEach(r=>{ if(r.created_at) feed.push({t:new Date(r.created_at),type:"inq",name:r.customer_name||'\u2014',id:r.id}); });
    Object.keys(notesByInq).forEach(iid=>{ (notesByInq[iid]||[]).forEach(n=>{ if(n.created_at){ const inq=inquiries.find(x=>x.id==iid); feed.push({t:new Date(n.created_at),type:"note",name:(inq?inq.customer_name:"")||'\u2014',id:iid,body:n.body,role:n.author_role}); } }); });
    inquiries.forEach(r=>{ if(r.kind==="booking"&&r.booking_at) feed.push({t:new Date(r.booking_at),type:"book",name:r.customer_name||'\u2014',id:r.id}); });
    feed.sort((a,b)=>b.t-a.t);
    html+='<div class="panel"><div class="panel-h"><h3>'+esc(T("recentActivity"))+'</h3></div>';
