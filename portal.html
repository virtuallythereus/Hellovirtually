  // ===== RESULTS =====
  let resM=0; // 0 = mes actual, -1 = mes anterior...
  function renderResults(){
    const c=$("content"); const now=new Date();
    const base=new Date(now.getFullYear(),now.getMonth()+resM,1);
    const y=base.getFullYear(),m=base.getMonth();
    const pv=new Date(y,m-1,1); const py=pv.getFullYear(),pm=pv.getMonth();
    const inMo=(d,yy,mm)=>{ if(!d)return false; const t=new Date(d); return t.getFullYear()===yy&&t.getMonth()===mm; };
    const wonDate=r=>r.won_at||r.updated_at;
    const real=inquiries.filter(r=>r.kind!=="booking");

    const capList=real.filter(r=>inMo(r.created_at,y,m));
    const cap=capList.length;
    const capPrev=real.filter(r=>inMo(r.created_at,py,pm)).length;
    const won=real.filter(r=>stOf(r)==="hired"&&inMo(wonDate(r),y,m));
    const wonSum=won.reduce((a,r)=>a+(parseFloat(r.estimate_amount)||0),0);
    const wonPrev=real.filter(r=>stOf(r)==="hired"&&inMo(wonDate(r),py,pm)).length;
    const out=real.filter(r=>!r.archived&&(stOf(r)==="estimate_sent"||stOf(r)==="follow_up"));
    const outSum=out.reduce((a,r)=>a+(parseFloat(r.estimate_amount)||0),0);
    const h=real.filter(r=>stOf(r)==="hired").length, nh=real.filter(r=>stOf(r)==="not_hired").length;
    const rate=(h+nh)>0?Math.round(h/(h+nh)*100)+"%":"\u2014";

    const resp=capList.map(r=>{ const fr=r.first_response_at||r.called_at; return fr?new Date(fr)-new Date(r.created_at):null; }).filter(v=>v!=null&&v>=0);
    const fmtDur=ms=>{ const hh=ms/36e5; if(hh<1)return Math.max(1,Math.round(ms/6e4))+"min"; if(hh<48)return (Math.round(hh*10)/10)+"h"; return Math.round(hh/24)+T("resDays"); };
    const speed=resp.length?fmtDur(resp.reduce((a,b)=>a+b,0)/resp.length):"\u2014";

    const monthName=base.toLocaleDateString(locale(),{month:"long",year:"numeric"});
    const pvName=pv.toLocaleDateString(locale(),{month:"long"});
    const delta=(cur,prev)=>{ const d=cur-prev; return T("resVs")+" "+pvName+": "+prev+(d!==0?" \u00b7 "+(d>0?"+":"")+d:""); };
    const row=(i,n,l,sub)=>'<div class="res-row"><span class="res-idx">'+i+'</span><span class="res-n">'+n+'</span><div class="res-main"><div class="res-l">'+esc(l)+'</div>'+(sub?'<div class="res-s">'+esc(sub)+'</div>':'')+'</div></div>';

    const srcs={}; capList.forEach(r=>{ const k=(r.channel||"").trim()||T("resOther"); srcs[k]=(srcs[k]||0)+1; });
    const sEntries=Object.entries(srcs).sort((a,b)=>b[1]-a[1]);
    const sMax=sEntries.length?sEntries[0][1]:1;
    let srcHtml="";
    if(sEntries.length){
      srcHtml='<div class="res-sec">'+esc(T("resSources"))+'</div>'+sEntries.map(([k,n])=>'<div class="res-src"><span class="res-src-l">'+esc(k)+'</span><div class="res-src-bar"><div class="res-src-fill" style="width:'+Math.round(n/sMax*100)+'%"></div></div><span class="res-src-n">'+n+'</span></div>').join("");
    }

    let followHtml="";
    if(resM===0&&out.length){
      const rows=out.slice().sort((a,b)=>new Date(a.created_at)-new Date(b.created_at)).slice(0,5).map(r=>{
        const days=Math.max(0,Math.floor((now-new Date(r.created_at))/864e5));
        const amt=parseFloat(r.estimate_amount)>0?'<span class="est-chip">'+fmtMoney(r.estimate_amount)+'</span>':'';
        return '<div class="res-lead" data-open="'+r.id+'"><div class="res-lead-main"><div class="res-lead-t">'+esc(r.customer_name||"\u2014")+'</div><div class="res-lead-s">'+esc(stLbl(stOf(r)))+' \u00b7 '+days+T("resDays")+'</div></div>'+amt+'</div>';
      }).join("");
      followHtml='<div class="res-sec">'+esc(T("resFollow"))+'</div>'+rows;
    }

    const allWon=real.filter(r=>stOf(r)==="hired");
    const allWonSum=allWon.reduce((a,r)=>a+(parseFloat(r.estimate_amount)||0),0);

    const rows=[[cap,T("resCaptured"),delta(cap,capPrev)]];
    if(resM===0) rows.push([out.length,T("resOut"),outSum>0?fmtMoney(outSum)+" "+T("resOutSub"):T("resOutSub")]);
    rows.push([won.length,T("resWon"),(wonSum>0?fmtMoney(wonSum)+" \u00b7 ":"")+delta(won.length,wonPrev)]);
    rows.push([rate,T("resRate"),""]);
    rows.push([speed,T("resSpeed"),""]);
    let ri=0; const num=()=>String(++ri).padStart(2,"0");
    const rowsHtml=rows.map(r=>row(num(),r[0],r[1],r[2])).join("");

    c.innerHTML='<div class="res-wrap">'+
      '<div class="res-head"><button class="res-mbtn" id="resPrev">&#8592;</button><div class="res-month" style="margin-bottom:0">'+esc(monthName)+'</div><button class="res-mbtn" id="resNext"'+(resM>=0?" disabled":"")+'>&#8594;</button></div>'+
      (cap===0?'<div class="res-s" style="padding:14px 2px">'+esc(T("resNoMonth"))+'</div>':'')+
      rowsHtml+
      srcHtml+followHtml+
      '<div class="res-share-wrap"><button class="btn btn-primary btn-sm" id="resShare">'+esc(T("resShare"))+'</button></div>'+
      '<div class="res-sec">'+esc(T("resAllTime"))+'</div>'+
      row(num(),real.length,T("resAllCaptured"),"")+
      row(num(),allWon.length,T("resAllWon"),allWonSum>0?fmtMoney(allWonSum):"")+
    '</div>';

    const pb=$("resPrev"),nb=$("resNext"),shb=$("resShare");
    if(pb)pb.addEventListener("click",()=>{ resM--; renderResults(); });
    if(nb)nb.addEventListener("click",()=>{ if(resM<0){ resM++; renderResults(); } });
    if(shb)shb.addEventListener("click",async()=>{
      const lines=["Hello, Virtually \u2014 "+T("resReport")+" \u00b7 "+monthName,
        cap+" "+T("resCaptured")];
      if(resM===0) lines.push(out.length+" "+T("resOut")+(outSum>0?" ("+fmtMoney(outSum)+" "+T("resOutSub")+")":""));
      lines.push(won.length+" "+T("resWon")+(wonSum>0?" \u00b7 "+fmtMoney(wonSum):""),
        T("resRate")+": "+rate,
        T("resSpeed")+": "+speed);
      const txt=lines.join("\n");
      if(navigator.share){ try{ await navigator.share({text:txt}); return; }catch(e){} }
      try{ await navigator.clipboard.writeText(txt); shb.textContent=T("resCopied"); setTimeout(()=>{shb.textContent=T("resShare");},1600); }catch(e){ prompt("",txt); }
    });
  }

  function renderClients(){
    const c=$("content");
    if(clientsLoading||clientsData===null){ c.innerHTML='<div class="cl-loading">'+esc(T("loading"))+'</div>'; return; }
    if(clientsData&&clientsData.__error){ c.innerHTML='<div class="cl-loading">'+esc(T("clientsErr"))+'<br><small style="opacity:.6">'+esc(clientsData.__error)+'</small></div>'; return; }
    const list=Array.isArray(clientsData)?clientsData:[];

      return '<div class="client-card" data-cemail="'+esc(em)+'"><div class="client-top"><div><div class="client-name">'+esc(x.name||x.email||"\u2014")+'</div>'+(x.email?'<div class="client-email">'+esc(x.email)+'</div>':'')+'</div><span class="cl-status '+stc+'">'+esc(x.status||"")+'</span></div><div class="cl-items">'+(x.items||[]).map(i=>'<span class="cl-item">'+esc(i)+'</span>').join("")+'</div><div class="cl-mrr">$'+(x.mrr||0).toLocaleString("en-US",{maximumFractionDigits:0})+' <small>'+esc(T("perMonth"))+'</small></div><div class="cl-notes"><div class="nh">'+esc(T("internalNotes"))+'</div>'+nh+'<div class="cl-note-add"><input type="text" data-cnact="input" placeholder="'+esc(T("addInternal"))+'"><button class="btn btn-ghost btn-sm" data-cnact="add">'+esc(T("send"))+'</button></div></div></div>';
    }).join("");
    c.innerHTML=html;
  }

    // open inquiry detail

      if(e.target.closest('[data-act="saveEst"]')){ const inp=$("dEstInput"); const v=parseFloat(inp.value); const b=e.target.closest('[data-act="saveEst"]'); const ok=await patchInq(id,{estimate_amount:(isNaN(v)||v<=0)?null:v}); if(ok){ b.textContent=T("estSaved")+" \u2713"; if(!isNaN(v)&&v>0)autoNote(id,T("noteEst")+" "+fmtMoney(v)); setTimeout(()=>{ openDetail(id,true); render(); },500); } else { b.textContent=T("estErr"); b.style.color="var(--coral)"; setTimeout(()=>{ b.textContent=T("saveEst"); b.style.color=""; },2600); } return; }
      const mc=e.target.closest("[data-msgch]");
      if(mc){ const ch=mc.getAttribute("data-msgch"); const r=inquiries.find(x=>x.id===id); const ct=contactOf(r); const txt=$("msgBody")?$("msgBody").value:"";
        if(ch==="copy"){ try{ await navigator.clipboard.writeText(txt); mc.textContent=T("contactCopied"); setTimeout(()=>{mc.textContent=T("copyShort");},1500); }catch(err){ prompt("",txt); } return; }

        else if(ch==="tel"){ window.location.href="tel:"+ct.ph; autoNote(id,T("noteCall")); }

      if(e.target.closest('[data-act="archToggle"]')){ const r=inquiries.find(x=>String(x.id)===String(id)); const nv=!(r&&r.archived); const okp=await patchInq(id,{archived:nv}); if(okp){ if(nv){ closeDetail(); } else { openDetail(id,true); } render(); } return; }
      if(e.target.closest('[data-act="docRemove"]')){ await patchInq(id,{estimate_url:null}); openDetail(id,true); return; }
      if(e.target.closest('[data-act="stepPreset"]')){ const pid=e.target.closest('[data-act="stepPreset"]').getAttribute("data-preset"); openSchedule(id); applyPreset(pid); return; }

      if(e.target.closest('[data-act="schedule"]')){ openSchedule(id); return; }
      if(e.target.closest('[data-act="delInq"]')){ if(confirm(lang==="es"?"\u00bfEliminar esta consulta?":"Delete this inquiry?")){ await sb.from("inquiries").delete().eq("id",id); inquiries=inquiries.filter(x=>x.id!==id); closeDetail(); render(); } return; }
      if(e.target.closest('[data-act="doneAct"]')){ const bb=e.target.closest('[data-act="doneAct"]'); const rid=bb.getAttribute("data-rid"); const rk=bb.getAttribute("data-rk")||"rem"; const tbl=rk==="task"?"tasks":"reminders"; await sb.from(tbl).update({done:true}).eq("id",rid); const rr=(rk==="task"?tasks:reminders).find(x=>String(x.id)===String(rid)); if(rr){rr.done=true; autoNote(id,"\u2713 "+T("noteDone")+": "+rr.title);} openDetail(id,true); render(); return; }
      if(e.target.closest('[data-act="noteSend"]')){ const inp=$("dNoteInput"); const body=(inp.value||"").trim(); if(!body)return; const r=inquiries.find(x=>x.id===id); const note={inquiry_id:id,client_email:r.client_email,body:body,author_role:isAdmin?"admin":"client",author_email:user.email}; const {data,error}=await sb.from("notes").insert(note).select(); if(!error){ (notesByInq[id]=notesByInq[id]||[]).push((data&&data[0])||note); openDetail(id,true); } return; }
      const nd=e.target.closest('[data-act="noteDel"]'); if(nd){ const nid=nd.getAttribute("data-nid"); if(confirm(lang==="es"?"\u00bfBorrar nota?":"Delete note?")){ await sb.from("notes").delete().eq("id",nid); notesByInq[id]=(notesByInq[id]||[]).filter(n=>String(n.id)!==String(nid)); openDetail(id,true); } return; }

    const ccard=e.target.closest(".client-card");

      if(e.target.closest('[data-cnact="add"]')){ const inp=ccard.querySelector('[data-cnact="input"]'); const body=(inp.value||"").trim(); if(!body)return; const {data,error}=await sb.from("client_notes").insert({client_email:email,body:body}).select(); if(!error){ (clientNotes[email]=clientNotes[email]||[]).push((data&&data[0])||{id:Math.random(),body:body,created_at:new Date().toISOString()}); renderClients(); } return; }

    if(!list.length) list=inquiries.slice();
    if(!list.length){ sel.innerHTML='<option value="">'+esc(T("noInqYet"))+'</option>'; return; }
    sel.innerHTML='<option value="">\u2014</option>'+list.map(r=>'<option value="'+r.id+'"'+(String(cur||"")===String(r.id)?' selected':'')+'>'+esc((r.customer_name||"?")+(r.message?" \u00b7 "+r.message.slice(0,24):""))+'</option>').join("");
  }

  $("addSubmit").addEventListener("click", async ()=>{
    const out=$("addMsg"); out.textContent="";
    if(addKind==="task"){
      const client=isAdmin?$("tClient").value.trim().toLowerCase():user.email.toLowerCase();
      const title=$("tTitle").value.trim(); if(!client||!title){ out.style.color="#F45145"; out.textContent=T("needFields"); return; }
      const p={client_email:client,title:title,priority:$("tPrio").value,done:false,created_by:isAdmin?"admin":"client"}; const w=$("tWhen").value; if(w)p.due_at=new Date(w).toISOString(); const iq=$("tInq").value; if(iq)p.inquiry_id=iq;

    if(addKind==="booking"){ const w=$("fWhen").value; if(w)p.booking_at=new Date(w).toISOString(); }

    const {error}=await sb.from("inquiries").insert(p); if(error){ out.style.color="#F45145"; out.textContent=error.message; return; }
    out.style.color="#347D79"; out.textContent=T("added")+" \u2713"; $("fName").value="";$("fContact").value="";$("fMsg").value=""; if($("fWhen"))$("fWhen").value="";

  // ===== notifications =====
  function buildNotifs(){
    notifs=[]; const now=Date.now();
    inquiries.forEach(r=>{ const c=new Date(r.created_at).getTime();
      if(r.kind!=="booking"&&stOf(r)==="new"&&!r.archived) notifs.push({id:"inq-"+r.id,type:"new",t:T("notifNew"),s:(r.customer_name||"")+" \u00b7 "+(r.channel||""),at:c});
      if(r.kind==="booking"&&r.booking_at){ const b=new Date(r.booking_at).getTime(); if(b>now&&b-now<1000*60*60*48) notifs.push({id:"appt-"+r.id,type:"appt",t:T("notifAppt"),s:(r.customer_name||"")+" \u00b7 "+fmtWhen(r.booking_at),at:c}); }
    });
    reminders.forEach(r=>{ if(r.done)return; const due=new Date(r.due_at).getTime(); if(due-now<1000*60*60*24) notifs.push({id:"rem-"+r.id,type:"rem",t:T("notifRem"),s:r.title+" \u00b7 "+fmtWhen(r.due_at),at:new Date(r.created_at).getTime()}); });
    tasks.forEach(t=>{ if(t.done||!t.due_at)return; const due=new Date(t.due_at).getTime(); if(due-now<1000*60*60*24) notifs.push({id:"task-"+t.id,type:"rem",t:T("notifRem"),s:t.title+" \u00b7 "+fmtWhen(t.due_at),at:new Date(t.created_at).getTime()}); });
    const myRole=isAdmin?"admin":"client";
    Object.keys(notesByInq).forEach(iid=>{ const inq=inquiries.find(x=>x.id===iid); (notesByInq[iid]||[]).forEach(n=>{ if(n.author_role&&n.author_role!==myRole){ const who=inq?(inq.customer_name||inq.client_email||""):""; notifs.push({id:"note-"+n.id,type:"note",t:T("notifNote"),s:who+" \u00b7 "+(n.body||"").slice(0,40),at:new Date(n.created_at).getTime()}); } }); });
    notifs=notifs.filter(n=>!notifDeleted[n.id]); notifs.sort((a,b)=>b.at-a.at); updateBadge();
  }
  function isUnread(n){ return !notifRead[n.id]; }
  function updateBadge(){ const u=notifs.filter(isUnread).length; const b=$("bellBadge"); if(u>0){ b.style.display="flex"; b.textContent=u>9?"9+":u; } else b.style.display="none"; }
  function saveNotifState(){ try{ localStorage.setItem("hv_nread_"+user.id,JSON.stringify(notifRead)); localStorage.setItem("hv_ndel_"+user.id,JSON.stringify(notifDeleted)); }catch(e){} }
  function renderNotifs(){
    const list=$("notifList"); if(!list)return;
    document.querySelectorAll("#notifTabs .ntab").forEach(t=>t.classList.toggle("active",t.getAttribute("data-ntab")===notifTab));
    document.querySelectorAll("#notifFilter .nfilt").forEach(t=>t.classList.toggle("active",t.getAttribute("data-nfilt")===notifFilt));
    let l=notifs.slice(); if(notifTab!=="all")l=l.filter(n=>n.type===notifTab); if(notifFilt==="unread")l=l.filter(isUnread);
    if(!l.length){ list.innerHTML='<div class="notif-empty">'+esc(T("noNotif"))+'</div>'; return; }
    list.innerHTML=l.map(n=>'<div class="notif'+(isUnread(n)?'':' read')+'" data-nid="'+esc(n.id)+'"><span class="ndot"></span><div><div class="nt">'+esc(n.t)+'</div><div class="ns">'+esc(n.s)+'</div></div><span class="nx" data-nact="del">\u00d7</span></div>').join("");
  }
  $("bellBtn").addEventListener("click",()=>{ const p=$("notifPanel"); p.classList.toggle("open"); if(p.classList.contains("open")){ renderNotifs(); renderPushCard(); } });

  // ===== PWA + Web Push (alertas de leads nuevos) =====
  const VAPID_PUBLIC="BKnLHh7rYG3aVN_k80Ih_kKrmJlNR2sixxDsC5YLz9Wv0N7HUg7dWgqsIX0v-zYIJfdPJe7owoP8uYPjvl5fc04";
  if("serviceWorker" in navigator){ window.addEventListener("load",()=>{ navigator.serviceWorker.register("/sw.js").catch(()=>{}); }); }
  function isIos(){ return /iphone|ipad|ipod/i.test(navigator.userAgent)||(navigator.platform==="MacIntel"&&navigator.maxTouchPoints>1); }
  function isStandalone(){ try{ return window.matchMedia("(display-mode: standalone)").matches||navigator.standalone===true; }catch(e){ return false; } }
  function pushSupported(){ return "serviceWorker" in navigator&&"PushManager" in window&&"Notification" in window; }
  function ub64(s){ const pad="=".repeat((4-s.length%4)%4); const b=(s+pad).replace(/-/g,"+").replace(/_/g,"/"); const raw=atob(b); const arr=new Uint8Array(raw.length); for(let i=0;i<raw.length;i++)arr[i]=raw.charCodeAt(i); return arr; }
  async function currentPushSub(){ try{ const reg=await navigator.serviceWorker.ready; return await reg.pushManager.getSubscription(); }catch(e){ return null; } }
  async function enablePush(){
    try{
      const perm=await Notification.requestPermission();
      if(perm!=="granted"){ renderPushCard(); return; }
      const reg=await navigator.serviceWorker.ready;
      let sub=await reg.pushManager.getSubscription();
      if(!sub) sub=await reg.pushManager.subscribe({userVisibleOnly:true,applicationServerKey:ub64(VAPID_PUBLIC)});
      const j=sub.toJSON();
      if(sb&&user&&j&&j.endpoint&&j.keys){
        await sb.from("push_subscriptions").upsert({client_email:user.email,endpoint:j.endpoint,p256dh:j.keys.p256dh,auth:j.keys.auth},{onConflict:"endpoint"});
      }
    }catch(e){}
    renderPushCard();
  }
  async function renderPushCard(){
    const el=$("pushCard"); if(!el)return;
    if(!user){ el.style.display="none"; return; }
    if(isIos()&&!isStandalone()){ el.style.display=""; el.innerHTML='<div class="push-tx">'+esc(T("pushIos"))+'</div>'; return; }
    if(!pushSupported()){ el.style.display="none"; return; }
    if(Notification.permission==="denied"){ el.style.display=""; el.innerHTML='<div class="push-tx">'+esc(T("pushDenied"))+'</div>'; return; }
    const sub=await currentPushSub();
    if(sub&&Notification.permission==="granted"){ el.style.display=""; el.innerHTML='<div class="push-tx push-ok">'+esc(T("pushEnabled"))+'</div>'; return; }
    el.style.display="";
    el.innerHTML='<div class="push-tx">'+esc(T("pushBody"))+'</div><button class="btn btn-primary btn-sm" id="pushOnBtn">'+esc(T("pushOn"))+'</button>';
  }
  document.addEventListener("click",e=>{ if(e.target&&e.target.id==="pushOnBtn") enablePush(); });
  $("notifClear").addEventListener("click",()=>{ notifs.forEach(n=>{ notifRead[n.id]=1; }); saveNotifState(); updateBadge(); renderNotifs(); });
  $("notifTabs").addEventListener("click",e=>{ const t=e.target.closest(".ntab"); if(!t)return; notifTab=t.getAttribute("data-ntab"); renderNotifs(); });
  $("notifFilter").addEventListener("click",e=>{ const t=e.target.closest(".nfilt"); if(!t)return; notifFilt=t.getAttribute("data-nfilt"); renderNotifs(); });
  $("notifList").addEventListener("click",e=>{ const row=e.target.closest(".notif"); if(!row)return; const id=row.getAttribute("data-nid"); if(e.target.closest('[data-nact="del"]')){ notifDeleted[id]=1; saveNotifState(); buildNotifs(); renderNotifs(); return; } notifRead[id]=1; saveNotifState(); updateBadge(); renderNotifs(); });

  // ===== misc =====
  $("langToggle").addEventListener("click",()=>{ lang=lang==="es"?"en":"es"; applyLang(); });
  $("logoutBtn").addEventListener("click", async ()=>{ await sb.auth.signOut(); location.reload(); });
  $("hamburger").addEventListener("click",()=>{ $("sidebar").classList.add("open"); $("sbScrim").classList.add("open"); });
  $("sbScrim").addEventListener("click",closeSidebar);
  function closeSidebar(){ $("sidebar").classList.remove("open"); $("sbScrim").classList.remove("open"); }
  $("gLogin").addEventListener("click", async ()=>{ const email=$("gEmail").value.trim(),pass=$("gPass").value; $("gErr").textContent=""; if(!email||!pass){ $("gErr").textContent=lang==="es"?"Escribe correo y contrase\u00f1a.":"Enter email and password."; return; } const {error}=await sb.auth.signInWithPassword({email,password:pass}); if(error){ $("gErr").textContent=lang==="es"?"No pudimos iniciar sesi\u00f3n. Revisa tus datos.":"We couldn't log you in. Check your details."; return; } location.reload(); });
  $("gPass").addEventListener("keydown",e=>{ if(e.key==="Enter")$("gLogin").click(); });

  applyLang(); boot();
})();
</script>
</body>
</html>
