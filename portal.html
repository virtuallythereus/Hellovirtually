<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Workspace — Hello, virtually!</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%23F0EEE9'/%3E%3Ctext x='50' y='68' font-family='Georgia,serif' font-size='52' font-style='italic' font-weight='700' fill='%231F3D3A' text-anchor='middle'%3Eh%3C/text%3E%3Ccircle cx='72' cy='30' r='9' fill='%23CE3375'/%3E%3C/svg%3E">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400;1,9..144,500&family=Nunito:ital,wght@0,400;0,500;0,600;0,700;0,800;1,500&family=Shadows+Into+Light&display=swap" rel="stylesheet">
<style>
:root{
  --cloud:#F0EEE9; --cloud-2:#F8F6F2;
  --lagoon:#4D9E9A; --lagoon-d:#347D79;
  --yarrow:#CE3375; --yarrow-dd:#A82A61;
  --coral:#FF6F61; --ink:#1F3D3A; --ink-2:#37544F;
  --soft:#DCEBE8; --blush:#FBE4DE; --line:rgba(31,61,58,.12);
  --line-2:rgba(31,61,58,.07);
  --shadow:0 8px 30px rgba(31,61,58,.08);
  --shadow-lg:0 24px 70px rgba(31,61,58,.18);
  --sidebar:248px;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Nunito',sans-serif;background:var(--cloud);color:var(--ink);line-height:1.5;-webkit-font-smoothing:antialiased;}
h1,h2,h3,h4{font-family:'Fraunces',serif;font-weight:600;line-height:1.08;letter-spacing:-.4px;}
a{color:var(--yarrow);text-decoration:none;}
button{font-family:inherit;}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;font-weight:700;font-size:.78rem;letter-spacing:.3px;padding:10px 18px;border-radius:10px;cursor:pointer;border:none;transition:transform .15s,box-shadow .2s,background .2s,color .2s,border-color .2s;}
.btn-primary{background:var(--yarrow);color:#fff;}
.btn-primary:hover{background:var(--yarrow-dd);}
.btn-ghost{background:#fff;border:1.5px solid var(--line);color:var(--ink);}
.btn-ghost:hover{border-color:var(--ink);}
.btn-sm{padding:7px 13px;font-size:.72rem;border-radius:9px;}
.btn-block{width:100%;}

/* ===== app shell ===== */
.shell{display:flex;min-height:100vh;}
.sidebar{width:var(--sidebar);flex-shrink:0;background:var(--ink);color:#fff;display:flex;flex-direction:column;position:fixed;top:0;bottom:0;left:0;z-index:50;}
.sb-brand{padding:22px 22px 16px;font-family:'Fraunces',serif;font-weight:600;font-size:1.25rem;display:flex;align-items:center;gap:3px;color:#fff;}
.sb-brand .dot{width:7px;height:7px;border-radius:50%;background:var(--yarrow);display:inline-block;margin-left:3px;margin-bottom:11px;}
.sb-nav{flex:1;padding:8px 12px;display:flex;flex-direction:column;gap:3px;}
.nav-item{display:flex;align-items:center;gap:11px;padding:11px 14px;border-radius:11px;color:rgba(255,255,255,.72);font-weight:700;font-size:.86rem;cursor:pointer;transition:background .18s,color .18s;border:none;background:none;text-align:left;width:100%;position:relative;}
.nav-item:hover{background:rgba(255,255,255,.07);color:#fff;}
.nav-item.active{background:rgba(255,255,255,.13);color:#fff;}
.nav-item .ic{width:18px;height:18px;flex-shrink:0;opacity:.85;}
.nav-item .nv-badge{margin-left:auto;background:var(--coral);color:#fff;font-size:.6rem;font-weight:800;min-width:18px;height:18px;border-radius:50px;display:flex;align-items:center;justify-content:center;padding:0 5px;}
.sb-foot{padding:14px;border-top:1px solid rgba(255,255,255,.12);display:flex;align-items:center;gap:10px;}
.sb-avatar{width:34px;height:34px;border-radius:50%;background:var(--yarrow);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:.85rem;flex-shrink:0;}
.sb-user{flex:1;min-width:0;}
.sb-user .e{font-size:.74rem;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.sb-user .r{font-size:.58rem;letter-spacing:1px;text-transform:uppercase;color:rgba(255,255,255,.55);}
.sb-ico{background:rgba(255,255,255,.1);border:none;color:#fff;width:32px;height:32px;border-radius:9px;cursor:pointer;font-size:.66rem;font-weight:800;}

/* main */
.main{flex:1;margin-left:var(--sidebar);min-width:0;display:flex;flex-direction:column;}
.topbar{position:sticky;top:0;z-index:40;background:rgba(240,238,233,.85);backdrop-filter:blur(10px);border-bottom:1px solid var(--line);padding:16px 28px;display:flex;align-items:center;justify-content:space-between;gap:14px;}
.topbar h1{font-size:1.5rem;font-weight:500;}
.topbar h1 em{font-style:italic;color:var(--yarrow);}
.tb-actions{display:flex;align-items:center;gap:9px;}
.bell{position:relative;background:#fff;border:1.5px solid var(--line);width:38px;height:38px;border-radius:11px;cursor:pointer;font-size:1.05rem;display:inline-flex;align-items:center;justify-content:center;}
.bell-badge{position:absolute;top:-6px;right:-6px;min-width:18px;height:18px;padding:0 5px;border-radius:50px;background:var(--coral);color:#fff;font-size:.6rem;font-weight:800;display:flex;align-items:center;justify-content:center;border:2px solid var(--cloud);}
.content{padding:26px 28px 70px;max-width:1180px;width:100%;}

/* ===== Today ===== */
.greet-row{margin-bottom:22px;}
.greet-row .hi{font-family:'Fraunces',serif;font-size:1.7rem;font-weight:400;}
.greet-row .hi em{font-style:italic;color:var(--yarrow);}
.greet-row .date{color:var(--ink-2);font-size:.86rem;margin-top:2px;}
.stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:13px;margin-bottom:26px;}
.stat{background:var(--cloud-2);border:1px solid var(--line);border-radius:16px;padding:16px 18px;cursor:pointer;transition:transform .15s,border-color .2s;}
.stat:hover{transform:translateY(-2px);border-color:var(--lagoon);}
.stat .n{font-family:'Fraunces',serif;font-size:1.8rem;font-weight:400;line-height:1;}
.stat .l{font-size:.62rem;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:var(--ink-2);margin-top:6px;}
.stat.s1 .n{color:var(--coral);}.stat.s2 .n{color:var(--yarrow);}.stat.s3 .n{color:var(--lagoon-d);}.stat.s4 .n{color:var(--ink);}
.section-block{margin-bottom:28px;}
.section-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.section-h h3{font-size:1.1rem;font-weight:500;}
.section-h .sh-link{font-size:.74rem;font-weight:700;color:var(--lagoon-d);cursor:pointer;}

/* lists / rows */
.rowlist{background:#fff;border:1px solid var(--line);border-radius:16px;overflow:hidden;}
.lrow{display:flex;align-items:center;gap:13px;padding:14px 18px;border-bottom:1px solid var(--line-2);cursor:pointer;transition:background .15s;}
.lrow:last-child{border-bottom:none;}
.lrow:hover{background:var(--cloud-2);}
.lrow .chk{width:20px;height:20px;border-radius:6px;border:1.5px solid var(--line);flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#fff;font-size:.7rem;}
.lrow .chk.done{background:var(--lagoon);border-color:var(--lagoon);}
.lrow .lr-main{flex:1;min-width:0;}
.lrow .lr-title{font-weight:700;font-size:.9rem;overflow:hidden;text-overflow:ellipsis;}
.lrow .lr-title.done{text-decoration:line-through;color:var(--ink-2);opacity:.6;}
.lrow .lr-sub{font-size:.74rem;color:var(--ink-2);margin-top:1px;}
.lr-when{font-size:.72rem;font-weight:700;color:var(--ink-2);white-space:nowrap;}
.lr-when.overdue{color:var(--coral);}
.prio-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.prio-high{background:var(--coral);}.prio-normal{background:var(--lagoon);}.prio-low{background:var(--line);}
.type-chip{font-size:.58rem;font-weight:800;letter-spacing:.5px;text-transform:uppercase;padding:3px 9px;border-radius:50px;background:var(--soft);color:var(--lagoon-d);white-space:nowrap;}

/* ===== inquiries table ===== */
.tbl-toolbar{display:flex;gap:10px;align-items:center;margin-bottom:14px;flex-wrap:wrap;}
.search{flex:1;min-width:180px;display:flex;align-items:center;gap:8px;background:#fff;border:1px solid var(--line);border-radius:10px;padding:9px 15px;}
.search input{border:none;outline:none;background:transparent;font-family:inherit;font-size:.88rem;color:var(--ink);width:100%;}
.filter-pills{display:flex;gap:6px;flex-wrap:wrap;}
.fpill{font-size:.68rem;font-weight:800;letter-spacing:.4px;text-transform:uppercase;padding:8px 13px;border-radius:9px;border:1.5px solid var(--line);background:#fff;color:var(--ink-2);cursor:pointer;}
.fpill.active{background:var(--ink);color:#fff;border-color:var(--ink);}
.crm-table{background:#fff;border:1px solid var(--line);border-radius:16px;overflow:hidden;}
.crm-head,.crm-row{display:grid;grid-template-columns:1.6fr 1fr 1fr 1.4fr 0.8fr;gap:12px;align-items:center;padding:13px 18px;}
.crm-head{background:var(--cloud-2);border-bottom:1px solid var(--line);font-size:.6rem;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:var(--ink-2);}
.crm-row{border-bottom:1px solid var(--line-2);cursor:pointer;transition:background .14s;}
.crm-row:last-child{border-bottom:none;}
.crm-row:hover{background:var(--cloud-2);}
.cr-name{font-weight:700;font-size:.9rem;display:flex;align-items:center;gap:8px;}
.cr-name .nd{width:7px;height:7px;border-radius:50%;background:var(--coral);flex-shrink:0;}
.cr-sub{font-size:.72rem;color:var(--ink-2);}
.pill{font-size:.6rem;font-weight:800;letter-spacing:.5px;text-transform:uppercase;padding:5px 11px;border-radius:50px;display:inline-block;}
.pill.new{background:var(--blush);color:var(--yarrow-dd);}
.pill.contacted{background:var(--soft);color:var(--lagoon-d);}
.pill.booked{background:#E7E0F5;color:#6D4AA8;}
.pill.closed{background:#ECEAE5;color:var(--ink-2);}
.cr-next{font-size:.76rem;color:var(--ink-2);}
.cr-next b{color:var(--yarrow-dd);font-weight:700;}
.cr-when{font-size:.74rem;color:var(--ink-2);text-align:right;}
.empty{text-align:center;padding:60px 20px;color:var(--ink-2);}
.empty .big{font-family:'Fraunces',serif;font-style:italic;font-size:1.4rem;color:var(--lagoon-d);margin-bottom:6px;}
.empty .hand{font-family:'Shadows Into Light',cursive;font-size:1.2rem;color:var(--yarrow);margin-top:8px;}

/* ===== detail panel (slide-over) ===== */
.drawer-bg{position:fixed;inset:0;background:rgba(31,61,58,.38);backdrop-filter:blur(3px);z-index:90;opacity:0;pointer-events:none;transition:opacity .25s;}
.drawer-bg.open{opacity:1;pointer-events:auto;}
.drawer{position:fixed;top:0;right:0;bottom:0;width:460px;max-width:92vw;background:var(--cloud);z-index:95;box-shadow:var(--shadow-lg);transform:translateX(100%);transition:transform .28s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;}
.drawer.open{transform:translateX(0);}
.drawer-head{padding:20px 22px;border-bottom:1px solid var(--line);display:flex;align-items:flex-start;justify-content:space-between;gap:12px;background:#fff;}
.drawer-head h2{font-size:1.35rem;font-weight:500;}
.drawer-head .dh-sub{font-size:.78rem;color:var(--ink-2);margin-top:3px;display:flex;gap:7px;align-items:center;flex-wrap:wrap;}
.drawer-close{background:none;border:none;font-size:1.6rem;color:var(--ink-2);cursor:pointer;line-height:1;}
.drawer-body{flex:1;overflow-y:auto;padding:20px 22px;}
.dsec{margin-bottom:22px;}
.dsec-l{font-size:.6rem;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:var(--ink-2);margin-bottom:9px;}
.dmsg{background:#fff;border:1px solid var(--line);border-left:3px solid var(--soft);border-radius:12px;padding:13px 16px;font-size:.9rem;white-space:pre-wrap;}
.pipe{display:flex;gap:6px;flex-wrap:wrap;}
.pstep{flex:1;min-width:70px;font-size:.64rem;font-weight:800;letter-spacing:.4px;text-transform:uppercase;padding:9px 6px;border-radius:9px;border:1.5px solid var(--line);background:#fff;color:var(--ink-2);cursor:pointer;transition:all .16s;}
.pstep.past{background:var(--soft);border-color:var(--soft);color:var(--lagoon-d);}
.pstep.on{background:var(--ink);border-color:var(--ink);color:#fff;}
.drow{display:flex;gap:9px;flex-wrap:wrap;}
.note{background:#fff;border:1px solid var(--line);border-radius:11px;padding:9px 13px;margin-bottom:8px;}
.note .nmeta{display:flex;align-items:center;gap:7px;font-size:.62rem;color:var(--ink-2);margin-bottom:3px;}
.who-tag{font-weight:800;letter-spacing:.5px;text-transform:uppercase;padding:2px 7px;border-radius:50px;font-size:.55rem;}
.who-tag.admin{background:var(--ink);color:#fff;}.who-tag.client{background:var(--lagoon);color:#fff;}
.note .nbody{font-size:.88rem;}
.note-ctrls{margin-left:auto;display:flex;gap:9px;}
.note-edit{color:var(--lagoon-d);cursor:pointer;font-weight:800;}.note-del{color:var(--coral);cursor:pointer;font-weight:800;}
.note-add{display:flex;gap:8px;margin-top:9px;}
.note-add input{flex:1;font-family:inherit;font-size:.86rem;padding:9px 13px;border-radius:9px;border:1px solid var(--line);background:#fff;outline:none;}
.mini-btn{display:inline-flex;align-items:center;gap:6px;font-size:.74rem;font-weight:800;padding:9px 15px;border-radius:9px;border:1.5px solid var(--lagoon);background:#fff;color:var(--lagoon-d);cursor:pointer;}
.mini-btn.done{background:var(--lagoon);color:#fff;}
.mini-btn.alt{border-color:var(--yarrow);color:var(--yarrow);}
.del-link{background:none;border:none;color:var(--coral);font-weight:800;font-size:.74rem;cursor:pointer;}

/* ===== modals ===== */
.overlay{position:fixed;inset:0;background:rgba(31,61,58,.42);backdrop-filter:blur(3px);z-index:100;display:none;align-items:flex-start;justify-content:center;padding:6vh 16px;overflow-y:auto;}
.overlay.open{display:flex;}
.sheet{background:#fff;border-radius:18px;width:100%;max-width:460px;padding:24px;box-shadow:var(--shadow-lg);}
.sheet h3{font-size:1.3rem;font-weight:500;margin-bottom:3px;}
.sheet .sub{font-size:.82rem;color:var(--ink-2);margin-bottom:16px;}
.sheet-close{float:right;background:none;border:none;font-size:1.5rem;color:var(--ink-2);cursor:pointer;}
.fld{display:flex;flex-direction:column;gap:5px;margin-bottom:12px;}
.fld label{font-size:.62rem;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:var(--ink-2);}
.fld input,.fld select,.fld textarea{font-family:inherit;font-size:.9rem;padding:11px 13px;border-radius:10px;border:1px solid var(--line);background:var(--cloud-2);color:var(--ink);outline:none;}
.fld textarea{resize:vertical;min-height:66px;}
.fld-row{display:grid;grid-template-columns:1fr 1fr;gap:11px;}
.form-msg{font-size:.8rem;min-height:17px;margin-top:3px;}
.seg{display:flex;gap:7px;margin-bottom:13px;flex-wrap:wrap;}
.seg button{flex:1;font-size:.7rem;font-weight:800;letter-spacing:.4px;text-transform:uppercase;padding:9px;border-radius:9px;border:1.5px solid var(--line);background:#fff;color:var(--ink-2);cursor:pointer;}
.seg button.on{background:var(--ink);color:#fff;border-color:var(--ink);}

/* notifications */
.notif-panel{position:fixed;top:70px;right:24px;width:340px;max-width:calc(100vw - 28px);background:#fff;border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow-lg);z-index:80;display:none;overflow:hidden;}
.notif-panel.open{display:block;}
.notif-head{padding:14px 18px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;}
.notif-head h4{font-size:1rem;font-weight:600;}
.notif-tabs{display:flex;gap:5px;padding:10px 14px 4px;flex-wrap:wrap;border-bottom:1px solid var(--line);}
.ntab{font-size:.58rem;font-weight:800;letter-spacing:.4px;text-transform:uppercase;padding:6px 9px;border-radius:50px;border:1.5px solid var(--line);background:#fff;color:var(--ink-2);cursor:pointer;}
.ntab.active{background:var(--ink);color:#fff;border-color:var(--ink);}
.notif-filter{display:flex;gap:6px;padding:9px 14px;}
.nfilt{font-size:.62rem;font-weight:800;padding:5px 12px;border-radius:50px;border:1.5px solid var(--line);background:#fff;color:var(--ink-2);cursor:pointer;}
.nfilt.active{background:var(--lagoon);color:#fff;border-color:var(--lagoon);}
.notif-list{max-height:52vh;overflow-y:auto;}
.notif{padding:12px 18px;border-bottom:1px solid var(--line-2);display:flex;gap:11px;align-items:flex-start;}
.notif:last-child{border-bottom:none;}
.notif .ndot{width:8px;height:8px;border-radius:50%;background:var(--coral);margin-top:5px;flex-shrink:0;}
.notif.read .ndot{background:var(--line);}
.notif .nt{font-size:.84rem;font-weight:700;}
.notif .ns{font-size:.73rem;color:var(--ink-2);}
.notif .nx{margin-left:auto;color:var(--coral);font-weight:800;cursor:pointer;padding-left:6px;}
.notif-empty{padding:28px 18px;text-align:center;color:var(--ink-2);font-size:.85rem;}

/* calendar */
.calendar-wrap{background:#fff;border:1px solid var(--line);border-radius:16px;padding:18px;}
.cal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.cal-head h3{font-size:1.2rem;font-weight:500;}
.cal-nav{display:flex;gap:8px;}
.cal-nav button{width:34px;height:34px;border-radius:9px;border:1.5px solid var(--line);background:#fff;cursor:pointer;font-size:1rem;color:var(--ink);}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;}
.cal-dow{font-size:.6rem;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:var(--ink-2);text-align:center;padding:6px 0;}
.cal-cell{min-height:74px;border:1px solid var(--line);border-radius:10px;padding:6px;background:var(--cloud-2);display:flex;flex-direction:column;gap:3px;cursor:pointer;}
.cal-cell.empty{background:transparent;border:none;cursor:default;}
.cal-cell.today{border-color:var(--yarrow);background:#fff;}
.cal-date{font-size:.72rem;font-weight:800;color:var(--ink-2);}
.cal-cell.today .cal-date{color:var(--yarrow-dd);}
.cal-ev{font-size:.58rem;font-weight:700;padding:2px 6px;border-radius:6px;background:var(--blush);color:var(--yarrow-dd);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.cal-ev.rem{background:var(--soft);color:var(--lagoon-d);}
.cal-more{font-size:.56rem;color:var(--ink-2);}
.cal-day-detail{margin-top:14px;border-top:1px dashed var(--line);padding-top:12px;}
.cal-di{display:flex;align-items:center;gap:9px;padding:8px 0;border-bottom:1px solid var(--line-2);font-size:.85rem;}
.cal-di .dot{width:8px;height:8px;border-radius:50%;background:var(--yarrow);}.cal-di .dot.rem{background:var(--lagoon);}

/* clients */
.cl-summary{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px;}
.cl-stat{background:var(--ink);color:#fff;border-radius:14px;padding:16px 18px;}
.cl-stat .n{font-family:'Fraunces',serif;font-size:1.7rem;font-weight:400;}
.cl-stat .l{font-size:.6rem;font-weight:800;letter-spacing:1px;text-transform:uppercase;opacity:.8;margin-top:4px;}
.client-card{background:#fff;border:1px solid var(--line);border-radius:14px;padding:18px;margin-bottom:13px;}
.client-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-wrap:wrap;}
.client-name{font-family:'Fraunces',serif;font-size:1.1rem;font-weight:500;}
.client-email{font-size:.8rem;color:var(--ink-2);}
.cl-items{display:flex;flex-wrap:wrap;gap:6px;margin:11px 0;}
.cl-item{font-size:.66rem;font-weight:700;background:var(--cloud-2);border:1px solid var(--line);border-radius:50px;padding:5px 12px;}
.cl-mrr{font-family:'Fraunces',serif;font-size:1.25rem;color:var(--yarrow-dd);}
.cl-mrr small{font-size:.7rem;color:var(--ink-2);font-family:'Nunito';}
.cl-notes{margin-top:12px;border-top:1px dashed var(--line);padding-top:11px;}
.cl-notes .nh{font-size:.6rem;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:var(--ink-2);margin-bottom:8px;}
.cl-note{background:var(--cloud-2);border-radius:10px;padding:8px 12px;margin-bottom:7px;font-size:.85rem;display:flex;justify-content:space-between;gap:10px;align-items:flex-start;}
.cl-note-time{font-size:.6rem;color:var(--ink-2);opacity:.7;margin-top:3px;}
.cl-note-ctrls{display:flex;gap:9px;flex-shrink:0;}
.cl-note .x{color:var(--lagoon-d);cursor:pointer;font-weight:800;}.cl-note .x.del{color:var(--coral);}
.cl-note-add{display:flex;gap:8px;margin-top:7px;}
.cl-note-add input{flex:1;font-family:inherit;font-size:.85rem;padding:9px 13px;border-radius:9px;border:1px solid var(--line);background:#fff;outline:none;}
.cl-loading{text-align:center;padding:46px;color:var(--ink-2);}
.cl-status{font-size:.58rem;font-weight:800;letter-spacing:.8px;text-transform:uppercase;padding:4px 11px;border-radius:50px;}
.cl-status.active,.cl-status.trialing{background:var(--soft);color:var(--lagoon-d);}
.cl-status.past_due,.cl-status.unpaid{background:#FFE3DE;color:#C2410C;}
.cl-status.canceled{background:#eee;color:var(--ink-2);}

/* gate */
.gate-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}

.gate .gb{font-family:'Fraunces',serif;font-weight:600;font-size:1.3rem;margin-bottom:18px;}
.gate .gb .dot{width:7px;height:7px;border-radius:50%;background:var(--yarrow);display:inline-block;margin-left:2px;margin-bottom:9px;}
.gate h2{font-size:1.55rem;font-weight:400;}
.gate h2 em{font-style:italic;color:var(--yarrow);}
.gate p{color:var(--ink-2);font-size:.88rem;margin:9px 0 20px;}
.gate .fld{text-align:left;}
.gate .err{color:var(--coral);font-size:.82rem;min-height:18px;margin-bottom:6px;}
.gate .alt{margin-top:15px;font-size:.82rem;color:var(--ink-2);}

/* mobile */
.hamburger{display:none;background:#fff;border:1.5px solid var(--line);width:38px;height:38px;border-radius:11px;cursor:pointer;font-size:1.1rem;}
@media(max-width:900px){
  .sidebar{transform:translateX(-100%);transition:transform .25s;width:240px;}
  .sidebar.open{transform:translateX(0);}
  .main{margin-left:0;}
  .hamburger{display:inline-flex;align-items:center;justify-content:center;}
  .stat-row{grid-template-columns:repeat(2,1fr);}
  .crm-head{display:none;}
  .crm-row{grid-template-columns:1fr auto;gap:6px 12px;}
  .crm-row .cr-next,.crm-row .cr-when{grid-column:1 / -1;text-align:left;}
  .cl-summary{grid-template-columns:1fr;}
  .content{padding:20px 16px 70px;}
  .topbar{padding:14px 16px;}
}
.sb-scrim{display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:45;}
.sb-scrim.open{display:block;}
@media(min-width:901px){.sb-scrim{display:none!important;}}

    const [iq,rm,nt,tk]=await Promise.all([

      sb.from("reminders").select("*").order("due_at",{ascending:true}),
      sb.from("notes").select("*").order("created_at",{ascending:true}),
      sb.from("tasks").select("*").order("created_at",{ascending:false})
    ]);
    inquiries=(iq&&iq.data)||[]; reminders=(rm&&rm.data)||[]; tasks=(tk&&tk.data)||[];
    notesByInq={}; ((nt&&nt.data)||[]).forEach(n=>{ (notesByInq[n.inquiry_id]=notesByInq[n.inquiry_id]||[]).push(n); });
    buildNotifs(); updateNavBadges(); render(); renderNotifs();
    if(detailId) openDetail(detailId,true);
  }
  function subscribe(){
    try{ sb.channel("ws-"+(user.id||"x"))
      .on("postgres_changes",{event:"*",schema:"public",table:"inquiries"},()=>loadAll())
      .on("postgres_changes",{event:"*",schema:"public",table:"reminders"},()=>loadAll())
      .on("postgres_changes",{event:"*",schema:"public",table:"notes"},()=>loadAll())
      .on("postgres_changes",{event:"*",schema:"public",table:"tasks"},()=>loadAll())
      .subscribe(); }catch(e){ console.warn(e); }
  }

  function nextActionFor(id){ return reminders.filter(x=>x.inquiry_id===id&&!x.done).sort((a,b)=>new Date(a.due_at)-new Date(b.due_at))[0]; }
  function updateNavBadges(){
    const nNew=inquiries.filter(r=>r.status==="new").length;
    const openTasks=tasks.filter(t=>!t.done).length + reminders.filter(r=>!r.done).length;
    const bi=$("nbInq"),bt=$("nbTasks");
    if(nNew>0){ bi.style.display="flex"; bi.textContent=nNew; } else bi.style.display="none";
    if(openTasks>0){ bt.style.display="flex"; bt.textContent=openTasks>9?"9+":openTasks; } else bt.style.display="none";
  }

  // ===== view routing =====
  function setView(v){ view=v; document.querySelectorAll(".nav-item").forEach(n=>n.classList.toggle("active",n.getAttribute("data-view")===v)); closeSidebar(); renderViewTitle(); render(); }
  function renderViewTitle(){ const map={today:"titleToday",inquiries:"titleInq",tasks:"titleTasks",calendar:"titleCal",clients:"titleClients"}; $("viewTitle").textContent=T(map[view]||"titleToday"); }
  function render(){
    if($("shell").style.display==="none") return;
    if(view==="today") return renderToday();
    if(view==="inquiries") return renderInquiries();
    if(view==="tasks") return renderTasks();
    if(view==="calendar") return renderCalendar();

  }

  // ===== TODAY =====
  function renderToday(){
    const c=$("content");
    const newInq=inquiries.filter(r=>r.status==="new");
    const actionsToday=reminders.filter(r=>!r.done&&isToday(r.due_at));
    const tasksToday=tasks.filter(t=>!t.done&&(t.due_at?isToday(t.due_at):true));
    const openTasks=tasks.filter(t=>!t.done).length+reminders.filter(r=>!r.done).length;
    const upcoming=inquiries.filter(r=>r.kind==="booking"&&r.booking_at&&new Date(r.booking_at)>new Date()).length;
    const now=new Date();
    const dateStr=now.toLocaleDateString(locale(),{weekday:"long",month:"long",day:"numeric"});
    const hi=isAdmin?T("hiAdmin"):(T("hi")+", "+(user.email.split("@")[0]));
    let html='<div class="greet-row"><div class="hi">'+esc(hi)+' <em>\u00b7</em></div><div class="date">'+esc(dateStr)+'</div></div>';
    html+='<div class="stat-row">'+
      tile("s1",newInq.length,T("stNew"),"inquiries","new")+
      tile("s2",actionsToday.length,T("stActions"),"tasks","")+
      tile("s3",openTasks,T("stTasks"),"tasks","")+
      tile("s4",upcoming,T("stAppts"),"calendar","")+
    '</div>';
    // today's actions
    html+='<div class="section-block"><div class="section-h"><h3>'+esc(T("todaysActions"))+'</h3><span class="sh-link" data-go="tasks">'+esc(T("viewAll"))+'</span></div>';
    const items=actionsToday.concat(tasksToday.filter(t=>t.due_at&&isToday(t.due_at)));
    if(!items.length) html+='<div class="empty"><div class="big">'+esc(T("nothingToday"))+'</div></div>';
    else { html+='<div class="rowlist">'+actionsToday.map(r=>taskRow(r,"rem")).join("")+tasksToday.filter(t=>t.due_at&&isToday(t.due_at)).map(t=>taskRow(t,"task")).join("")+'</div>'; }
    html+='</div>';

    html+='<div class="section-block"><div class="section-h"><h3>'+esc(T("newInquiries"))+'</h3><span class="sh-link" data-go="inquiries">'+esc(T("viewAll"))+'</span></div>';
    if(!newInq.length) html+='<div class="empty"><div class="big">'+esc(T("noNew"))+'</div><div class="hand">'+esc(T("hand"))+'</div></div>';
    else html+='<div class="rowlist">'+newInq.slice(0,6).map(inqMiniRow).join("")+'</div>';

  function tile(cls,n,label,go,filt){ return '<div class="stat '+cls+'" data-go="'+go+'"'+(filt?' data-filt="'+filt+'"':'')+'><div class="n">'+n+'</div><div class="l">'+esc(label)+'</div></div>'; }
  function inqMiniRow(r){
    const na=nextActionFor(r.id);
    return '<div class="lrow" data-open="'+r.id+'"><div class="lr-main"><div class="lr-title">'+esc(r.customer_name||"\u2014")+'</div><div class="lr-sub">'+esc(r.channel||"")+(r.message?' \u00b7 '+esc(r.message.slice(0,46)):'')+'</div></div>'+(na?'<span class="lr-when">'+esc(fmtWhen(na.due_at))+'</span>':'<span class="pill new">'+esc(T("statusNew"))+'</span>')+'</div>';
  }
  function taskRow(item,kind){
    const id=item.id; const done=item.done;

    const due=item.due_at;
    const overdue=due&&!done&&new Date(due)<new Date();

      (prio?'<span class="prio-dot prio-'+prio+'"></span>':'')+
      '<div class="lr-main"><div class="lr-title'+(done?' done':'')+'">'+esc(title)+'</div>'+(due?'<div class="lr-sub">'+esc(fmtWhen(due))+'</div>':'')+'</div>'+
      linkTag+
      (overdue?'<span class="lr-when overdue">'+esc(T("overdue"))+'</span>':'')+

  function renderInquiries(){

    let html='<div class="tbl-toolbar"><div class="search"><span>&#128269;</span><input type="text" id="searchInput" placeholder="'+esc(T("search"))+'" value="'+esc(search)+'"></div>'+

  function cap(s){ return s.charAt(0).toUpperCase()+s.slice(1); }
  function pill2(v,l){ return '<button class="fpill'+(inqFilter===v?' active':'')+'" data-filt2="'+v+'">'+esc(l)+'</button>'; }
  function bindSearch(){ const si=$("searchInput"); if(si){ si.addEventListener("input",e=>{ search=e.target.value; const pos=e.target.selectionStart; renderInquiries(); const n=$("searchInput"); if(n){ n.focus(); try{n.setSelectionRange(pos,pos);}catch(e){} } }); } }

  // ===== DETAIL drawer =====
  function openDetail(id,keep){
    const r=inquiries.find(x=>x.id===id); if(!r) return;
    detailId=id;
    $("dName").textContent=r.customer_name||"\u2014";
    $("dSub").innerHTML=(r.channel?'<span class="type-chip">'+esc(r.channel)+'</span>':'')+(r.customer_contact?' '+esc(r.customer_contact):'')+' \u00b7 '+esc(fmtExact(r.created_at));
    const notes=(notesByInq[id]||[]);
    const myRole=isAdmin?"admin":"client";
    const notesHTML=notes.map(n=>{
      const mine=(n.author_role===myRole);
      const ctrls=mine?'<span class="note-ctrls"><span class="note-edit" data-act="noteEdit" data-nid="'+n.id+'">\u270e</span><span class="note-del" data-act="noteDel" data-nid="'+n.id+'">\u00d7</span></span>':'';
      return '<div class="note"><div class="nmeta"><span class="who-tag '+(n.author_role==="admin"?"admin":"client")+'">'+esc(n.author_role==="admin"?T("admin"):T("client"))+'</span><span>'+esc(fmtExact(n.created_at))+'</span>'+ctrls+'</div><div class="nbody">'+esc(n.body)+'</div></div>';
    }).join("");
    const steps=[["new",T("statusNew")],["contacted",T("statusContacted")],["booked",T("statusBooked")],["closed",T("statusClosed")]];
    const ci=steps.findIndex(s=>s[0]===r.status);
    const pipe='<div class="pipe">'+steps.map((s,i)=>'<button class="pstep'+(i===ci?' on':'')+(i<ci?' past':'')+'" data-act="pstep" data-st="'+s[0]+'">'+esc(s[1])+'</button>').join("")+'</div>';
    const acts=reminders.filter(x=>x.inquiry_id===id&&!x.done).sort((a,b)=>new Date(a.due_at)-new Date(b.due_at));
    const actsHTML=acts.length?acts.map(a=>'<div class="lrow" style="padding:10px 0;border:none;cursor:default"><span class="prio-dot prio-normal"></span><div class="lr-main"><div class="lr-title">'+esc(a.title)+'</div><div class="lr-sub">'+esc(fmtWhen(a.due_at))+'</div></div><button class="del-link" data-act="doneAct" data-rid="'+a.id+'">\u2713</button></div>').join(""):'<div class="lr-sub">'+esc(T("none"))+'</div>';
    const calledLbl=r.called?(T("called")+(r.called_at?" \u00b7 "+fmtExact(r.called_at):"")):T("markCalled");
    let body='';
    if(r.message) body+='<div class="dsec"><div class="dsec-l">'+esc(T("detMessage"))+'</div><div class="dmsg">'+esc(r.message)+'</div></div>';
    body+='<div class="dsec"><div class="dsec-l">'+esc(T("detStatus"))+'</div>'+pipe+'</div>';
    body+='<div class="dsec"><div class="dsec-l">'+esc(T("detActions"))+'</div><div class="drow"><button class="mini-btn'+(r.called?" done":"")+'" data-act="call">&#9742; '+esc(calledLbl)+'</button><button class="mini-btn alt" data-act="schedule">+ '+esc(T("schedule"))+'</button>'+((isAdmin||r.created_by==="client")?'<button class="del-link" data-act="delInq" style="margin-left:auto">'+esc(T("del"))+'</button>':'')+'</div></div>';
    body+='<div class="dsec"><div class="dsec-l">'+esc(T("detNext"))+'</div>'+actsHTML+'</div>';
    body+='<div class="dsec"><div class="dsec-l">'+esc(T("detNotes"))+'</div>'+notesHTML+'<div class="note-add"><input type="text" id="dNoteInput" placeholder="'+esc(T("notePlace"))+'"><button class="btn btn-ghost btn-sm" data-act="noteSend">'+esc(T("send"))+'</button></div></div>';
    $("drawerBody").innerHTML=body;
    // mark notes read
    notes.forEach(n=>{ notifRead["note-"+n.id]=1; }); saveNotifState(); updateBadge();
    if(!keep){ $("drawer").classList.add("open"); $("drawerBg").classList.add("open"); }
  }
  function closeDetail(){ detailId=null; $("drawer").classList.remove("open"); $("drawerBg").classList.remove("open"); }
  $("drawerClose").addEventListener("click",closeDetail);
  $("drawerBg").addEventListener("click",closeDetail);

  // ===== TASKS =====
  function renderTasks(){
    const c=$("content");
    let html='<div class="tbl-toolbar"><button class="btn btn-primary btn-sm" id="openTask">'+esc(T("addTask"))+'</button></div>';
    const open=tasks.filter(t=>!t.done), openR=reminders.filter(r=>!r.done);
    const doneAll=tasks.filter(t=>t.done);
    if(!open.length&&!openR.length&&!doneAll.length){ html+='<div class="empty"><div class="big">'+esc(T("noTasks"))+'</div><div>'+esc(T("noTasksSub"))+'</div></div>'; c.innerHTML=html; $("openTask").onclick=()=>{ setAddKind("task"); openOverlay("addOverlay"); }; return; }
    // merge open reminders + open tasks, sort by due
    const merged=open.map(t=>({_k:"task",d:t.due_at?new Date(t.due_at).getTime():Infinity,o:t})).concat(openR.map(r=>({_k:"rem",d:new Date(r.due_at).getTime(),o:r}))).sort((a,b)=>a.d-b.d);
    html+='<div class="rowlist">'+merged.map(m=>taskRow(m.o,m._k)).join("")+'</div>';
    if(doneAll.length){ html+='<div class="section-block" style="margin-top:22px"><div class="section-h"><h3 style="font-size:.95rem;color:var(--ink-2)">'+esc(lang==="es"?"Completadas":"Completed")+'</h3></div><div class="rowlist">'+doneAll.slice(0,10).map(t=>taskRow(t,"task")).join("")+'</div></div>'; }
    c.innerHTML=html; $("openTask").onclick=()=>{ setAddKind("task"); openOverlay("addOverlay"); };
  }

  // ===== CALENDAR =====
  let calRef=new Date(); calRef.setDate(1); let calSel=null;
  function calEvents(){ const map={}; const add=(d,ev)=>{ if(!d)return; const k=d.getFullYear()+"-"+d.getMonth()+"-"+d.getDate(); (map[k]=map[k]||[]).push(ev); };
    inquiries.forEach(r=>{ if(r.kind==="booking"&&r.booking_at) add(new Date(r.booking_at),{type:"booking",title:r.customer_name||T("booking"),time:r.booking_at}); });
    reminders.forEach(r=>{ add(new Date(r.due_at),{type:"rem",title:r.title,time:r.due_at}); });
    tasks.forEach(t=>{ if(t.due_at) add(new Date(t.due_at),{type:"rem",title:t.title,time:t.due_at}); });
    return map; }
  function renderCalendar(){
    const evs=calEvents(); const y=calRef.getFullYear(),m=calRef.getMonth();
    const monthName=calRef.toLocaleDateString(locale(),{month:"long",year:"numeric"});
    const firstDow=new Date(y,m,1).getDay(); const daysIn=new Date(y,m+1,0).getDate();
    const dows=lang==="es"?["D","L","M","M","J","V","S"]:["S","M","T","W","T","F","S"];
    const today=new Date(); let cells="";
    for(let i=0;i<firstDow;i++) cells+='<div class="cal-cell empty"></div>';
    for(let d=1;d<=daysIn;d++){ const k=y+"-"+m+"-"+d; const it=today.getFullYear()===y&&today.getMonth()===m&&today.getDate()===d; const list=evs[k]||[];
      let e=list.slice(0,2).map(x=>'<div class="cal-ev'+(x.type==="rem"?" rem":"")+'">'+esc(x.title)+'</div>').join(""); if(list.length>2)e+='<div class="cal-more">+'+(list.length-2)+'</div>';
      cells+='<div class="cal-cell'+(it?" today":"")+'" data-day="'+d+'"><span class="cal-date">'+d+'</span>'+e+'</div>'; }
    let detail="";
    if(calSel){ const k=y+"-"+m+"-"+calSel; const list=evs[k]||[]; detail='<div class="cal-day-detail"><h4>'+calSel+" "+calRef.toLocaleDateString(locale(),{month:"long"})+'</h4>'+(list.length?list.map(x=>'<div class="cal-di"><span class="dot'+(x.type==="rem"?" rem":"")+'"></span><span>'+esc(fmtWhen(x.time))+'</span><span>'+esc(x.title)+'</span></div>').join(""):'<div class="cal-di">'+esc(T("nothingToday"))+'</div>')+'</div>'; }
    $("content").innerHTML='<div class="calendar-wrap"><div class="cal-head"><h3>'+esc(monthName)+'</h3><div class="cal-nav"><button data-cal="prev">\u2039</button><button data-cal="today">\u2022</button><button data-cal="next">\u203a</button></div></div><div class="cal-grid">'+dows.map(d=>'<div class="cal-dow">'+d+'</div>').join("")+cells+'</div>'+detail+'</div>';
  }

  // ===== CLIENTS =====
  async function loadClients(force){ if(!isAdmin)return; if(clientsData&&!force)return; if(clientsLoading)return; clientsLoading=true; if(view==="clients")renderClients();
    try{ const r=await fetch(CFG.clientsFn,{method:"POST",headers:{"Content-Type":"application/json","Authorization":"Bearer "+CFG.key,"apikey":CFG.key},body:JSON.stringify({requester:user.email})}); const d=await r.json(); clientsData=(d&&d.clients)?d.clients:[]; if(d&&d.error)clientsData={__error:d.error}; }catch(e){ clientsData={__error:String(e)}; }
    try{ const {data}=await sb.from("client_notes").select("*").order("created_at",{ascending:true}); clientNotes={}; (data||[]).forEach(n=>{ (clientNotes[(n.client_email||"").toLowerCase()]=clientNotes[(n.client_email||"").toLowerCase()]||[]).push(n); }); }catch(e){}
    clientsLoading=false; if(view==="clients")renderClients(); }
  function renderClients(){
    const c=$("content");
    if(clientsLoading||clientsData===null){ c.innerHTML='<div class="cl-loading">'+esc(T("loading"))+'</div>'; return; }
    if(clientsData&&clientsData.__error){ c.innerHTML='<div class="cl-loading">'+esc(T("clientsErr"))+'<br><small style="opacity:.6">'+esc(clientsData.__error)+'</small></div>'; return; }
    const list=Array.isArray(clientsData)?clientsData:[];
    const totalMRR=list.reduce((a,x)=>a+(x.mrr||0),0); const active=list.filter(x=>x.status==="active"||x.status==="trialing").length;
    let html='<div class="cl-summary"><div class="cl-stat"><div class="n">'+list.length+'</div><div class="l">'+esc(T("clClients"))+'</div></div><div class="cl-stat"><div class="n">'+active+'</div><div class="l">'+esc(T("clActive"))+'</div></div><div class="cl-stat"><div class="n">$'+totalMRR.toLocaleString("en-US",{maximumFractionDigits:0})+'</div><div class="l">'+esc(T("clMRR"))+'</div></div></div>';
    if(!list.length){ html+='<div class="cl-loading">'+esc(T("clNone"))+'</div>'; c.innerHTML=html; return; }
    html+=list.map(x=>{ const em=(x.email||"").toLowerCase(); const notes=clientNotes[em]||[];
      const nh=notes.map(n=>'<div class="cl-note" data-cnid="'+n.id+'"><div><div>'+esc(n.body)+'</div><div class="cl-note-time">'+esc(fmtExact(n.created_at))+'</div></div><span class="cl-note-ctrls"><span class="x" data-cnact="edit">\u270e</span><span class="x del" data-cnact="del">\u00d7</span></span></div>').join("");
      const stc=(x.status||"").replace(/[^a-z_]/g,"");
      return '<div class="client-card" data-cemail="'+esc(em)+'"><div class="client-top"><div><div class="client-name">'+esc(x.name||x.email||"\u2014")+'</div>'+(x.email?'<div class="client-email">'+esc(x.email)+'</div>':'')+'</div><span class="cl-status '+stc+'">'+esc(x.status||"")+'</span></div><div class="cl-items">'+(x.items||[]).map(i=>'<span class="cl-item">'+esc(i)+'</span>').join("")+'</div><div class="cl-mrr">$'+(x.mrr||0).toLocaleString("en-US",{maximumFractionDigits:0})+' <small>'+esc(T("perMonth"))+'</small></div><div class="cl-notes"><div class="nh">'+esc(T("internalNotes"))+'</div>'+nh+'<div class="cl-note-add"><input type="text" data-cnact="input" placeholder="'+esc(T("addInternal"))+'"><button class="btn btn-ghost btn-sm" data-cnact="add">'+esc(T("send"))+'</button></div></div></div>';
    }).join("");
    c.innerHTML=html;
  }

  // ===== mutations =====
  async function patchInq(id,f){ f.updated_at=new Date().toISOString(); const {error}=await sb.from("inquiries").update(f).eq("id",id); if(error){console.warn(error);return false;} const r=inquiries.find(x=>x.id===id); if(r)Object.assign(r,f); return true; }

  // ===== global click handling =====
  document.addEventListener("click", async e=>{
    // nav
    const nav=e.target.closest(".nav-item"); if(nav){ setView(nav.getAttribute("data-view")); return; }
    // go links / tiles
    const go=e.target.closest("[data-go]"); if(go){ const f=go.getAttribute("data-filt"); if(f)inqFilter=f; setView(go.getAttribute("data-go")); return; }
    // open inquiry detail
    const op=e.target.closest("[data-open]"); if(op && !e.target.closest("[data-act]")){ openDetail(op.getAttribute("data-open")); return; }
    // filter pills
    const fp=e.target.closest("[data-filt2]"); if(fp){ inqFilter=fp.getAttribute("data-filt2"); renderInquiries(); return; }
    // calendar
    const cal=e.target.closest("[data-cal]"); if(cal){ const a=cal.getAttribute("data-cal"); if(a==="prev")calRef.setMonth(calRef.getMonth()-1); else if(a==="next")calRef.setMonth(calRef.getMonth()+1); else {calRef=new Date();calRef.setDate(1);} calSel=null; renderCalendar(); return; }
